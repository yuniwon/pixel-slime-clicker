<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>픽셀 슬라임 클리커</title>
<style>
  @font-face { font-family: 'fallback'; src: local('Courier New'); }

  * { margin: 0; padding: 0; box-sizing: border-box; user-select: none; -webkit-user-select: none; -webkit-tap-highlight-color: transparent; }

  :root {
    --bg1: #1a1033;
    --bg2: #2d1b4e;
    --panel: #241640;
    --panel-light: #322057;
    --border: #4a3178;
    --text: #f0e6ff;
    --text-dim: #9d8ac4;
    --gold: #ffd75e;
    --green: #7dff8a;
    --pink: #ff8ac4;
  }

  html, body { height: 100%; overflow: hidden; }

  body {
    font-family: 'Galmuri11', 'DungGeunMo', 'Courier New', monospace;
    background:
      radial-gradient(ellipse at 50% 120%, #3d2566 0%, transparent 60%),
      linear-gradient(180deg, var(--bg1) 0%, var(--bg2) 100%);
    color: var(--text);
    display: flex;
    flex-direction: row;
    image-rendering: pixelated;
  }

  /* ── 별 배경 ── */
  .star {
    position: fixed;
    width: 4px; height: 4px;
    background: #fff;
    opacity: .5;
    animation: twinkle 2.4s infinite;
    pointer-events: none;
    z-index: 0;
  }
  @keyframes twinkle { 0%,100% { opacity: .15; } 50% { opacity: .7; } }

  /* ── 메인 게임 영역 ── */
  #game-area {
    flex: 1;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    position: relative;
    z-index: 1;
    min-width: 0;
  }

  #title {
    font-size: 22px;
    letter-spacing: 2px;
    color: var(--gold);
    text-shadow: 3px 3px 0 #00000055;
    margin-bottom: 4px;
  }

  #stage-name {
    font-size: 13px;
    color: var(--text-dim);
    margin-bottom: 14px;
  }

  #coin-display {
    font-size: 32px;
    font-weight: bold;
    color: var(--gold);
    text-shadow: 2px 2px 0 #00000066;
    display: flex;
    align-items: center;
    gap: 10px;
  }

  #coin-icon { width: 28px; height: 28px; image-rendering: pixelated; animation: coinspin 2s steps(4) infinite; }
  @keyframes coinspin { 0% { transform: scaleX(1);} 25%{ transform: scaleX(.2);} 50%{ transform: scaleX(-1);} 75%{ transform: scaleX(.2);} 100%{ transform: scaleX(1);} }

  #cps-display { font-size: 14px; color: var(--green); margin-top: 4px; text-shadow: 1px 1px 0 #00000066; }

  #slime-wrap {
    margin: 24px 0 10px;
    cursor: pointer;
    position: relative;
    transition: filter .15s;
  }
  #slime-wrap:active { filter: brightness(1.15); }

  #slime-canvas {
    width: 288px;
    height: 306px;
    image-rendering: pixelated;
    animation: bob 2.2s ease-in-out infinite;
    transform-origin: 50% 100%;
  }
  @keyframes bob {
    0%, 100% { transform: scale(1, 1); }
    50% { transform: scale(1.03, .96) translateY(2px); }
  }
  #slime-canvas.squish {
    animation: squish .18s ease-out;
  }
  @keyframes squish {
    0% { transform: scale(1.18, .78); }
    60% { transform: scale(.94, 1.1); }
    100% { transform: scale(1, 1); }
  }

  #slime-shadow {
    width: 200px; height: 26px;
    background: #00000055;
    border-radius: 50%;
    margin: -18px auto 0;
    filter: blur(2px);
  }

  #combo-box {
    height: 44px;
    margin-top: 10px;
    text-align: center;
    visibility: hidden;
  }
  #combo-box.on { visibility: visible; }
  #combo-label { font-size: 16px; color: var(--pink); text-shadow: 2px 2px 0 #00000066; }
  #combo-bar-outer {
    width: 180px; height: 10px;
    background: #00000066;
    border: 2px solid var(--border);
    margin: 6px auto 0;
  }
  #combo-bar { height: 100%; width: 100%; background: var(--pink); transition: width .1s linear; }

  #frenzy-banner {
    position: absolute;
    top: 12px; left: 50%;
    transform: translateX(-50%);
    background: #ffd75e;
    color: #5e4517;
    font-weight: bold;
    padding: 8px 18px;
    font-size: 15px;
    border: 3px solid #fff;
    box-shadow: 4px 4px 0 #00000055;
    display: none;
    z-index: 5;
    animation: frenzy-pulse .4s infinite alternate;
  }
  @keyframes frenzy-pulse { from { transform: translateX(-50%) scale(1);} to { transform: translateX(-50%) scale(1.06);} }

  /* ── 떠오르는 숫자 ── */
  .float-num {
    position: fixed;
    font-size: 20px;
    font-weight: bold;
    color: var(--gold);
    text-shadow: 2px 2px 0 #00000088;
    pointer-events: none;
    z-index: 50;
    animation: floatup .9s ease-out forwards;
  }
  .float-num.big { font-size: 28px; color: var(--pink); }
  @keyframes floatup {
    0% { opacity: 1; transform: translateY(0) scale(1); }
    100% { opacity: 0; transform: translateY(-90px) scale(1.2); }
  }

  .spark {
    position: fixed;
    width: 8px; height: 8px;
    pointer-events: none;
    z-index: 49;
  }

  /* ── 황금별 ── */
  #golden-star {
    position: fixed;
    width: 64px; height: 64px;
    cursor: pointer;
    z-index: 60;
    display: none;
    image-rendering: pixelated;
    animation: starwobble .6s ease-in-out infinite alternate;
    filter: drop-shadow(0 0 12px #ffd75ecc);
  }
  @keyframes starwobble { from { transform: rotate(-12deg) scale(1);} to { transform: rotate(12deg) scale(1.12);} }

  /* ── 상점 패널 ── */
  #shop {
    width: 360px;
    background: var(--panel);
    border-left: 4px solid var(--border);
    display: flex;
    flex-direction: column;
    z-index: 2;
  }

  #shop-header {
    padding: 14px 16px 10px;
    border-bottom: 3px solid var(--border);
    display: flex;
    justify-content: space-between;
    align-items: center;
  }
  #shop-header h2 { font-size: 16px; color: var(--gold); letter-spacing: 1px; }

  .icon-btn {
    background: var(--panel-light);
    border: 2px solid var(--border);
    color: var(--text);
    font-family: inherit;
    font-size: 14px;
    padding: 4px 10px;
    cursor: pointer;
  }
  .icon-btn:hover { background: var(--border); }

  #shop-tabs { display: flex; border-bottom: 3px solid var(--border); }
  .tab {
    flex: 1;
    text-align: center;
    padding: 10px 0;
    font-size: 13px;
    cursor: pointer;
    color: var(--text-dim);
    background: var(--panel);
  }
  .tab.active { color: var(--gold); background: var(--panel-light); }

  #shop-list {
    flex: 1;
    overflow-y: auto;
    padding: 10px;
  }
  #shop-list::-webkit-scrollbar { width: 8px; }
  #shop-list::-webkit-scrollbar-thumb { background: var(--border); }

  .shop-item {
    display: flex;
    align-items: center;
    gap: 12px;
    background: var(--panel-light);
    border: 3px solid var(--border);
    padding: 10px 12px;
    margin-bottom: 8px;
    cursor: pointer;
    transition: transform .06s;
    position: relative;
  }
  .shop-item:hover:not(.locked) { border-color: var(--gold); }
  .shop-item:active:not(.locked) { transform: scale(.98); }
  .shop-item.locked { opacity: .45; cursor: not-allowed; }
  .shop-item.hidden-item { display: none; }

  .shop-icon { font-size: 30px; width: 42px; text-align: center; filter: drop-shadow(2px 2px 0 #00000044); }
  .shop-info { flex: 1; min-width: 0; }
  .shop-name { font-size: 14px; font-weight: bold; }
  .shop-desc { font-size: 11px; color: var(--text-dim); margin-top: 3px; line-height: 1.4; }
  .shop-cost { font-size: 13px; color: var(--gold); margin-top: 4px; }
  .shop-count {
    font-size: 20px;
    font-weight: bold;
    color: var(--green);
    min-width: 36px;
    text-align: right;
  }

  #stats-bar {
    border-top: 3px solid var(--border);
    padding: 10px 16px;
    font-size: 11px;
    color: var(--text-dim);
    line-height: 1.7;
  }

  /* ── 토스트 ── */
  #toast {
    position: fixed;
    bottom: 28px; left: 50%;
    transform: translateX(-50%) translateY(80px);
    background: var(--panel-light);
    border: 3px solid var(--gold);
    color: var(--text);
    padding: 12px 22px;
    font-size: 14px;
    z-index: 100;
    transition: transform .3s ease;
    box-shadow: 4px 4px 0 #00000066;
    text-align: center;
    line-height: 1.6;
  }
  #toast.show { transform: translateX(-50%) translateY(0); }

  /* ── 진화 플래시 ── */
  #evo-flash {
    position: fixed;
    inset: 0;
    background: #fff;
    opacity: 0;
    pointer-events: none;
    z-index: 90;
  }
  #evo-flash.go { animation: flash 1s ease-out; }
  @keyframes flash { 0% { opacity: .9; } 100% { opacity: 0; } }

  @media (max-width: 760px) {
    body { flex-direction: column; }
    #game-area { flex: none; padding-top: 12px; }
    #slime-canvas { width: 192px; height: 204px; }
    #slime-shadow { width: 130px; }
    #shop { width: 100%; flex: 1; border-left: none; border-top: 4px solid var(--border); min-height: 0; }
    #title { font-size: 18px; }
    #coin-display { font-size: 24px; }
  }
</style>
</head>
<body>

<div id="game-area">
  <div id="frenzy-banner">⭐ 광란의 시간! x7 ⭐</div>
  <div id="title">픽셀 슬라임 클리커</div>
  <div id="stage-name">아기 초록 슬라임</div>
  <div id="coin-display"><canvas id="coin-icon" width="8" height="8"></canvas><span id="coin-num">0</span></div>
  <div id="cps-display">초당 0 코인</div>
  <div id="slime-wrap">
    <canvas id="slime-canvas" width="16" height="17"></canvas>
    <div id="slime-shadow"></div>
  </div>
  <div id="combo-box">
    <div id="combo-label">콤보 x1.0</div>
    <div id="combo-bar-outer"><div id="combo-bar"></div></div>
  </div>
</div>

<div id="shop">
  <div id="shop-header">
    <h2>★ 상점 ★</h2>
    <div>
      <button class="icon-btn" id="sound-btn">🔊</button>
      <button class="icon-btn" id="reset-btn">초기화</button>
    </div>
  </div>
  <div id="shop-tabs">
    <div class="tab active" data-tab="producers">친구들</div>
    <div class="tab" data-tab="upgrades">강화</div>
  </div>
  <div id="shop-list"></div>
  <div id="stats-bar">
    <div>총 클릭: <span id="stat-clicks">0</span></div>
    <div>누적 코인: <span id="stat-total">0</span></div>
    <div>클릭당: <span id="stat-power">1</span> 코인</div>
  </div>
</div>

<canvas id="golden-star" width="16" height="16"></canvas>
<div id="evo-flash"></div>
<div id="toast"></div>

<script>
'use strict';

/* ════════════════════════ 데이터 ════════════════════════ */

const PRODUCERS = [
  { id: 'chick',   icon: '🐤', name: '병아리',     desc: '삐약삐약 코인을 쪼아 모아요',      baseCost: 15,       cps: 0.1 },
  { id: 'cat',     icon: '🐱', name: '고양이',     desc: '낮잠 자면서도 코인을 벌어요',      baseCost: 100,      cps: 1 },
  { id: 'dog',     icon: '🐶', name: '강아지',     desc: '꼬리 흔들며 코인을 물어와요',      baseCost: 1100,     cps: 8 },
  { id: 'rabbit',  icon: '🐰', name: '로켓 토끼',   desc: '달까지 가서 코인을 캐와요',        baseCost: 12000,    cps: 47 },
  { id: 'unicorn', icon: '🦄', name: '유니콘',     desc: '무지개에서 코인이 쏟아져요',       baseCost: 130000,   cps: 260 },
  { id: 'dragon',  icon: '🐲', name: '아기 드래곤', desc: '보물 더미 위에서 잠을 자요',       baseCost: 1.4e6,    cps: 1400 },
  { id: 'whale',   icon: '🐋', name: '우주 고래',   desc: '은하수를 헤엄치며 코인을 뿜어요',  baseCost: 2e7,      cps: 7800 },
  { id: 'planet',  icon: '🪐', name: '코인 행성',   desc: '행성 전체가 코인으로 되어 있어요', baseCost: 3.3e8,    cps: 44000 },
];

const UPGRADES = [
  { id: 'glove1',  icon: '🧤', name: '말랑 장갑',     desc: '클릭당 +1 코인',            cost: 50,      type: 'clickAdd', value: 1 },
  { id: 'glove2',  icon: '🧤', name: '폭신 장갑',     desc: '클릭당 +5 코인',            cost: 600,     type: 'clickAdd', value: 5 },
  { id: 'glove3',  icon: '🧤', name: '구름 장갑',     desc: '클릭당 +25 코인',           cost: 7000,    type: 'clickAdd', value: 25 },
  { id: 'hand1',   icon: '✨', name: '황금 손가락',   desc: '클릭 코인 x2',              cost: 2500,    type: 'clickMul', value: 2 },
  { id: 'hand2',   icon: '✨', name: '다이아 손가락', desc: '클릭 코인 x2',              cost: 50000,   type: 'clickMul', value: 2 },
  { id: 'hand3',   icon: '✨', name: '별빛 손가락',   desc: '클릭 코인 x3',              cost: 1.2e6,   type: 'clickMul', value: 3 },
  { id: 'snack1',  icon: '🍪', name: '맛있는 간식',   desc: '친구들 생산량 +25%',        cost: 10000,   type: 'cpsMul',   value: 1.25 },
  { id: 'snack2',  icon: '🍰', name: '딸기 케이크',   desc: '친구들 생산량 +50%',        cost: 250000,  type: 'cpsMul',   value: 1.5 },
  { id: 'snack3',  icon: '🍕', name: '우주 피자',     desc: '친구들 생산량 x2',          cost: 8e6,     type: 'cpsMul',   value: 2 },
  { id: 'click1',  icon: '👆', name: '응원봉',        desc: '클릭에 초당 생산량의 1% 추가', cost: 100000, type: 'clickCps', value: 0.01 },
  { id: 'click2',  icon: '📣', name: '슬라임 응원단', desc: '클릭에 초당 생산량의 5% 추가', cost: 5e6,    type: 'clickCps', value: 0.05 },
];

const STAGES = [
  { name: '아기 초록 슬라임', need: 0,
    pal: { b: '#5ad95a', l: '#aef2a4', d: '#37a837', o: '#1b4a26' } },
  { name: '바다 슬라임', need: 10000,
    pal: { b: '#56b8f2', l: '#aee2ff', d: '#3380c2', o: '#16365c' } },
  { name: '딸기 슬라임', need: 1e6,
    pal: { b: '#f78fc0', l: '#ffc8e2', d: '#c2538e', o: '#591238' } },
  { name: '황금 킹 슬라임', need: 1e8,
    pal: { b: '#f7c948', l: '#ffeaa8', d: '#c79232', o: '#5c4312' }, crown: true },
  { name: '전설의 갓 슬라임', need: 1e10,
    pal: null, crown: true, rainbow: true },
];

const SLIME_MAP = [
  '................',
  '................',
  '................',
  '................',
  '....oooooooo....',
  '..oobbbbbbbboo..',
  '.obbllbbbbbbbbo.',
  '.oblbbbbbbbbbbo.',
  'obblbbbbbbbbbbbo',
  'obbwkbbbbbbwkbbo',
  'obbwkbbbbbbwkbbo',
  'obpbbbbbbbbbbpbo',
  'obbbbobbbbobbbbo',
  'obbbbboooobbbbdo',
  '.obbbbbbbbbbbdo.',
  '.oobbbbbbbbddoo.',
  '...oooooooooo...',
];

const CROWN_MAP = [
  '....y..y..y.....',
  '....yyyyyyyy....',
  '....yyyyyyyy....',
];

/* ════════════════════════ 상태 ════════════════════════ */

const SAVE_KEY = 'pixelSlimeClicker_v1';

let S = {
  coins: 0,
  totalEarned: 0,
  totalClicks: 0,
  producers: {},        // id -> count
  upgrades: {},         // id -> true
  soundOn: true,
  lastSave: Date.now(),
};
PRODUCERS.forEach(p => S.producers[p.id] = 0);

let combo = 0;
let comboTimer = 0;          // 남은 시간(초)
const COMBO_WINDOW = 0.9;
let frenzyTimer = 0;         // 광란 남은 시간
let currentTab = 'producers';
let stageIdx = 0;
let blinkTimer = 3;
let blinking = 0;

/* ════════════════════════ 유틸 ════════════════════════ */

const $ = id => document.getElementById(id);

function fmt(n) {
  if (n < 0) return '0';
  if (n < 1000) return n < 100 && n % 1 !== 0 ? n.toFixed(1) : Math.floor(n).toLocaleString();
  const units = [[1e16, '경'], [1e12, '조'], [1e8, '억'], [1e4, '만']];
  for (const [v, u] of units) {
    if (n >= v) {
      const x = n / v;
      return (x >= 100 ? Math.floor(x).toLocaleString() : x.toFixed(x >= 10 ? 1 : 2)) + u;
    }
  }
  return Math.floor(n).toLocaleString();
}

function producerCost(p) {
  return Math.ceil(p.baseCost * Math.pow(1.15, S.producers[p.id]));
}

function clickPower() {
  let add = 1, mul = 1, cpsPart = 0;
  for (const u of UPGRADES) {
    if (!S.upgrades[u.id]) continue;
    if (u.type === 'clickAdd') add += u.value;
    if (u.type === 'clickMul') mul *= u.value;
    if (u.type === 'clickCps') cpsPart += u.value;
  }
  return (add * mul + totalCps() * cpsPart);
}

function totalCps() {
  let base = 0;
  for (const p of PRODUCERS) base += p.cps * S.producers[p.id];
  let mul = 1;
  for (const u of UPGRADES) {
    if (S.upgrades[u.id] && u.type === 'cpsMul') mul *= u.value;
  }
  return base * mul;
}

function comboMul() { return 1 + Math.min(combo, 50) * 0.02; }
function frenzyMul() { return frenzyTimer > 0 ? 7 : 1; }

/* ════════════════════════ 사운드 (WebAudio) ════════════════════════ */

let audioCtx = null;
function beep(freq, dur = 0.07, type = 'square', vol = 0.08) {
  if (!S.soundOn) return;
  try {
    if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
    const o = audioCtx.createOscillator();
    const g = audioCtx.createGain();
    o.type = type;
    o.frequency.value = freq;
    g.gain.setValueAtTime(vol, audioCtx.currentTime);
    g.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + dur);
    o.connect(g); g.connect(audioCtx.destination);
    o.start(); o.stop(audioCtx.currentTime + dur);
  } catch (e) { /* 오디오 미지원 환경 무시 */ }
}

function sndClick() { beep(420 + Math.min(combo, 50) * 14, 0.06); }
function sndBuy()   { beep(523, 0.08); setTimeout(() => beep(784, 0.1), 70); }
function sndEvo()   { [523, 659, 784, 1047].forEach((f, i) => setTimeout(() => beep(f, 0.15, 'triangle', 0.1), i * 110)); }
function sndStar()  { [880, 1175, 1568].forEach((f, i) => setTimeout(() => beep(f, 0.12, 'triangle', 0.1), i * 80)); }

/* ════════════════════════ 슬라임 렌더링 ════════════════════════ */

const slimeCv = $('slime-canvas');
const slimeCtx = slimeCv.getContext('2d');

function drawSlime(t) {
  const stage = STAGES[stageIdx];
  let pal = stage.pal;
  if (stage.rainbow) {
    const hue = (t / 30) % 360;
    pal = {
      b: `hsl(${hue},80%,65%)`, l: `hsl(${hue},85%,82%)`,
      d: `hsl(${hue},70%,45%)`, o: `hsl(${hue},60%,22%)`,
    };
  }
  const colors = {
    o: pal.o, b: pal.b, l: pal.l, d: pal.d,
    w: '#ffffff', k: '#26203a', p: '#ff9fb2', y: '#ffd75e',
  };
  slimeCtx.clearRect(0, 0, 16, 17);

  for (let y = 0; y < SLIME_MAP.length; y++) {
    for (let x = 0; x < 16; x++) {
      let c = SLIME_MAP[y][x];
      if (c === '.') continue;
      // 눈 깜빡임: 눈 윗줄 지우고 아랫줄을 감은 눈으로
      if (blinking > 0 && (c === 'w' || c === 'k')) {
        if (y === 9) c = 'b';
        else c = 'k';
      }
      slimeCtx.fillStyle = colors[c];
      slimeCtx.fillRect(x, y, 1, 1);
    }
  }
  if (stage.crown) {
    for (let y = 0; y < CROWN_MAP.length; y++) {
      for (let x = 0; x < 16; x++) {
        const c = CROWN_MAP[y][x];
        if (c === '.') continue;
        slimeCtx.fillStyle = (y === 2 || (y === 1 && x % 3 === 0)) ? '#e0a82e' : colors.y;
        slimeCtx.fillRect(x, y + 1, 1, 1);
      }
    }
  }
}

/* 코인 아이콘 (8x8) */
(function drawCoin() {
  const c = $('coin-icon').getContext('2d');
  const map = ['..oooo..', '.oyyyyo.', 'oyylyyyo', 'oylyyyyo', 'oyyyyydo', 'oyyyyddo', '.oyyddo.', '..oooo..'];
  const col = { o: '#8a6d1f', y: '#ffd75e', l: '#fff3c4', d: '#d4a73c' };
  map.forEach((row, y) => [...row].forEach((ch, x) => {
    if (ch === '.') return;
    c.fillStyle = col[ch]; c.fillRect(x, y, 1, 1);
  }));
})();

/* 황금별 (16x16) */
(function drawStar() {
  const c = $('golden-star').getContext('2d');
  const map = [
    '.......oo.......',
    '......oyyo......',
    '......oyyo......',
    '.....oyllyo.....',
    '.....oylyyo.....',
    'ooooooyyyyoooooo',
    'oyyyyyyyyyyyyyyo',
    '.oyyyyyyyyyyyyo.',
    '..oyyyyyyyyyyo..',
    '...oyyyyyyyyo...',
    '...oyyyyyyyyo...',
    '..oyyyooooyyyo..',
    '..oyyoo..ooyyo..',
    '.oyyo......oyyo.',
    '.oyo........oyo.',
    '.oo..........oo.',
  ];
  const col = { o: '#8a6d1f', y: '#ffd75e', l: '#fff8d6' };
  map.forEach((row, y) => [...row].forEach((ch, x) => {
    if (ch === '.') return;
    c.fillStyle = col[ch]; c.fillRect(x, y, 1, 1);
  }));
})();

/* ════════════════════════ 클릭 처리 ════════════════════════ */

const slimeWrap = $('slime-wrap');

slimeWrap.addEventListener('pointerdown', e => {
  const gain = clickPower() * comboMul() * frenzyMul();
  S.coins += gain;
  S.totalEarned += gain;
  S.totalClicks++;

  combo++;
  comboTimer = COMBO_WINDOW;

  // 찌그러짐 애니메이션
  slimeCv.classList.remove('squish');
  void slimeCv.offsetWidth;
  slimeCv.classList.add('squish');

  spawnFloat(e.clientX, e.clientY, '+' + fmt(gain), frenzyTimer > 0);
  spawnSparks(e.clientX, e.clientY);
  sndClick();
  checkEvolution();
  renderHud();
});

function spawnFloat(x, y, text, big) {
  const el = document.createElement('div');
  el.className = 'float-num' + (big ? ' big' : '');
  el.textContent = text;
  el.style.left = (x - 20 + (Math.random() * 40 - 20)) + 'px';
  el.style.top = (y - 30) + 'px';
  document.body.appendChild(el);
  setTimeout(() => el.remove(), 900);
}

const SPARK_COLORS = ['#ffd75e', '#ff8ac4', '#7dff8a', '#56b8f2', '#ffffff'];
function spawnSparks(x, y) {
  for (let i = 0; i < 5; i++) {
    const el = document.createElement('div');
    el.className = 'spark';
    el.style.background = SPARK_COLORS[Math.floor(Math.random() * SPARK_COLORS.length)];
    el.style.left = x + 'px';
    el.style.top = y + 'px';
    const ang = Math.random() * Math.PI * 2;
    const dist = 30 + Math.random() * 50;
    el.animate([
      { transform: 'translate(0,0) scale(1)', opacity: 1 },
      { transform: `translate(${Math.cos(ang) * dist}px, ${Math.sin(ang) * dist - 20}px) scale(0)`, opacity: 0 },
    ], { duration: 500 + Math.random() * 300, easing: 'ease-out' });
    document.body.appendChild(el);
    setTimeout(() => el.remove(), 850);
  }
}

/* ════════════════════════ 진화 ════════════════════════ */

function currentStageFor(total) {
  let idx = 0;
  for (let i = 0; i < STAGES.length; i++) if (total >= STAGES[i].need) idx = i;
  return idx;
}

function checkEvolution() {
  const idx = currentStageFor(S.totalEarned);
  if (idx > stageIdx) {
    stageIdx = idx;
    $('stage-name').textContent = STAGES[idx].name;
    $('evo-flash').classList.remove('go');
    void $('evo-flash').offsetWidth;
    $('evo-flash').classList.add('go');
    sndEvo();
    toast(`🎉 진화! <b>${STAGES[idx].name}</b> 등장!`);
  }
}

/* ════════════════════════ 상점 ════════════════════════ */

const shopList = $('shop-list');

function buildShop() {
  shopList.innerHTML = '';
  if (currentTab === 'producers') {
    for (const p of PRODUCERS) {
      const el = document.createElement('div');
      el.className = 'shop-item';
      el.dataset.id = p.id;
      el.innerHTML = `
        <div class="shop-icon">${p.icon}</div>
        <div class="shop-info">
          <div class="shop-name">${p.name}</div>
          <div class="shop-desc">${p.desc} · 초당 ${fmt(p.cps)}</div>
          <div class="shop-cost"></div>
        </div>
        <div class="shop-count"></div>`;
      el.addEventListener('pointerdown', () => buyProducer(p));
      shopList.appendChild(el);
    }
  } else {
    for (const u of UPGRADES) {
      if (S.upgrades[u.id]) continue;
      const el = document.createElement('div');
      el.className = 'shop-item';
      el.dataset.id = u.id;
      el.innerHTML = `
        <div class="shop-icon">${u.icon}</div>
        <div class="shop-info">
          <div class="shop-name">${u.name}</div>
          <div class="shop-desc">${u.desc}</div>
          <div class="shop-cost">${fmt(u.cost)} 코인</div>
        </div>`;
      el.addEventListener('pointerdown', () => buyUpgrade(u));
      shopList.appendChild(el);
    }
    if (!shopList.children.length) {
      shopList.innerHTML = '<div style="text-align:center;color:var(--text-dim);padding:30px 10px;font-size:13px;">모든 강화 완료! 🏆</div>';
    }
  }
  refreshShop();
}

function refreshShop() {
  for (const el of shopList.querySelectorAll('.shop-item')) {
    const id = el.dataset.id;
    const p = PRODUCERS.find(x => x.id === id);
    if (p) {
      const cost = producerCost(p);
      el.querySelector('.shop-cost').textContent = fmt(cost) + ' 코인';
      el.querySelector('.shop-count').textContent = S.producers[id] || '';
      el.classList.toggle('locked', S.coins < cost);
      // 아직 너무 비싼 항목은 ??? 처리
      const reveal = S.totalEarned >= p.baseCost * 0.4 || S.producers[id] > 0;
      el.querySelector('.shop-name').textContent = reveal ? p.name : '???';
      el.querySelector('.shop-icon').textContent = reveal ? p.icon : '❓';
    } else {
      const u = UPGRADES.find(x => x.id === id);
      if (u) el.classList.toggle('locked', S.coins < u.cost);
    }
  }
}

function buyProducer(p) {
  const cost = producerCost(p);
  if (S.coins < cost) return;
  S.coins -= cost;
  S.producers[p.id]++;
  sndBuy();
  refreshShop();
  renderHud();
}

function buyUpgrade(u) {
  if (S.upgrades[u.id] || S.coins < u.cost) return;
  S.coins -= u.cost;
  S.upgrades[u.id] = true;
  sndBuy();
  toast(`${u.icon} <b>${u.name}</b> 구매 완료!`);
  buildShop();
  renderHud();
}

document.querySelectorAll('.tab').forEach(tab => {
  tab.addEventListener('pointerdown', () => {
    document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
    tab.classList.add('active');
    currentTab = tab.dataset.tab;
    buildShop();
  });
});

/* ════════════════════════ 황금별 이벤트 ════════════════════════ */

const starEl = $('golden-star');
let starTimer = 20 + Math.random() * 40;   // 첫 등장
let starVisible = 0;

function spawnStar() {
  starVisible = 10;
  starEl.style.display = 'block';
  const area = $('game-area').getBoundingClientRect();
  starEl.style.left = (area.left + 40 + Math.random() * (area.width - 140)) + 'px';
  starEl.style.top = (80 + Math.random() * (area.height - 220)) + 'px';
}

function hideStar() {
  starVisible = 0;
  starEl.style.display = 'none';
  starTimer = 40 + Math.random() * 60;
}

starEl.addEventListener('pointerdown', e => {
  e.stopPropagation();
  sndStar();
  if (Math.random() < 0.5) {
    frenzyTimer = 20;
    $('frenzy-banner').style.display = 'block';
    toast('⭐ <b>광란의 시간!</b> 20초간 모든 수입 x7!');
  } else {
    const bonus = Math.max(totalCps() * 90, clickPower() * 150, 50);
    S.coins += bonus;
    S.totalEarned += bonus;
    spawnFloat(e.clientX, e.clientY, '+' + fmt(bonus), true);
    toast(`⭐ 행운의 보너스! <b>+${fmt(bonus)}</b> 코인!`);
  }
  hideStar();
  checkEvolution();
  renderHud();
});

/* ════════════════════════ HUD / 토스트 ════════════════════════ */

function renderHud() {
  $('coin-num').textContent = fmt(S.coins);
  $('cps-display').textContent = '초당 ' + fmt(totalCps() * frenzyMul()) + ' 코인' + (frenzyTimer > 0 ? ' (x7!)' : '');
  $('stat-clicks').textContent = S.totalClicks.toLocaleString();
  $('stat-total').textContent = fmt(S.totalEarned);
  $('stat-power').textContent = fmt(clickPower() * comboMul() * frenzyMul());
}

let toastTimer = null;
function toast(html) {
  const el = $('toast');
  el.innerHTML = html;
  el.classList.add('show');
  clearTimeout(toastTimer);
  toastTimer = setTimeout(() => el.classList.remove('show'), 3000);
}

/* ════════════════════════ 저장 / 불러오기 ════════════════════════ */

function save() {
  S.lastSave = Date.now();
  try { localStorage.setItem(SAVE_KEY, JSON.stringify(S)); } catch (e) {}
}

function load() {
  try {
    const raw = localStorage.getItem(SAVE_KEY);
    if (!raw) return;
    const data = JSON.parse(raw);
    Object.assign(S, data);
    PRODUCERS.forEach(p => { if (!(p.id in S.producers)) S.producers[p.id] = 0; });

    // 오프라인 보상: 자리 비운 시간의 50%, 최대 8시간
    const away = Math.min((Date.now() - (S.lastSave || Date.now())) / 1000, 8 * 3600);
    const offline = totalCps() * away * 0.5;
    if (offline >= 1) {
      S.coins += offline;
      S.totalEarned += offline;
      setTimeout(() => toast(`💤 자리 비운 동안 친구들이 <b>${fmt(offline)}</b> 코인을 모았어요!`), 600);
    }
  } catch (e) {}
}

$('reset-btn').addEventListener('pointerdown', () => {
  if (!confirm('정말 처음부터 다시 시작할까요? 모든 진행이 사라져요!')) return;
  localStorage.removeItem(SAVE_KEY);
  location.reload();
});

$('sound-btn').addEventListener('pointerdown', () => {
  S.soundOn = !S.soundOn;
  $('sound-btn').textContent = S.soundOn ? '🔊' : '🔇';
  if (S.soundOn) beep(660, 0.08);
});

window.addEventListener('beforeunload', save);

/* ════════════════════════ 메인 루프 ════════════════════════ */

let lastT = performance.now();
let saveAcc = 0;
let shopAcc = 0;

function loop(t) {
  const dt = Math.min((t - lastT) / 1000, 0.5);
  lastT = t;

  // 자동 생산
  const income = totalCps() * frenzyMul() * dt;
  if (income > 0) {
    S.coins += income;
    S.totalEarned += income;
  }

  // 콤보 감소
  if (comboTimer > 0) {
    comboTimer -= dt;
    if (comboTimer <= 0) combo = 0;
  }
  const cbox = $('combo-box');
  if (combo >= 3) {
    cbox.classList.add('on');
    $('combo-label').textContent = '콤보 x' + comboMul().toFixed(1) + '  (' + combo + ')';
    $('combo-bar').style.width = Math.max(0, comboTimer / COMBO_WINDOW * 100) + '%';
  } else {
    cbox.classList.remove('on');
  }

  // 광란
  if (frenzyTimer > 0) {
    frenzyTimer -= dt;
    if (frenzyTimer <= 0) {
      frenzyTimer = 0;
      $('frenzy-banner').style.display = 'none';
      toast('광란의 시간 종료!');
    }
  }

  // 황금별
  if (starVisible > 0) {
    starVisible -= dt;
    if (starVisible <= 0) hideStar();
  } else {
    starTimer -= dt;
    if (starTimer <= 0) spawnStar();
  }

  // 눈 깜빡임
  blinkTimer -= dt;
  if (blinkTimer <= 0) { blinking = 0.15; blinkTimer = 2.5 + Math.random() * 3; }
  if (blinking > 0) blinking -= dt;

  drawSlime(t);
  checkEvolution();
  renderHud();

  shopAcc += dt;
  if (shopAcc >= 0.25) { shopAcc = 0; refreshShop(); }

  saveAcc += dt;
  if (saveAcc >= 5) { saveAcc = 0; save(); }

  requestAnimationFrame(loop);
}

/* ════════════════════════ 초기화 ════════════════════════ */

// 별 배경 생성
for (let i = 0; i < 40; i++) {
  const s = document.createElement('div');
  s.className = 'star';
  s.style.left = Math.random() * 100 + 'vw';
  s.style.top = Math.random() * 100 + 'vh';
  s.style.animationDelay = Math.random() * 2.4 + 's';
  if (Math.random() < 0.3) { s.style.width = '6px'; s.style.height = '6px'; }
  document.body.appendChild(s);
}

load();
stageIdx = currentStageFor(S.totalEarned);
$('stage-name').textContent = STAGES[stageIdx].name;
$('sound-btn').textContent = S.soundOn ? '🔊' : '🔇';
buildShop();
renderHud();
requestAnimationFrame(loop);
</script>
</body>
