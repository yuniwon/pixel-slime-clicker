<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>픽셀 슬라임 클리커</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/quiple/galmuri/dist/galmuri.css">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; user-select: none; -webkit-user-select: none; -webkit-tap-highlight-color: transparent; }

  :root {
    --bg1: #1a1033;
    --bg2: #2d1b4e;
    --panel: #241640;
    --panel-light: #322057;
    --border: #4a3178;
    --text: #f0e6ff;
    --text-dim: #9d8ac4;
    --gold: #ffd75e;
    --green: #7dff8a;
    --pink: #ff8ac4;
    --soul: #b48aff;
  }

  html, body { height: 100%; overflow: hidden; }

  body {
    font-family: 'Galmuri11', 'DungGeunMo', 'Courier New', monospace;
    background:
      radial-gradient(ellipse at 50% 120%, #3d2566 0%, transparent 60%),
      linear-gradient(180deg, var(--bg1) 0%, var(--bg2) 100%);
    color: var(--text);
    display: flex;
    flex-direction: row;
    image-rendering: pixelated;
  }

  /* ── 별 배경 ── */
  .star {
    position: fixed;
    width: 4px; height: 4px;
    background: #fff;
    opacity: .5;
    animation: twinkle 2.4s infinite;
    pointer-events: none;
    z-index: 0;
  }
  @keyframes twinkle { 0%,100% { opacity: .15; } 50% { opacity: .7; } }

  /* ── 메인 게임 영역 ── */
  #game-area {
    flex: 1;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    position: relative;
    z-index: 1;
    min-width: 0;
  }

  #title {
    font-size: 22px;
    letter-spacing: 2px;
    color: var(--gold);
    text-shadow: 3px 3px 0 #00000055;
    margin-bottom: 4px;
  }

  #stage-name {
    font-size: 13px;
    color: var(--text-dim);
    margin-bottom: 8px;
  }
  #stage-name .trait { color: var(--gold); }

  /* ── 진화 진행바 ── */
  #evo-progress-wrap { text-align: center; margin-bottom: 10px; }
  #evo-progress-outer {
    width: 240px; height: 12px;
    background: #00000066;
    border: 2px solid var(--border);
    margin: 0 auto;
  }
  #evo-progress-bar {
    height: 100%; width: 0%;
    background: linear-gradient(90deg, var(--green), var(--gold));
    transition: width .3s ease;
  }
  #evo-progress-label { font-size: 11px; color: var(--text-dim); margin-top: 5px; }

  #coin-display {
    font-size: 32px;
    font-weight: bold;
    color: var(--gold);
    text-shadow: 2px 2px 0 #00000066;
    display: flex;
    align-items: center;
    gap: 10px;
  }

  #coin-icon { width: 28px; height: 28px; image-rendering: pixelated; animation: coinspin 2s steps(4) infinite; }
  @keyframes coinspin { 0% { transform: scaleX(1);} 25%{ transform: scaleX(.2);} 50%{ transform: scaleX(-1);} 75%{ transform: scaleX(.2);} 100%{ transform: scaleX(1);} }

  #cps-display { font-size: 14px; color: var(--green); margin-top: 4px; text-shadow: 1px 1px 0 #00000066; }

  #slime-wrap {
    margin: 24px 0 10px;
    cursor: pointer;
    position: relative;
    transition: filter .15s;
    outline: none;
  }
  #slime-wrap:active { filter: brightness(1.15); }
  #slime-wrap:focus-visible { filter: drop-shadow(0 0 8px var(--gold)); }

  #slime-canvas {
    width: 288px;
    height: 306px;
    image-rendering: pixelated;
    animation: bob 2.2s ease-in-out infinite;
    transform-origin: 50% 100%;
  }
  @keyframes bob {
    0%, 100% { transform: scale(1, 1); }
    50% { transform: scale(1.03, .96) translateY(2px); }
  }
  #slime-canvas.squish {
    animation: squish .18s ease-out;
  }
  @keyframes squish {
    0% { transform: scale(1.18, .78); }
    60% { transform: scale(.94, 1.1); }
    100% { transform: scale(1, 1); }
  }

  #slime-shadow {
    width: 200px; height: 26px;
    background: #00000055;
    border-radius: 50%;
    margin: -18px auto 0;
    filter: blur(2px);
  }

  /* ── 말풍선 ── */
  #speech-bubble {
    position: absolute;
    top: -14px; left: 50%;
    transform: translateX(-50%) scale(0);
    background: var(--text);
    color: #2d1b4e;
    font-size: 12px;
    line-height: 1.5;
    padding: 8px 14px;
    border: 3px solid #2d1b4e;
    box-shadow: 3px 3px 0 #00000055;
    max-width: 240px;
    width: max-content;
    text-align: center;
    z-index: 10;
    transition: transform .2s ease;
    pointer-events: none;
  }
  #speech-bubble.show { transform: translateX(-50%) scale(1); }
  #speech-bubble::after {
    content: '';
    position: absolute;
    bottom: -10px; left: 50%;
    margin-left: -5px;
    border: 5px solid transparent;
    border-top-color: #2d1b4e;
  }

  /* ── 친구 시각화 ── */
  #friends-layer {
    position: absolute;
    inset: 0;
    pointer-events: none;
    overflow: visible;
    z-index: -1;
  }
  .friend {
    position: absolute;
    filter: drop-shadow(2px 2px 0 #00000044);
  }
  .friend-body {
    display: inline-flex;
    animation: friendbob ease-in-out infinite alternate;
  }
  .sprite-icon {
    display: inline-block;
    flex: 0 0 auto;
    background-repeat: no-repeat;
    image-rendering: auto;
    vertical-align: middle;
  }
  .sprite-icon.friend-sprite { filter: drop-shadow(2px 2px 0 #00000055); }
  .sprite-icon.shop-sprite { filter: drop-shadow(2px 2px 0 #00000044); }
  .sprite-icon.locked-sprite {
    filter: grayscale(1) brightness(.48) drop-shadow(2px 2px 0 #00000044);
    opacity: .72;
  }
  @keyframes friendbob {
    from { transform: translateY(0); }
    to { transform: translateY(-10px); }
  }

  #combo-box {
    height: 44px;
    margin-top: 10px;
    text-align: center;
    visibility: hidden;
  }
  #combo-box.on { visibility: visible; }
  #combo-label { font-size: 16px; color: var(--pink); text-shadow: 2px 2px 0 #00000066; }
  #combo-bar-outer {
    width: 180px; height: 10px;
    background: #00000066;
    border: 2px solid var(--border);
    margin: 6px auto 0;
  }
  #combo-bar { height: 100%; width: 100%; background: var(--pink); transition: width .1s linear; }

  #buff-banner {
    position: absolute;
    top: 12px; left: 50%;
    transform: translateX(-50%);
    background: #ffd75e;
    color: #5e4517;
    font-weight: bold;
    padding: 8px 18px;
    font-size: 14px;
    border: 3px solid #fff;
    box-shadow: 4px 4px 0 #00000055;
    display: none;
    z-index: 5;
    animation: buff-pulse .4s infinite alternate;
    white-space: nowrap;
  }
  @keyframes buff-pulse { from { transform: translateX(-50%) scale(1);} to { transform: translateX(-50%) scale(1.06);} }

  /* ── 떠오르는 숫자 ── */
  .float-num {
    position: fixed;
    font-size: 20px;
    font-weight: bold;
    color: var(--gold);
    text-shadow: 2px 2px 0 #00000088;
    pointer-events: none;
    z-index: 50;
    animation: floatup .9s ease-out forwards;
  }
  .float-num.big { font-size: 28px; color: var(--pink); }
  @keyframes floatup {
    0% { opacity: 1; transform: translateY(0) scale(1); }
    100% { opacity: 0; transform: translateY(-90px) scale(1.2); }
  }

  .spark {
    position: fixed;
    width: 8px; height: 8px;
    pointer-events: none;
    z-index: 49;
  }

  /* ── 황금별 / 미니 별똥별 ── */
  #golden-star {
    position: fixed;
    width: 64px; height: 64px;
    cursor: pointer;
    z-index: 60;
    display: none;
    image-rendering: pixelated;
    animation: starwobble .6s ease-in-out infinite alternate;
    filter: drop-shadow(0 0 12px #ffd75ecc);
  }
  @keyframes starwobble { from { transform: rotate(-12deg) scale(1);} to { transform: rotate(12deg) scale(1.12);} }

  .mini-star {
    position: fixed;
    width: 32px; height: 32px;
    cursor: pointer;
    z-index: 60;
    image-rendering: pixelated;
    animation: starwobble .5s ease-in-out infinite alternate;
    filter: drop-shadow(0 0 8px #ffd75ecc);
  }

  /* ── 상점 패널 ── */
  #shop {
    width: 360px;
    background: var(--panel);
    border-left: 4px solid var(--border);
    display: flex;
    flex-direction: column;
    z-index: 2;
  }

  #shop-header {
    padding: 14px 16px 10px;
    border-bottom: 3px solid var(--border);
    display: flex;
    justify-content: space-between;
    align-items: center;
  }
  #shop-header h2 { font-size: 16px; color: var(--gold); letter-spacing: 1px; }
  #discount-badge {
    display: none;
    font-size: 11px;
    color: #5e4517;
    background: var(--gold);
    padding: 2px 8px;
    border: 2px solid #fff;
    animation: buff-pulse .5s infinite alternate;
  }

  .icon-btn {
    background: var(--panel-light);
    border: 2px solid var(--border);
    color: var(--text);
    font-family: inherit;
    font-size: 14px;
    padding: 4px 10px;
    cursor: pointer;
  }
  .icon-btn:hover { background: var(--border); }
  #reset-btn.holding { background: #8a2b2b; }

  #shop-tabs { display: flex; border-bottom: 3px solid var(--border); }
  .tab {
    flex: 1;
    text-align: center;
    padding: 10px 0;
    font-size: 12px;
    cursor: pointer;
    color: var(--text-dim);
    background: var(--panel);
  }
  .tab.active { color: var(--gold); background: var(--panel-light); }

  #buy-modes {
    display: none;
    gap: 6px;
    padding: 8px 10px 0;
  }
  #buy-modes.on { display: flex; }
  .mode-btn {
    flex: 1;
    background: var(--panel-light);
    border: 2px solid var(--border);
    color: var(--text-dim);
    font-family: inherit;
    font-size: 12px;
    padding: 5px 0;
    cursor: pointer;
  }
  .mode-btn.active { color: var(--gold); border-color: var(--gold); }

  #shop-list {
    flex: 1;
    overflow-y: auto;
    padding: 10px;
  }
  #shop-list::-webkit-scrollbar { width: 8px; }
  #shop-list::-webkit-scrollbar-thumb { background: var(--border); }

  .shop-item {
    display: flex;
    align-items: center;
    gap: 12px;
    background: var(--panel-light);
    border: 3px solid var(--border);
    padding: 10px 12px;
    margin-bottom: 8px;
    cursor: pointer;
    transition: transform .06s;
    position: relative;
  }
  .shop-item:hover:not(.locked) { border-color: var(--gold); }
  .shop-item:active:not(.locked) { transform: scale(.98); }
  .shop-item.locked { opacity: .45; cursor: not-allowed; }

  .shop-icon {
    font-size: 30px;
    width: 72px;
    min-width: 72px;
    text-align: center;
    display: flex;
    align-items: center;
    justify-content: center;
    filter: drop-shadow(2px 2px 0 #00000044);
  }
  .shop-info { flex: 1; min-width: 0; }
  .shop-name { font-size: 14px; font-weight: bold; }
  .shop-desc { font-size: 11px; color: var(--text-dim); margin-top: 3px; line-height: 1.4; }
  .shop-cost { font-size: 13px; color: var(--gold); margin-top: 4px; }
  .shop-count {
    font-size: 20px;
    font-weight: bold;
    color: var(--green);
    min-width: 36px;
    text-align: right;
  }

  /* 업적 */
  #ach-summary {
    text-align: center;
    font-size: 12px;
    color: var(--gold);
    padding: 4px 0 10px;
  }
  .ach-item { cursor: default; }
  .ach-item.done { border-color: var(--gold); }
  .ach-item.done .shop-name { color: var(--gold); }
  .ach-item:not(.done) { opacity: .5; }

  /* 환생 */
  #prestige-info {
    text-align: center;
    font-size: 12px;
    color: var(--soul);
    padding: 4px 0 10px;
    line-height: 1.8;
  }
  .prestige-btn { border-color: var(--soul); }
  .prestige-btn .shop-name { color: var(--soul); }
  .prestige-btn:hover:not(.locked) { border-color: var(--text); }
  .perk-item .shop-cost { color: var(--soul); }
  .perk-item.maxed { border-color: var(--soul); opacity: .8; cursor: default; }

  #stats-bar {
    border-top: 3px solid var(--border);
    padding: 10px 16px;
    font-size: 11px;
    color: var(--text-dim);
    line-height: 1.7;
  }
  #stats-bar .soul { color: var(--soul); }

  /* ── 슬라임 방 (장식) ── */
  #decor-layer {
    position: absolute;
    inset: 0;
    pointer-events: none;
    z-index: 0;
  }
  .decor {
    position: absolute;
    font-size: 34px;
    filter: drop-shadow(2px 2px 0 #00000055);
    animation: decorbob 3.2s ease-in-out infinite alternate;
  }
  @keyframes decorbob {
    from { transform: translateY(0); }
    to { transform: translateY(-5px); }
  }
  .decor.center { transform: translateX(-50%); animation: none; }

  .room-section-title {
    font-size: 12px;
    color: var(--gold);
    margin: 14px 4px 8px;
    letter-spacing: 1px;
  }
  .codex-grid {
    display: grid;
    grid-template-columns: repeat(5, 1fr);
    gap: 6px;
    margin-bottom: 4px;
  }
  .codex-grid.cols4 { grid-template-columns: repeat(4, 1fr); }
  .codex-cell {
    background: var(--panel-light);
    border: 2px solid var(--border);
    text-align: center;
    padding: 8px 2px 6px;
    font-size: 10px;
    color: var(--text-dim);
    line-height: 1.4;
    min-height: 58px;
  }
  .codex-cell.seen { border-color: var(--gold); color: var(--text); }
  .codex-swatch {
    width: 22px; height: 22px;
    margin: 0 auto 4px;
    border: 2px solid #00000055;
  }
  .codex-cell .sprite-icon { margin-bottom: 2px; }
  .story-entry {
    background: var(--panel-light);
    border: 3px solid var(--border);
    border-left-color: var(--gold);
    padding: 10px 12px;
    margin-bottom: 8px;
    font-size: 11px;
    line-height: 1.7;
    color: var(--text);
  }
  .story-entry .story-title { color: var(--gold); font-weight: bold; margin-bottom: 4px; font-size: 12px; }
  .story-entry.locked { opacity: .4; border-left-color: var(--border); }

  .shop-syn { color: #d9b84a; }
  .syn-line { font-size: 10px; color: var(--text-dim); margin-top: 3px; line-height: 1.4; }
  .syn-line.on { color: var(--green); }

  /* ── 토스트 ── */
  #toast {
    position: fixed;
    bottom: 28px; left: 50%;
    transform: translateX(-50%) translateY(80px);
    background: var(--panel-light);
    border: 3px solid var(--gold);
    color: var(--text);
    padding: 12px 22px;
    font-size: 14px;
    z-index: 100;
    transition: transform .3s ease;
    box-shadow: 4px 4px 0 #00000066;
    text-align: center;
    line-height: 1.6;
    max-width: 90vw;
  }
  #toast.show { transform: translateX(-50%) translateY(0); }

  /* ── 진화 플래시 ── */
  #evo-flash {
    position: fixed;
    inset: 0;
    background: #fff;
    opacity: 0;
    pointer-events: none;
    z-index: 90;
  }
  #evo-flash.go { animation: flash 1s ease-out; }
  @keyframes flash { 0% { opacity: .9; } 100% { opacity: 0; } }

  @media (max-width: 760px) {
    body { flex-direction: column; }
    #game-area { flex: none; padding-top: 12px; }
    #slime-canvas { width: 192px; height: 204px; }
    #slime-shadow { width: 130px; }
    #shop { width: 100%; flex: 1; border-left: none; border-top: 4px solid var(--border); min-height: 0; }
    #title { font-size: 18px; }
    #coin-display { font-size: 24px; }
    .friend { font-size: 20px; }
    #speech-bubble { font-size: 11px; max-width: 180px; }
  }
</style>
</head>
<body>

<div id="game-area">
  <div id="decor-layer"></div>
  <div id="buff-banner"></div>
  <div id="title">픽셀 슬라임 클리커</div>
  <div id="stage-name">아기 초록 슬라임</div>
  <div id="evo-progress-wrap">
    <div id="evo-progress-outer"><div id="evo-progress-bar"></div></div>
    <div id="evo-progress-label"></div>
  </div>
  <div id="coin-display"><canvas id="coin-icon" width="8" height="8"></canvas><span id="coin-num">0</span></div>
  <div id="cps-display">초당 0 코인</div>
  <div id="slime-wrap" role="button" tabindex="0" aria-label="슬라임 클릭 (스페이스/엔터 키로도 가능)">
    <div id="speech-bubble"></div>
    <div id="friends-layer"></div>
    <canvas id="slime-canvas" width="16" height="17"></canvas>
    <div id="slime-shadow"></div>
  </div>
  <div id="combo-box">
    <div id="combo-label">콤보 x1.0</div>
    <div id="combo-bar-outer"><div id="combo-bar"></div></div>
  </div>
</div>

<div id="shop">
  <div id="shop-header">
    <h2>★ 상점 ★</h2>
    <span id="discount-badge">⭐ 다음 구매 50% 할인!</span>
    <div>
      <button class="icon-btn" id="sound-btn" aria-label="소리 켜기/끄기">🔊</button>
      <button class="icon-btn" id="reset-btn" aria-label="게임 초기화 (길게 누르기)" title="길게 눌러 초기화">초기화</button>
    </div>
  </div>
  <div id="shop-tabs">
    <div class="tab active" data-tab="producers" role="button">친구들</div>
    <div class="tab" data-tab="upgrades" role="button">강화</div>
    <div class="tab" data-tab="achievements" role="button">업적</div>
    <div class="tab" data-tab="prestige" role="button">환생</div>
    <div class="tab" data-tab="room" role="button">방</div>
  </div>
  <div id="buy-modes" class="on">
    <button class="mode-btn active" data-mode="1">x1</button>
    <button class="mode-btn" data-mode="10">x10</button>
    <button class="mode-btn" data-mode="max">MAX</button>
  </div>
  <div id="shop-list"></div>
  <div id="stats-bar">
    <div>총 클릭: <span id="stat-clicks">0</span> · 황금별: <span id="stat-stars">0</span></div>
    <div>누적 코인: <span id="stat-total">0</span></div>
    <div>클릭당: <span id="stat-power">1</span> 코인 · 업적 보너스: +<span id="stat-ach">0</span>%</div>
    <div class="soul">젤리 영혼: <span id="stat-souls">0</span> 보유 / 총 <span id="stat-souls-total">0</span> (수입 +<span id="stat-soul-bonus">0</span>%) · 환생 <span id="stat-resets">0</span>회</div>
  </div>
</div>

<canvas id="golden-star" width="16" height="16" aria-label="황금별"></canvas>
<div id="evo-flash"></div>
<div id="toast"></div>

<script>
'use strict';

/* ════════════════════════ 데이터 ════════════════════════ */

const SAVE_VERSION = 5;
const PRESTIGE_UNLOCK = 1e9;

const PRODUCERS = [
  { id: 'chick',   icon: '🐤', name: '병아리',     desc: '삐약삐약 코인을 쪼아 모아요',      baseCost: 15,       cps: 0.1 },
  { id: 'cat',     icon: '🐱', name: '고양이',     desc: '낮잠 자면서도 코인을 벌어요',      baseCost: 100,      cps: 1 },
  { id: 'dog',     icon: '🐶', name: '강아지',     desc: '꼬리 흔들며 코인을 물어와요',      baseCost: 1100,     cps: 8 },
  { id: 'rabbit',  icon: '🐰', name: '로켓 토끼',   desc: '달까지 가서 코인을 캐와요',        baseCost: 12000,    cps: 47 },
  { id: 'unicorn', icon: '🦄', name: '유니콘',     desc: '무지개에서 코인이 쏟아져요',       baseCost: 130000,   cps: 260 },
  { id: 'dragon',  icon: '🐲', name: '아기 드래곤', desc: '보물 더미 위에서 잠을 자요',       baseCost: 1.4e6,    cps: 1400 },
  { id: 'whale',   icon: '🐋', name: '우주 고래',   desc: '은하수를 헤엄치며 코인을 뿜어요',  baseCost: 2e7,      cps: 7800 },
  { id: 'planet',  icon: '🪐', name: '코인 행성',   desc: '행성 전체가 코인으로 되어 있어요', baseCost: 3.3e8,    cps: 44000 },
];

const PRODUCER_SPRITE_ATLAS = 'assets/generated/sprites/slime-friends-ai/sprite-sheet-alpha.png';

function fmt(n) {
  if (n < 0) return '0';
  if (n < 1000) return n < 100 && n % 1 !== 0 ? n.toFixed(1) : Math.floor(n).toLocaleString();
  const units = [[1e16, '경'], [1e12, '조'], [1e8, '억'], [1e4, '만']];
  for (const [v, u] of units) {
    if (n >= v) {
      const x = n / v;
      return (x >= 100 ? Math.floor(x).toLocaleString() : x.toFixed(x >= 10 ? 1 : 2)) + u;
    }
  }
  return Math.floor(n).toLocaleString();
}

function fmtTime(sec) {
  if (!isFinite(sec)) return '∞';
  if (sec < 60) return Math.ceil(sec) + '초';
  if (sec < 3600) return Math.floor(sec / 60) + '분 ' + Math.ceil(sec % 60) + '초';
  if (sec < 86400) return (sec / 3600).toFixed(1) + '시간';
  return (sec / 86400).toFixed(1) + '일';
}

/* 모든 코인 획득은 여기로: lifetime/run 통계가 함께 기록된다.
   kind: 'click' | 'idle' | 'offline' | 'event' */
function earnCoins(gain, kind) {
  S.coins += gain;
  S.totalEarned += gain;
  S.stats.lifetime.earned += gain;
  if (kind === 'click') S.stats.run.clickEarned += gain;
  else if (kind === 'idle') S.stats.run.idleEarned += gain;
  else if (kind === 'offline') S.stats.run.offlineEarned += gain;
  if (frenzyTimer > 0) frenzyEarned += gain;
}

function earnShare(key) {
  const r = S.stats.run;
  const tot = r.clickEarned + r.idleEarned + r.offlineEarned;
  return tot > 0 ? r[key] / tot : 0;
}

function producerCost(p, owned) {
  if (owned === undefined) owned = S.producers[p.id];
  return Math.ceil(p.baseCost * Math.pow(1.15, owned));
}

function bulkInfo(p) {
  const owned = S.producers[p.id];
  const budget = S.coins;
  const disc = S.buffs.discount ? 0.5 : 1;
  if (buyMode === '1') {
    return { count: 1, cost: producerCost(p, owned) * disc };
  }
  if (buyMode === '10') {
    let total = 0;
    for (let k = 0; k < 10; k++) total += producerCost(p, owned + k);
    return { count: 10, cost: total * disc };
  }
  let total = 0, count = 0;
  for (let k = 0; k < 500; k++) {
    const c = producerCost(p, owned + count) * disc;
    if (total + c > budget) break;
    total += c;
    count++;
  }
  if (count === 0) return { count: 0, cost: producerCost(p, owned) * disc };
  return { count, cost: total };
}

function perkLv(id) { return S.prestige.perks[id] || 0; }
function perkCost(id) { return perkLv(id) + 1; }

/* ── 친구 시너지 헬퍼 ── */
function hasSyn(id, n) { return S.producers[id] >= n; }

function nextSynergy(id) {
  const list = SYNERGIES[id] || [];
  return list.find(s => S.producers[id] < s.at) || null;
}

function codexEntryCount() {
  return Object.keys(S.codex.stages).length + Object.keys(S.codex.traits).length +
         Object.keys(S.codex.friends).length + Object.keys(S.story).length;
}

function decorAmp() {
  return 1 + (hasSyn('unicorn', 10) ? 0.1 : 0) + (hasSyn('planet', 10) ? 0.1 : 0);
}

function planetMul() {
  const n = S.producers.planet;
  return 1 + 0.01 * Math.min(n, 25) + 0.002 * Math.max(0, n - 25);
}

function clickSynMul() {
  let m = 1;
  if (hasSyn('chick', 10)) m *= 1.05;
  if (hasSyn('chick', 50) && combo >= 30) m *= 1.2;
  if (hasSyn('dragon', 50) && frenzyTimer > 0) m *= 1.25;
  if (festActive > 0) m *= 2;
  return m;
}

function frenzyDuration() { return 20 + (hasSyn('dragon', 10) ? 2 : 0); }
function partyDuration() { return 30 + (hasSyn('whale', 25) ? 5 : 0); }
function offlineCapHours() { return 8 + (hasSyn('cat', 25) ? 1 : 0) + (hasSyn('whale', 10) ? 2 : 0); }
function offlineSynMul() { return (hasSyn('cat', 10) ? 1.1 : 1) * (hasSyn('whale', 100) ? 1.15 : 1); }
function dreamThreshold() { return hasSyn('cat', 50) ? 0.18 : 0.25; }

function achCount() { return Object.keys(S.achievements).length; }

/* 영혼 보너스는 총 획득량 기준 — 특성을 사도 수입이 줄지 않는다 */
function soulMul() { return 1 + S.prestige.totalSoulsEarned * 0.05; }

function globalMul() {
  const codexBonus = hasSyn('unicorn', 50) ? 1 + 0.005 * codexEntryCount() : 1;
  return (1 + achCount() * 0.01) * soulMul() * codexBonus;
}

function comboWindow() { return 0.9 + 0.15 * perkLv('combo'); }

function offlineRate() { return Math.min(1, 0.5 + 0.1 * perkLv('softtime')); }

function effNeed(i) {
  return STAGES[i].need * (1 - 0.05 * perkLv('evoseed'));
}

function soulsGain() {
  return Math.floor(Math.sqrt(S.totalEarned / 1e8) * (hasSyn('planet', 5) ? 1.05 : 1));
}

function decorClickMul() {
  let sum = 0;
  for (const d of DECOR) if (S.decor[d.id] && d.boost.click) sum += d.boost.click;
  return 1 + sum * decorAmp();
}

function decorCpsMul() {
  let sum = 0;
  for (const d of DECOR) if (S.decor[d.id] && d.boost.cps) sum += d.boost.cps;
  return 1 + sum * decorAmp();
}

function starLinger() {
  let bonus = 0;
  for (const d of DECOR) if (S.decor[d.id] && d.boost.star) bonus += d.boost.star;
  return 10 + bonus * decorAmp() + (hasSyn('dog', 10) ? 1 : 0);
}

function clickPower() {
  let add = 1, mul = 1, cpsPart = 0;
  for (const u of UPGRADES) {
    if (!S.upgrades[u.id]) continue;
    if (u.type === 'clickAdd') add += u.value;
    if (u.type === 'clickMul') mul *= u.value;
    if (u.type === 'clickCps') cpsPart += u.value;
  }
  const sticky = 1 + 0.25 * perkLv('sticky');
  return add * mul * globalMul() * sticky * decorClickMul() * clickSynMul() + totalCps() * cpsPart;
}

function cpsMulFactor() {
  let mul = 1;
  for (const u of UPGRADES) {
    if (S.upgrades[u.id] && u.type === 'cpsMul') mul *= u.value;
  }
  return mul * globalMul() * (1 + 0.2 * perkLv('promise')) * decorCpsMul()
    * planetMul()
    * (hasSyn('whale', 50) ? 1.1 : 1)
    * (hasSyn('planet', 25) ? 1.1 : 1);
}

function totalCps() {
  let base = 0;
  for (const p of PRODUCERS) base += p.cps * S.producers[p.id];
  return base * cpsMulFactor();
}

function comboMul() {
  const amp = hasSyn('chick', 25) ? 1.1 : 1;
  return 1 + Math.min(combo, 50) * 0.02 * amp;
}
function frenzyMul() { return frenzyTimer > 0 ? (hasSyn('dragon', 25) ? 8 : 7) : 1; }
function partyMul() { return partyTimer > 0 ? 5 : 1; }

let audioCtx = null;
function beep(freq, dur = 0.07, type = 'square', vol = 0.08) {
  if (!S.soundOn) return;
  try {
    if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
    const o = audioCtx.createOscillator();
    const g = audioCtx.createGain();
    o.type = type;
    o.frequency.value = freq;
    g.gain.setValueAtTime(vol, audioCtx.currentTime);
    g.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + dur);
    o.connect(g); g.connect(audioCtx.destination);
    o.start(); o.stop(audioCtx.currentTime + dur);
  } catch (e) { /* 오디오 미지원 환경 무시 */ }
}

const slimeCv = $('slime-canvas');
const slimeCtx = slimeCv.getContext('2d');

function drawSlime(t) {
  const stage = STAGES[stageIdx];
  let pal = stage.pal;
  if (stage.rainbow) {
    const hue = (t / 30) % 360;
    pal = {
      b: `hsl(${hue},80%,65%)`, l: `hsl(${hue},85%,82%)`,
      d: `hsl(${hue},70%,45%)`, o: `hsl(${hue},60%,22%)`,
    };
  }
  const colors = {
    o: pal.o, b: pal.b, l: pal.l, d: pal.d,
    w: '#ffffff',
    k: currentTrait ? currentTrait.pupil : '#26203a',  // 성향에 따라 눈동자 색 변화
    p: '#ff9fb2', y: '#ffd75e',
  };
  slimeCtx.clearRect(0, 0, 16, 17);

  for (let y = 0; y < SLIME_MAP.length; y++) {
    for (let x = 0; x < 16; x++) {
      let c = SLIME_MAP[y][x];
      if (c === '.') continue;
      if (blinking > 0 && (c === 'w' || c === 'k')) {
        if (y === 9) c = 'b';
        else c = 'k';
      }
      slimeCtx.fillStyle = colors[c];
      slimeCtx.fillRect(x, y, 1, 1);
    }
  }
  if (stage.crown) {
    for (let y = 0; y < CROWN_MAP.length; y++) {
      for (let x = 0; x < 16; x++) {
        const c = CROWN_MAP[y][x];
        if (c === '.') continue;
        slimeCtx.fillStyle = (y === 2 || (y === 1 && x % 3 === 0)) ? '#e0a82e' : colors.y;
        slimeCtx.fillRect(x, y + 1, 1, 1);
      }
    }
  }
}

const slimeWrap = $('slime-wrap');

function doClick(x, y) {
  const gain = clickPower() * comboMul() * frenzyMul();
  earnCoins(gain, 'click');
  S.totalClicks++;
  S.stats.run.clicks++;

  combo++;
  comboTimer = comboWindow();
  if (combo > S.stats.run.bestCombo) S.stats.run.bestCombo = combo;
  if (combo > S.stats.lifetime.bestCombo) S.stats.lifetime.bestCombo = combo;

  slimeCv.classList.remove('squish');
  void slimeCv.offsetWidth;
  slimeCv.classList.add('squish');

  spawnFloat(x, y, '+' + fmt(gain), frenzyTimer > 0);
  spawnSparks(x, y);
  sndClick();
  checkEvolution();
  renderHud();
}

window.addEventListener('keydown', e => {
  if (e.code !== 'Space' && e.code !== 'Enter') return;
  const tag = (e.target.tagName || '').toLowerCase();
  if (tag === 'button' || tag === 'input') return;
  e.preventDefault();
  const r = slimeCv.getBoundingClientRect();
  doClick(r.left + r.width / 2 + (Math.random() * 60 - 30), r.top + r.height * 0.55);
});

function spawnFloat(x, y, text, big) {
  const el = document.createElement('div');
  el.className = 'float-num' + (big ? ' big' : '');
  el.textContent = text;
  el.style.left = (x - 20 + (Math.random() * 40 - 20)) + 'px';
  el.style.top = (y - 30) + 'px';
  document.body.appendChild(el);
  setTimeout(() => el.remove(), 900);
}

const SPARK_COLORS = ['#ffd75e', '#ff8ac4', '#7dff8a', '#56b8f2', '#ffffff'];
function spawnSparks(x, y) {
  for (let i = 0; i < 5; i++) {
    const el = document.createElement('div');
    el.className = 'spark';
    el.style.background = SPARK_COLORS[Math.floor(Math.random() * SPARK_COLORS.length)];
    el.style.left = x + 'px';
    el.style.top = y + 'px';
    const ang = Math.random() * Math.PI * 2;
    const dist = 30 + Math.random() * 50;
    el.animate([
      { transform: 'translate(0,0) scale(1)', opacity: 1 },
      { transform: `translate(${Math.cos(ang) * dist}px, ${Math.sin(ang) * dist - 20}px) scale(0)`, opacity: 0 },
    ], { duration: 500 + Math.random() * 300, easing: 'ease-out' });
    document.body.appendChild(el);
    setTimeout(() => el.remove(), 850);
  }
}

/* ════════════════════════ 진화 / 성향 ════════════════════════ */

function currentStageFor(total) {
  let idx = 0;
  for (let i = 0; i < STAGES.length; i++) if (total >= effNeed(i)) idx = i;
  return idx;
}

function checkEvolution() {
  const idx = currentStageFor(S.totalEarned);
  if (idx > stageIdx) {
    stageIdx = idx;
    renderStageName();
    $('evo-flash').classList.remove('go');
    void $('evo-flash').offsetWidth;
    $('evo-flash').classList.add('go');
    sndEvo();
    toast(`🎉 진화! <b>${STAGES[idx].name}</b> 등장!`);
    showQuip(QUIPS.evolve[Math.floor(Math.random() * QUIPS.evolve.length)]);
    save();
  }
}

function detectTrait() {
  for (const t of TRAITS) if (t.cond()) return t;
  return null;
}

function renderStageName() {
  const el = $('stage-name');
  if (currentTrait) {
    el.innerHTML = `${STAGES[stageIdx].name} · <span class="trait">${currentTrait.name}</span>`;
  } else {
    el.textContent = STAGES[stageIdx].name;
  }
}

function renderEvoProgress() {
  const bar = $('evo-progress-bar');
  const label = $('evo-progress-label');
  if (stageIdx >= STAGES.length - 1) {
    bar.style.width = '100%';
    label.textContent = '✨ 최종 진화 완료! ✨';
    return;
  }
  const cur = effNeed(stageIdx);
  const next = effNeed(stageIdx + 1);
  const pct = Math.min(100, (S.totalEarned - cur) / (next - cur) * 100);
  bar.style.width = pct + '%';
  label.textContent = `${STAGES[stageIdx + 1].name}까지 ${fmt(Math.max(0, next - S.totalEarned))} 코인 (${pct.toFixed(1)}%)`;
}

/* ════════════════════════ 업적 ════════════════════════ */

function checkAchievements() {
  let newUnlock = false;
  for (const a of ACHIEVEMENTS) {
    if (S.achievements[a.id]) continue;
    if (ACH_CONDITIONS[a.id]()) {
      S.achievements[a.id] = true;
      newUnlock = true;
      toast(`${a.icon} 업적 달성! <b>${a.name}</b><br><small>전체 수입 +1%</small>`);
      sndAch();
    }
  }
  if (newUnlock) {
    save();
    if (currentTab === 'achievements') buildShop();
  }
}

/* ════════════════════════ 도감 / 별의 기록 ════════════════════════ */

function recordCodex() {
  let changed = false;
  for (let i = 0; i <= stageIdx; i++) {
    if (!S.codex.stages[i]) { S.codex.stages[i] = true; changed = true; }
  }
  if (currentTrait && !S.codex.traits[currentTrait.key]) {
    S.codex.traits[currentTrait.key] = true;
    changed = true;
  }
  for (const p of PRODUCERS) {
    const owned = S.producers[p.id];
    if (owned <= 0) continue;
    let entry = S.codex.friends[p.id];
    if (!entry) {
      entry = S.codex.friends[p.id] = { discovered: true, maxOwned: 0 };
      changed = true;
    }
    if (owned > entry.maxOwned) entry.maxOwned = owned;  // 환생해도 최고 기록은 남는다
  }
  return changed;
}

function checkStory() {
  let newUnlock = false;
  for (const st of STORY) {
    if (S.story[st.id]) continue;
    if (st.cond()) {
      S.story[st.id] = true;
      newUnlock = true;
      toast(`📜 별의 기록에 <b>${st.title}</b>이(가) 추가되었어요!`);
      beep(784, 0.12, 'triangle', 0.08);
    }
  }
  if (newUnlock) {
    save();
    if (currentTab === 'room') buildShop();
  }
}

/* ════════════════════════ 슬라임 방 (장식) ════════════════════════ */

function renderDecor() {
  const layer = $('decor-layer');
  layer.innerHTML = '';
  for (const d of DECOR) {
    if (!S.decor[d.id]) continue;
    const el = document.createElement('div');
    el.className = 'decor' + (d.center ? ' center' : '');
    el.innerHTML = decorSpriteHtml(d.id, d.icon, 'room-decor-sprite');
    for (const k of ['left', 'right', 'top', 'bottom']) {
      if (d.pos[k] !== undefined) el.style[k] = d.pos[k];
    }
    layer.appendChild(el);

}

function buyDecor(d) {
  if (S.decor[d.id] || S.coins < d.cost) return;
  S.coins -= d.cost;
  S.decor[d.id] = true;
  sndBuy();
  toast(`${d.icon} <b>${d.name}</b>을(를) 방에 놓았어요!`);
  renderDecor();
  buildShop();
  renderHud();
  save();
}

/* ════════════════════════ 플레이스타일 ════════════════════════ */

function playstyleName() {
  const click = earnShare('clickEarned');
  const idle = earnShare('idleEarned');
  const off = earnShare('offlineEarned');
  if (S.stats.run.starsClicked >= 20 && click < 0.5) return '⭐ 별 사냥꾼';
  if (click > 0.55) return '💪 클릭왕';
  if (off > 0.3) return '🛌 꿈꾸는 방랑자';
  if (idle + off > 0.75) return '🐱 방치 장인';
  return '⚖️ 균형 성장형';
}

/* ════════════════════════ 환생 ════════════════════════ */

function doPrestige() {
  const gain = soulsGain();
  if (gain < 1) return;
  const style = playstyleName();
  const ok = confirm(
    `젤리 환생을 할까요?\n\n` +
    `+ 젤리 영혼 ${gain}개 획득 (영혼 1개당 모든 수입 +5%)\n` +
    `- 코인, 친구들, 강화가 초기화돼요\n` +
    `- 업적, 영혼, 특성, 방 장식은 유지돼요\n\n` +
    `이번 생의 플레이스타일: ${style.replace(/^\S+ /, '')}`
  );
  if (!ok) return;

  S.prestige.souls += gain;
  S.prestige.totalSoulsEarned += gain;
  S.prestige.totalResets++;
  S.coins = 0;
  S.totalEarned = 0;
  S.producers = {};
  PRODUCERS.forEach(p => S.producers[p.id] = 0);
  S.upgrades = {};
  S.buffs.discount = false;
  S.stats.run = defaultState().stats.run;  // 이번 생 통계만 초기화
  combo = 0; comboTimer = 0; frenzyTimer = 0; partyTimer = 0;
  frenzyEarned = 0; festActive = 0; festWait = 60;
  stageIdx = 0;

  sndRebirth();
  $('evo-flash').classList.remove('go');
  void $('evo-flash').offsetWidth;
  $('evo-flash').classList.add('go');
  toast(`🌸 <b>환생!</b> 젤리 영혼 +${gain}<br><small>이번 생의 플레이스타일: <b>${style}</b></small>`);
  showQuip(QUIPS.rebirth[0]);

  currentTrait = detectTrait();
  renderStageName();
  rebuildFriends();
  buildShop();
  renderHud();
  save();
}

function buyPerk(perk) {
  const lv = perkLv(perk.id);
  if (lv >= perk.max) return;
  const cost = perkCost(perk.id);
  if (S.prestige.souls < cost) return;
  S.prestige.souls -= cost;
  S.prestige.perks[perk.id] = lv + 1;
  sndBuy();
  toast(`${perk.icon} <b>${perk.name}</b> Lv.${lv + 1}!`);
  buildShop();
  renderHud();
  save();
}

/* ════════════════════════ 친구 시각화 ════════════════════════ */

const friendsLayer = $('friends-layer');

function slotPos(i) {
  const ang = i * 2.39996;
  const rx = 150 + (i % 3) * 30;
  const ry = 70 + (i % 4) * 25;
  return { x: Math.cos(ang) * rx, y: Math.sin(ang) * ry + 60 };
}

function friendTier(count) {
  if (count >= 25) return 3;
  if (count >= 10) return 2;
  if (count >= 1) return 1;
  return 0;
}

function rebuildFriends() {
  friendsLayer.innerHTML = '';
  PRODUCERS.forEach((p, pi) => {
    const tier = friendTier(S.producers[p.id]);
    for (let k = 0; k < tier; k++) {
      const pos = slotPos(pi * 3 + k);
      const el = document.createElement('div');
      el.className = 'friend';
      el.style.left = `calc(50% + ${pos.x}px)`;
      el.style.top = `calc(45% + ${pos.y}px)`;
      const inner = document.createElement('span');
      inner.className = 'friend-body';
      inner.innerHTML = producerSpriteHtml(p.id, p.icon, 'friend-sprite', k);
      inner.style.animationDuration = (1.6 + Math.random() * 1.4) + 's';
      inner.style.animationDelay = (Math.random() * 2) + 's';
      if (Math.random() < 0.5) inner.style.transform = 'scaleX(-1)';
      el.appendChild(inner);
      friendsLayer.appendChild(el);
    }
  });
}

const shopList = $('shop-list');

function buildShop() {
  shopList.innerHTML = '';
  $('buy-modes').classList.toggle('on', currentTab === 'producers');

  if (currentTab === 'producers') {
    for (const p of PRODUCERS) {
      const el = document.createElement('div');
      el.className = 'shop-item';
      el.dataset.id = p.id;
      el.innerHTML = `
        <div class="shop-icon">${producerSpriteHtml(p.id, p.icon)}</div>
        <div class="shop-info">
          <div class="shop-name">${p.name}</div>
          <div class="shop-desc">${p.desc}</div>
          <div class="shop-desc shop-payback"></div>
          <div class="shop-desc shop-syn"></div>
          <div class="shop-cost"></div>
        </div>
        <div class="shop-count"></div>`;
      el.addEventListener('click', () => buyProducer(p));
      shopList.appendChild(el);
    }
  } else if (currentTab === 'upgrades') {
    for (const u of UPGRADES) {
      if (S.upgrades[u.id]) continue;
      const el = document.createElement('div');
      el.className = 'shop-item';
      el.dataset.id = u.id;
      el.innerHTML = `
        <div class="shop-icon">${itemSpriteHtml(u.id, u.icon)}</div>
        <div class="shop-info">
          <div class="shop-name">${u.name}</div>
          <div class="shop-desc">${u.desc}</div>
          <div class="shop-cost"></div>
        </div>`;
      el.addEventListener('click', () => buyUpgrade(u));
      shopList.appendChild(el);
    }
    if (!shopList.children.length) {
      shopList.innerHTML = '<div style="text-align:center;color:var(--text-dim);padding:30px 10px;font-size:13px;">모든 강화 완료! 🏆</div>';
    }
  } else if (currentTab === 'achievements') {
    const summary = document.createElement('div');
    summary.id = 'ach-summary';
    summary.textContent = `업적 ${achCount()}/${ACHIEVEMENTS.length} 달성 · 전체 수입 +${achCount()}%`;
    shopList.appendChild(summary);
    for (const a of ACHIEVEMENTS) {
      const done = !!S.achievements[a.id];
      const el = document.createElement('div');
      el.className = 'shop-item ach-item' + (done ? ' done' : '');
      el.innerHTML = `
        <div class="shop-icon">${achievementSpriteHtml(a.id, a.icon, done)}</div>
        <div class="shop-info">
          <div class="shop-name">${a.name}</div>
          <div class="shop-desc">${a.desc}</div>
        </div>
        <div class="shop-count">${done ? '✓' : ''}</div>`;
      shopList.appendChild(el);
    }
  } else if (currentTab === 'prestige') {
    buildPrestigeTab();
  } else {
    buildRoomTab();
  }
  refreshShop();
}

function refreshShop() {
  $('discount-badge').style.display = S.buffs.discount ? 'inline-block' : 'none';

  if (currentTab === 'producers') {
    for (const el of shopList.querySelectorAll('.shop-item')) {
      const p = PRODUCERS.find(x => x.id === el.dataset.id);
      if (!p) continue;
      const info = bulkInfo(p);
      const costEl = el.querySelector('.shop-cost');
      const prefix = buyMode === '1' ? '' : (buyMode === '10' ? 'x10 = ' : `x${info.count} = `);
      costEl.textContent = prefix + fmt(info.cost) + ' 코인' + (S.buffs.discount ? ' (50%↓)' : '');
      el.querySelector('.shop-count').textContent = S.producers[p.id] || '';

      const oneCost = producerCost(p) * (S.buffs.discount ? 0.5 : 1);
      const oneCps = p.cps * cpsMulFactor();
      el.querySelector('.shop-payback').textContent = `초당 +${fmt(p.cps)} · 회수 ${fmtTime(oneCost / oneCps)}`;

      const affordable = buyMode === 'max' ? info.count > 0 : S.coins >= info.cost;
      el.classList.toggle('locked', !affordable);

      const reveal = S.totalEarned >= p.baseCost * 0.4 || S.producers[p.id] > 0;
      el.querySelector('.shop-name').textContent = reveal ? p.name : '???';
      setProducerShopIcon(el, p, reveal);

      // 다음 시너지 표시 — "25마리까지만 더 사자"를 만드는 줄
      const synEl = el.querySelector('.shop-syn');
      if (reveal) {
        const next = nextSynergy(p.id);
        synEl.textContent = next
          ? `다음 시너지: ${next.at}마리 — ${next.desc}`
          : (SYNERGIES[p.id] ? '시너지 완성! ✨' : '');
      } else {
        synEl.textContent = '';
      }
    }
  } else if (currentTab === 'upgrades') {
    for (const el of shopList.querySelectorAll('.shop-item')) {
      const u = UPGRADES.find(x => x.id === el.dataset.id);
      if (!u) continue;
      const cost = u.cost * (S.buffs.discount ? 0.5 : 1);
      el.querySelector('.shop-cost').textContent = fmt(cost) + ' 코인' + (S.buffs.discount ? ' (50%↓)' : '');
      el.classList.toggle('locked', S.coins < cost);
    }
  } else if (currentTab === 'room') {
    for (const el of shopList.querySelectorAll('.decor-item')) {
      const d = DECOR.find(x => x.id === el.dataset.id);
      if (!d || S.decor[d.id]) continue;
      el.classList.toggle('locked', S.coins < d.cost);
    }
  }
}

function consumeDiscount() {
  if (S.buffs.discount) {
    S.buffs.discount = false;
    toast('⭐ 할인이 적용되었어요!');
  }
}

function buyProducer(p) {
  const info = bulkInfo(p);
  if (info.count === 0 || S.coins < info.cost) return;
  S.coins -= info.cost;
  S.producers[p.id] += info.count;
  consumeDiscount();
  sndBuy();
  rebuildFriends();
  refreshShop();
  renderHud();
  save();
}

function buyUpgrade(u) {
  const cost = u.cost * (S.buffs.discount ? 0.5 : 1);
  if (S.upgrades[u.id] || S.coins < cost) return;
  S.coins -= cost;
  S.upgrades[u.id] = true;
  consumeDiscount();
  sndBuy();
  toast(`${u.icon} <b>${u.name}</b> 구매 완료!`);
  buildShop();
  renderHud();
  save();
}

document.querySelectorAll('.tab').forEach(tab => {
  tab.addEventListener('click', () => {
    document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
    tab.classList.add('active');
    currentTab = tab.dataset.tab;
    buildShop();
  });
});

document.querySelectorAll('.mode-btn').forEach(btn => {
  btn.addEventListener('click', () => {
    document.querySelectorAll('.mode-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    buyMode = btn.dataset.mode;
    refreshShop();
  });
});

/* ════════════════════════ 황금별 이벤트 ════════════════════════ */

const starEl = $('golden-star');
let starTimer = 20 + Math.random() * 40;
let starVisible = 0;

function starInterval() {
  return (40 + Math.random() * 60) * (1 - 0.08 * perkLv('starlight')) * (hasSyn('dog', 25) ? 0.95 : 1);
}

function starSpawnRect() {
  const area = $('game-area').getBoundingClientRect();
  const maxX = Math.max(0, area.width - 140);
  const maxY = Math.max(0, area.height - 240);
  return {
    x: area.left + 40 + Math.random() * maxX,
    y: area.top + 70 + Math.random() * maxY,
  };
}

function spawnStar() {
  starVisible = starLinger();
  starEl.style.display = 'block';
  const pos = starSpawnRect();
  starEl.style.left = pos.x + 'px';
  starEl.style.top = pos.y + 'px';
  // 강아지 100: 별 등장을 놓치지 않게 반짝임 + 알림음
  if (hasSyn('dog', 100)) {
    starEl.style.filter = 'drop-shadow(0 0 24px #ffd75e)';
    beep(1568, 0.15, 'triangle', 0.07);
  } else {
    starEl.style.filter = '';
  }
}

function hideStar() {
  starVisible = 0;
  starEl.style.display = 'none';
  starTimer = starInterval();
}

const STAR_EVENTS = [
  { w: () => 30, run: (e) => {
      frenzyEarned = 0;
      frenzyTimer = frenzyDuration();
      toast(`⭐ <b>광란의 시간!</b> ${frenzyDuration()}초간 모든 수입 x${frenzyMul()}!`);
  }},
  { w: () => 25, run: (e) => {
      let bonus = Math.max(totalCps() * 90, clickPower() * 150, 50);
      if (hasSyn('dog', 50)) bonus *= 1.2;
      earnCoins(bonus, 'event');
      spawnFloat(e.clientX, e.clientY, '+' + fmt(bonus), true);
      toast(`⭐ 행운의 보너스! <b>+${fmt(bonus)}</b> 코인!`);
  }},
  { w: () => 20, run: (e) => {
      partyTimer = partyDuration();
      toast(`🎉 <b>친구 파티!</b> ${partyDuration()}초간 자동 생산 x5!`);
  }},
  { w: () => 15 + (hasSyn('rabbit', 50) ? 5 : 0), run: (e) => {
      S.buffs.discount = true;
      toast('🏷️ <b>별의 할인!</b> 다음 구매가 50% 할인돼요!');
  }},
  { w: () => 10, run: (e) => {
      toast('🌠 <b>미니 별똥별!</b> 작은 별들을 빠르게 클릭하세요!');
      spawnMiniStars();
  }},
];

function pickStarEvent() {
  const weights = STAR_EVENTS.map(ev => ev.w());
  const total = weights.reduce((a, w) => a + w, 0);
  let r = Math.random() * total;
  for (let i = 0; i < STAR_EVENTS.length; i++) {
    r -= weights[i];
    if (r <= 0) return STAR_EVENTS[i];
  }
  return STAR_EVENTS[0];
}

starEl.addEventListener('pointerdown', e => {
  e.stopPropagation();
  sndStar();
  S.stats.run.starsClicked++;
  S.stats.lifetime.starsClicked++;
  pickStarEvent().run(e);
  // 로켓 토끼 100: 별 이벤트 후 20% 확률로 미니 별똥별 추가
  if (hasSyn('rabbit', 100) && Math.random() < 0.2) {
    setTimeout(() => {
      toast('🐰 토끼들이 별똥별을 더 몰고 왔어요!');
      spawnMiniStars();
    }, 900);
  }
  hideStar();
  checkEvolution();
  renderHud();
  save();
});

function spawnMiniStars() {
  const count = 5 + (hasSyn('rabbit', 10) ? 1 : 0);
  for (let i = 0; i < count; i++) {
    const img = document.createElement('img');
    img.src = starDataURL;
    img.className = 'mini-star';
    img.alt = '미니 별똥별';
    const pos = starSpawnRect();
    img.style.left = pos.x + 'px';
    img.style.top = pos.y + 'px';
    img.addEventListener('pointerdown', ev => {
      ev.stopPropagation();
      let bonus = Math.max(totalCps() * 8, clickPower() * 15, 25);
      if (hasSyn('rabbit', 25)) bonus *= 1.3;
      if (hasSyn('dog', 50)) bonus *= 1.2;
      earnCoins(bonus, 'event');
      spawnFloat(ev.clientX, ev.clientY, '+' + fmt(bonus), true);
      beep(1175, 0.1, 'triangle', 0.09);
      img.remove();
      renderHud();
    }, { once: true });
    document.body.appendChild(img);
    setTimeout(() => img.remove(), 6000);
  }
}

/* ════════════════════════ HUD / 토스트 ════════════════════════ */

function renderHud() {
  $('coin-num').textContent = fmt(S.coins);
  const effMul = frenzyMul() * partyMul();
  const effCps = totalCps() * effMul;
  const suffix = effMul > 1 ? ` (x${effMul}!)` : '';
  $('cps-display').textContent = '초당 ' + fmt(effCps) + ' 코인' + suffix;
  $('stat-clicks').textContent = S.totalClicks.toLocaleString();
  $('stat-stars').textContent = S.stats.lifetime.starsClicked;
  $('stat-total').textContent = fmt(S.totalEarned);
  $('stat-power').textContent = fmt(clickPower() * comboMul() * frenzyMul());
  $('stat-ach').textContent = achCount();
  $('stat-souls').textContent = S.prestige.souls;
  $('stat-souls-total').textContent = S.prestige.totalSoulsEarned;
  $('stat-soul-bonus').textContent = S.prestige.totalSoulsEarned * 5;
  $('stat-resets').textContent = S.prestige.totalResets;
  renderEvoProgress();
}

function renderBuffBanner() {
  const banner = $('buff-banner');
  const parts = [];
  if (frenzyTimer > 0) parts.push(`⭐ 광란 x${frenzyMul()} (${Math.ceil(frenzyTimer)}초)`);
  if (partyTimer > 0) parts.push(`🎉 파티 x5 (${Math.ceil(partyTimer)}초)`);
  if (festActive > 0) parts.push(`🐤 축제 클릭 x2 (${Math.ceil(festActive)}초)`);
  if (parts.length) {
    banner.textContent = parts.join('  ');
    banner.style.display = 'block';
  } else {
    banner.style.display = 'none';
  }
}

let toastTimer = null;
function toast(html) {
  const el = $('toast');
  el.innerHTML = html;   // 주의: 내부 고정 문자열만 전달할 것 (사용자 입력 금지)
  el.classList.add('show');
  clearTimeout(toastTimer);
  toastTimer = setTimeout(() => el.classList.remove('show'), 3000);
}

/* ════════════════════════ 저장 / 불러오기 ════════════════════════ */

function save() {
  S.lastSave = Date.now();
  try { localStorage.setItem(SAVE_KEY, JSON.stringify(S)); } catch (e) {}
}

function migrateSave(data) {
  const base = defaultState();
  const out = Object.assign(base, data);

  // v4 이하: 평면 stats → lifetime/run 분리
  const ds = defaultState().stats;
  if (data.stats && data.stats.run) {
    out.stats = {
      lifetime: Object.assign({}, ds.lifetime, data.stats.lifetime || {}),
      run: Object.assign({}, ds.run, data.stats.run || {}),
    };
  } else {
    const old = data.stats || {};
    out.stats = {
      lifetime: {
        bestCombo: old.bestCombo || 0,
        starsClicked: old.starsClicked || 0,
        earned: data.totalEarned || 0,  // 과거 생애 누적은 복원 불가, 현재 누적으로 근사
      },
      run: {
        clicks: data.totalClicks || 0,
        bestCombo: old.bestCombo || 0,
        starsClicked: old.starsClicked || 0,
        clickEarned: old.clickEarned || 0,
        idleEarned: old.idleEarned || 0,
        offlineEarned: old.offlineEarned || 0,
      },
    };
  }

  out.buffs = Object.assign(defaultState().buffs, data.buffs || {});
  out.prestige = Object.assign(defaultState().prestige, data.prestige || {});
  out.prestige.perks = (data.prestige && data.prestige.perks) || {};
  // v4 이하: 총 획득 영혼 = 보유 + 특성에 쓴 영혼 (비용 = 1+2+...+lv)
  if (!out.prestige.totalSoulsEarned || out.prestige.totalSoulsEarned < out.prestige.souls) {
    let spent = 0;
    for (const k in out.prestige.perks) {
      const lv = out.prestige.perks[k];
      spent += lv * (lv + 1) / 2;
    }
    out.prestige.totalSoulsEarned = out.prestige.souls + spent;
  }
  out.decor = data.decor || {};
  out.story = data.story || {};
  out.codex = Object.assign(defaultState().codex, data.codex || {});
  out.codex.stages = (data.codex && data.codex.stages) || {};
  out.codex.traits = (data.codex && data.codex.traits) || {};
  out.codex.friends = (data.codex && data.codex.friends) || {};
  // v4 이하: boolean → { discovered, maxOwned } 객체
  for (const k in out.codex.friends) {
    if (out.codex.friends[k] === true) {
      out.codex.friends[k] = { discovered: true, maxOwned: (data.producers && data.producers[k]) || 0 };
    }
  }
  out.achievements = data.achievements || {};
  out.producers = Object.assign({}, defaultState().producers, data.producers || {});
  out.upgrades = data.upgrades || {};
  out.version = SAVE_VERSION;
  return out;
}

function load() {
  try {
    const raw = localStorage.getItem(SAVE_KEY);
    if (!raw) return;
    S = migrateSave(JSON.parse(raw));

    // 오프라인 보상: 기본 50% + 말랑한 시간 특성 + 고양이/고래 시너지
    const away = Math.min((Date.now() - (S.lastSave || Date.now())) / 1000, offlineCapHours() * 3600);
    let offline = totalCps() * away * offlineRate() * offlineSynMul();
    if (offline >= 1) {
      let dream = false;
      if (hasSyn('cat', 100) && Math.random() < 0.1) { offline *= 2; dream = true; }
      earnCoins(offline, 'offline');
      setTimeout(() => toast(dream
        ? `🐱💤 고양이의 꿈 보너스! 친구들이 <b>${fmt(offline)}</b> 코인을 모았어요! (x2)`
        : `💤 자리 비운 동안 친구들이 <b>${fmt(offline)}</b> 코인을 모았어요!`), 600);
    }
  } catch (e) {}
}

/* 초기화: 1.2초 길게 누르기 → 확인 */
const resetBtn = $('reset-btn');
let resetHold = null;

resetBtn.addEventListener('pointerdown', () => {
  resetBtn.classList.add('holding');
  resetHold = setTimeout(() => {
    resetBtn.classList.remove('holding');
    resetHold = null;
    if (confirm('정말 처음부터 다시 시작할까요? 환생 영혼을 포함해 모든 진행이 사라져요!')) {
      localStorage.removeItem(SAVE_KEY);
      location.reload();
    }
  }, 1200);
});
function cancelReset() {
  resetBtn.classList.remove('holding');
  if (resetHold) {
    clearTimeout(resetHold);
    resetHold = null;
    toast('초기화하려면 버튼을 <b>길게</b> 누르세요');
  }
}
resetBtn.addEventListener('pointerup', cancelReset);
resetBtn.addEventListener('pointerleave', cancelReset);

$('sound-btn').addEventListener('click', () => {
  S.soundOn = !S.soundOn;
  $('sound-btn').textContent = S.soundOn ? '🔊' : '🔇';
  if (S.soundOn) beep(660, 0.08);
  save();
});

window.addEventListener('beforeunload', save);

/* ════════════════════════ 메인 루프 ════════════════════════
   경제(수입·버프·타이머)는 econTick()으로 분리.
   rAF는 백그라운드 탭에서 완전히 멈추므로 setInterval에서도 호출한다.
   lastEcon 기준 실제 경과 시간으로 계산해 이중 적립은 없다. */

let lastEcon = performance.now();
let saveAcc = 0;
let achAcc = 0;

function econTick() {
  const now = performance.now();
  let dt = (now - lastEcon) / 1000;
  lastEcon = now;
  if (dt <= 0) return;
  dt = Math.min(dt, 3600); // 안전 상한

  const income = totalCps() * frenzyMul() * partyMul() * dt;
  if (income > 0) earnCoins(income, 'idle');

  if (comboTimer > 0) {
    comboTimer -= dt;
    if (comboTimer <= 0) combo = 0;
  }

  if (frenzyTimer > 0) {
    frenzyTimer -= dt;
    if (frenzyTimer <= 0) {
      frenzyTimer = 0;
      // 드래곤 100: 광란 중 번 코인의 10%를 보너스로
      if (hasSyn('dragon', 100) && frenzyEarned > 0) {
        const b = frenzyEarned * 0.1;
        earnCoins(b, 'event');
        toast(`🐲 광란 종료! 드래곤의 선물 <b>+${fmt(b)}</b> 코인!`);
      } else {
        toast('광란의 시간 종료!');
      }
      frenzyEarned = 0;
    }
  }
  if (partyTimer > 0) {
    partyTimer -= dt;
    if (partyTimer <= 0) { partyTimer = 0; toast('친구 파티 종료!'); }
  }
  // 병아리 100: 60초마다 10초간 클릭 x2 축제
  if (hasSyn('chick', 100)) {
    if (festActive > 0) {
      festActive -= dt;
      if (festActive <= 0) { festActive = 0; toast('병아리 축제 종료!'); }
    } else {
      festWait -= dt;
      if (festWait <= 0) {
        festActive = 10;
        festWait = 60;
        toast('🐤 <b>병아리 축제!</b> 10초간 클릭 x2!');
        sndAch();
      }
    }
  }

  if (starVisible > 0) {
    starVisible -= dt;
    if (starVisible <= 0) hideStar();
  } else {
    starTimer -= dt;
    if (starTimer <= 0) spawnStar();
  }

  blinkTimer -= dt;
  if (blinkTimer <= 0) { blinking = 0.15; blinkTimer = 2.5 + Math.random() * 3; }
  if (blinking > 0) blinking -= dt;

  // 슬라임 대사 (40~80초 간격)
  quipTimer -= dt;
  if (quipTimer <= 0) {
    randomQuip();
    quipTimer = 40 + Math.random() * 40;
  }

  checkEvolution();

  achAcc += dt;
  if (achAcc >= 0.5) {
    achAcc = 0;
    checkAchievements();
    const tr = detectTrait();
    if ((tr && tr.key) !== (currentTrait && currentTrait.key)) {
      currentTrait = tr;
      renderStageName();
      if (tr) {
        // 유니콘 25: 새 성향 첫 발견 시 코인 보너스
        if (!S.codex.traits[tr.key] && hasSyn('unicorn', 25)) {
          const b = Math.max(totalCps() * 120, clickPower() * 200, 100);
          earnCoins(b, 'event');
          toast(`✨ 슬라임에게 <b>${tr.name}</b>이 생겼어요!<br><small>🦄 유니콘의 축복 +${fmt(b)} 코인</small>`);
        } else {
          toast(`✨ 슬라임에게 <b>${tr.name}</b>이 생겼어요!`);
        }
      }
    }
    // 유니콘 100: 성향 오라
    slimeCv.style.filter = (currentTrait && hasSyn('unicorn', 100))
      ? `drop-shadow(0 0 14px ${currentTrait.pupil})`
      : '';
    recordCodex();
    checkStory();
  }

  saveAcc += dt;
  if (saveAcc >= 5) { saveAcc = 0; save(); }
}

let shopAcc = 0;
let lastFrame = performance.now();

function loop(t) {
  const dt = (t - lastFrame) / 1000;
  lastFrame = t;

  econTick();

  const cbox = $('combo-box');
  if (combo >= 3) {
    cbox.classList.add('on');
    $('combo-label').textContent = '콤보 x' + comboMul().toFixed(1) + '  (' + combo + ')';
    $('combo-bar').style.width = Math.max(0, comboTimer / comboWindow() * 100) + '%';
  } else {
    cbox.classList.remove('on');
  }
  renderBuffBanner();

  drawSlime(t);
  renderHud();

  shopAcc += dt;
  if (shopAcc >= 0.25) { shopAcc = 0; refreshShop(); }

  requestAnimationFrame(loop);
}

// 백그라운드 탭 대비: rAF가 멈춰도 경제는 계속 돈다
setInterval(() => {
  econTick();
  renderHud();
}, 1000);

/* ════════════════════════ 초기화 ════════════════════════ */

for (let i = 0; i < 40; i++) {
  const s = document.createElement('div');
  s.className = 'star';
  s.style.left = Math.random() * 100 + 'vw';
  s.style.top = Math.random() * 100 + 'vh';

}

load();
stageIdx = currentStageFor(S.totalEarned);
currentTrait = detectTrait();
recordCodex();
renderStageName();
$('sound-btn').textContent = S.soundOn ? '🔊' : '🔇';
buildShop();
rebuildFriends();
renderDecor();
renderHud();
checkStory();
requestAnimationFrame(loop);
