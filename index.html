<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>픽셀 슬라임 클리커</title>
<meta name="description" content="귀여운 도트 슬라임을 클릭해서 키우는 무료 방치형 클리커 게임. 친구들을 모으고, 진화시키고, 별을 잡으세요!">
<link rel="canonical" href="https://yuniwon.github.io/pixel-slime-clicker/">
<meta property="og:type" content="website">
<meta property="og:title" content="픽셀 슬라임 클리커">
<meta property="og:description" content="귀여운 도트 슬라임을 클릭해서 키우는 무료 방치형 클리커 게임. 친구들을 모으고, 진화시키고, 별을 잡으세요!">
<meta property="og:url" content="https://yuniwon.github.io/pixel-slime-clicker/">
<meta property="og:image" content="https://yuniwon.github.io/pixel-slime-clicker/icons/icon-512.png">
<meta property="og:locale" content="ko_KR">
<meta name="twitter:card" content="summary">
<meta name="twitter:title" content="픽셀 슬라임 클리커">
<meta name="twitter:description" content="귀여운 도트 슬라임을 클릭해서 키우는 무료 방치형 클리커 게임">
<meta name="twitter:image" content="https://yuniwon.github.io/pixel-slime-clicker/icons/icon-512.png">
<meta name="theme-color" content="#1a1033">
<link rel="manifest" href="manifest.json">
<link rel="icon" type="image/png" href="icons/icon-192.png">
<link rel="apple-touch-icon" href="icons/icon-192.png">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/quiple/galmuri/dist/galmuri.css">
<style>
  /* touch-action: manipulation — iOS 더블탭 줌 차단 (user-scalable은 iOS가 무시함).
     팬·스크롤은 그대로 허용된다 */
  * { margin: 0; padding: 0; box-sizing: border-box; user-select: none; -webkit-user-select: none; -webkit-tap-highlight-color: transparent; touch-action: manipulation; }

  :root {
    --bg1: #1a1033;
    --bg2: #2d1b4e;
    --panel: #241640;
    --panel-light: #322057;
    --border: #4a3178;
    --text: #f0e6ff;
    --text-dim: #9d8ac4;
    --gold: #ffd75e;
    --green: #7dff8a;
    --pink: #ff8ac4;
    --soul: #b48aff;
  }

  /* iOS Safari가 텍스트를 임의로 키우는 것 차단 — "확대된 느낌"의 주범 */
  html { -webkit-text-size-adjust: 100%; text-size-adjust: 100%; }
  html, body { height: 100%; height: 100dvh; overflow: hidden; }

  body {
    font-family: 'Galmuri11', 'DungGeunMo', 'Courier New', monospace;
    font-variant-numeric: tabular-nums;  /* 코인 카운터 자릿수 흔들림 방지 */
    background:
      radial-gradient(ellipse at 50% 120%, var(--stage-glow, #3d2566) 0%, transparent 60%),
      linear-gradient(180deg, var(--bg1) 0%, var(--bg2) 100%);
    color: var(--text);
    display: flex;
    flex-direction: row;
    image-rendering: pixelated;
    transition: background 1s ease;
  }
  /* 별빛 강화: 하늘이 실제로 밝아진다 */
  body.starlit-sky .star { background: #fff7d6; animation-duration: 1.6s; }

  /* ── 별 배경 ── */
  .star {
    position: fixed;
    width: 4px; height: 4px;
    background: #fff;
    opacity: .5;
    animation: twinkle 2.4s infinite;
    pointer-events: none;
    z-index: 0;
  }
  @keyframes twinkle { 0%,100% { opacity: .15; } 50% { opacity: .7; } }

  /* ── 메인 게임 영역 ── */
  #game-area {
    flex: 1;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    position: relative;
    z-index: 1;
    min-width: 0;
    overflow: hidden;
  }

  #title {
    font-size: 22px;
    letter-spacing: 2px;
    color: var(--gold);
    text-shadow: 3px 3px 0 #00000055;
    margin-bottom: 4px;
  }

  #stage-name {
    font-size: 13px;
    color: var(--text-dim);
    margin-bottom: 8px;
  }
  #stage-name .trait { color: var(--gold); }

  /* ── 진화 = 차오르는 슬라임 실루엣 (디자인 시스템 LiveGameScreen) ── */
  #evo-progress-wrap {
    text-align: center;
    margin-bottom: 8px;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 8px;
  }
  #evo-silhouette {
    width: 34px; height: 36px;
    -webkit-mask-size: contain;
    mask-size: contain;
    -webkit-mask-repeat: no-repeat;
    mask-repeat: no-repeat;
    -webkit-mask-position: center;
    mask-position: center;
    background: #ffffff22;
    image-rendering: pixelated;
  }
  #evo-progress-label { font-size: 11px; color: var(--text-dim); }

  #challenge-badge {
    display: none;
    font-size: 11px;
    color: #ffb86b;
    background: #00000055;
    border: 2px solid #8a5a2b;
    padding: 3px 10px;
    margin-bottom: 8px;
    text-shadow: 1px 1px 0 #00000088;
  }
  #challenge-badge.on { display: inline-block; }

  #coin-display {
    font-size: 32px;
    font-weight: bold;
    color: var(--gold);
    text-shadow: 2px 2px 0 #00000066;
    display: flex;
    align-items: center;
    gap: 10px;
  }

  #coin-icon { width: 28px; height: 28px; image-rendering: pixelated; animation: coinspin 2s steps(4) infinite; }
  @keyframes coinspin { 0% { transform: scaleX(1);} 25%{ transform: scaleX(.2);} 50%{ transform: scaleX(-1);} 75%{ transform: scaleX(.2);} 100%{ transform: scaleX(1);} }

  #cps-display { font-size: 14px; color: var(--green); margin-top: 4px; text-shadow: 1px 1px 0 #00000066; }

  #slime-wrap {
    margin: 24px 0 10px;
    cursor: pointer;
    position: relative;
    transition: filter .15s;
    outline: none;
  }
  #slime-wrap:active { filter: brightness(1.15); }
  #slime-wrap:focus-visible { filter: drop-shadow(0 0 8px var(--gold)); }

  #slime-canvas {
    width: 288px;
    height: 306px;
    image-rendering: pixelated;
    animation: bob 2.2s ease-in-out infinite;
    transform-origin: 50% 100%;
  }
  @keyframes bob {
    0%, 100% { transform: scale(1, 1); }
    50% { transform: scale(1.03, .96) translateY(2px); }
  }
  #slime-canvas.squish {
    animation: squish .18s ease-out;
  }
  @keyframes squish {
    0% { transform: scale(1.18, .78); }
    60% { transform: scale(.94, 1.1); }
    100% { transform: scale(1, 1); }
  }

  #slime-shadow {
    width: 200px; height: 26px;
    background: #00000055;
    border-radius: 50%;
    margin: -18px auto 0;
    filter: blur(2px);
  }

  /* ── 말풍선 ── */
  #speech-bubble {
    position: absolute;
    top: -14px; left: 50%;
    transform: translateX(-50%) scale(0);
    background: var(--text);
    color: #2d1b4e;
    font-size: 12px;
    line-height: 1.5;
    padding: 8px 14px;
    border: 3px solid #2d1b4e;
    box-shadow: 3px 3px 0 #00000055;
    max-width: 240px;
    width: max-content;
    text-align: center;
    z-index: 10;
    transition: transform .2s ease;
    pointer-events: none;
  }
  #speech-bubble.show { transform: translateX(-50%) scale(1); }
  #speech-bubble::after {
    content: '';
    position: absolute;
    bottom: -10px; left: 50%;
    margin-left: -5px;
    border: 5px solid transparent;
    border-top-color: #2d1b4e;
  }

  /* ── 친구 시각화: 행동 기반 주민 시스템 ── */
  #friends-layer {
    position: absolute;
    inset: 0;
    pointer-events: none;
    overflow: visible;
    z-index: 0;
  }
  .friend {
    position: absolute;
    filter: drop-shadow(2px 2px 0 #00000044);
    animation: friend-pop-in .3s ease-out;
  }
  @keyframes friend-pop-in {
    from { transform: scale(.2); opacity: 0; }
    to { transform: scale(1); opacity: 1; }
  }
  .fr-move { display: inline-block; animation-timing-function: ease-in-out; animation-iteration-count: infinite; }
  .fly-coin {
    position: fixed;
    width: 18px;
    height: 18px;
    image-rendering: pixelated;
    z-index: 55;
    pointer-events: none;
  }
  .fr-frames {
    display: inline-block;
    background-repeat: no-repeat;
    background-position: var(--fx0) var(--fy);
    animation: frframes steps(1) infinite;
    image-rendering: auto;
  }
  @keyframes frframes {
    0%, 50% { background-position: var(--fx0) var(--fy); }
    50.1%, 100% { background-position: var(--fx1) var(--fy); }
  }
  .friend-emoji { font-size: 30px; }

  .bv-peck { animation-name: bv-peck; animation-duration: 1.6s; }
  @keyframes bv-peck {
    0%, 52%, 100% { transform: translateY(0) rotate(0deg); }
    62% { transform: translateY(4px) rotate(13deg); }
    72% { transform: translateY(1px) rotate(3deg); }
    82% { transform: translateY(4px) rotate(13deg); }
  }
  .bv-snooze { animation-name: bv-snooze; animation-duration: 3.6s; }
  @keyframes bv-snooze {
    0%, 100% { transform: scaleY(1) translateY(0); }
    50% { transform: scaleY(.93) translateY(2px); }
  }
  .bv-run { animation-name: bv-run; animation-duration: 5.4s; animation-timing-function: linear; }
  @keyframes bv-run {
    0% { transform: translateX(-34px) scaleX(1); }
    48% { transform: translateX(34px) scaleX(1); }
    50% { transform: translateX(34px) scaleX(-1); }
    98% { transform: translateX(-34px) scaleX(-1); }
    100% { transform: translateX(-34px) scaleX(1); }
  }
  .bv-hop { animation-name: bv-hop; animation-duration: 6.5s; }
  @keyframes bv-hop {
    0%, 60%, 100% { transform: translateY(0); }
    66% { transform: translateY(-72px) rotate(-6deg); }
    72% { transform: translateY(-64px) rotate(4deg); }
    80% { transform: translateY(0); }
  }
  .bv-shine { animation-name: bv-shine; animation-duration: 2.8s; }
  @keyframes bv-shine {
    0%, 100% { transform: translateY(0); filter: drop-shadow(0 0 2px #ffffff44); }
    50% { transform: translateY(-6px); filter: drop-shadow(0 0 10px #ffd75ecc); }
  }
  .bv-guard { animation-name: bv-guard; animation-duration: 4.2s; }
  @keyframes bv-guard {
    0%, 100% { transform: translateY(0) rotate(-3deg); }
    50% { transform: translateY(-4px) rotate(3deg); }
  }
  .bv-cross { animation-name: bv-cross; animation-duration: 46s; animation-timing-function: linear; }
  @keyframes bv-cross {
    0% { transform: translateX(calc(-1 * min(34vw, 300px))) scaleX(1); }
    49% { transform: translateX(min(34vw, 300px)) scaleX(1); }
    51% { transform: translateX(min(34vw, 300px)) scaleX(-1); }
    100% { transform: translateX(calc(-1 * min(34vw, 300px))) scaleX(-1); }
  }
  .bv-orbit { animation-name: bv-orbit; animation-duration: 52s; animation-timing-function: linear; }
  @keyframes bv-orbit { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }

  @media (prefers-reduced-motion: reduce) {
    .fr-move, .fr-frames, #slime-canvas, .decor { animation: none !important; }
  }
  .sprite-icon {
    display: inline-block;
    flex: 0 0 auto;
    background-repeat: no-repeat;
    image-rendering: auto;
    vertical-align: middle;
  }
  /* 생성 에셋이 전반적으로 채도가 낮아 가볍게 보정한다 */
  .sprite-icon.friend-sprite { filter: saturate(1.3) drop-shadow(2px 2px 0 #00000055); }
  .sprite-icon.shop-sprite { filter: saturate(1.3) drop-shadow(2px 2px 0 #00000044); }
  .sprite-icon.locked-sprite {
    filter: grayscale(1) brightness(.48) drop-shadow(2px 2px 0 #00000044);
    opacity: .72;
  }
  .fr-frames { filter: saturate(1.3); }
  @keyframes friendbob {
    from { transform: translateY(0); }
    to { transform: translateY(-10px); }
  }

  /* ── 콤보 = 열기: 온도 칩 + 슬라임 뒤 오라 (디자인 시스템 LiveGameScreen) ── */
  #combo-box {
    height: 44px;
    margin-top: 10px;
    text-align: center;
    visibility: hidden;
  }
  #combo-box.on { visibility: visible; }
  #combo-chip {
    display: inline-block;
    font-size: 12px;
    padding: 3px 10px;
    white-space: nowrap;
    border: 2px solid var(--text-dim);
    color: var(--text-dim);
    background: #00000055;
    transition: border-color .25s, color .25s, box-shadow .25s;
  }
  #combo-bar-outer {
    width: 120px; height: 4px;
    background: #00000066;
    border: 1px solid var(--border);
    margin: 5px auto 0;
  }
  #combo-bar { height: 100%; width: 100%; background: var(--pink); transition: width .1s linear; }

  #combo-aura {
    position: absolute;
    left: 50%; top: 46%;
    width: 240px; height: 240px;
    border-radius: 50%;
    pointer-events: none;
    z-index: -1;
    opacity: 0;
    transition: opacity .3s, transform .3s;
  }
  #combo-aura.pulse { animation: aura-pulse .8s ease-in-out infinite alternate; }
  @keyframes aura-pulse { from { filter: brightness(1); } to { filter: brightness(1.25); } }

  .heat-particle {
    position: absolute;
    bottom: 40px;
    width: 5px; height: 5px;
    pointer-events: none;
    display: none;
  }
  #slime-wrap.heat .heat-particle { display: block; animation: heat-rise linear infinite; }
  @keyframes heat-rise {
    0% { transform: translateY(0); opacity: 1; }
    100% { transform: translateY(-110px); opacity: 0; }
  }

  /* ── 콤보 승급: 경계를 넘는 그 한 클릭의 연출 ── */
  #tier-ring {
    position: absolute;
    left: 50%; top: 50%;
    width: 180px; height: 180px;
    margin: -90px 0 0 -90px;
    border: 3px solid var(--gold);
    border-radius: 50%;
    transform: scale(0);
    opacity: 0;
    pointer-events: none;
  }
  #tier-ring.go { animation: tier-ring .35s ease-out; }
  @keyframes tier-ring {
    0% { transform: scale(.12); opacity: .95; }
    100% { transform: scale(1.2); opacity: 0; }
  }
  #tier-flash {
    position: fixed;
    inset: 0;
    opacity: 0;
    pointer-events: none;
    z-index: 40;
  }
  #tier-flash.go { animation: tier-flash .25s ease-out; }
  @keyframes tier-flash { 0% { opacity: .16; } 100% { opacity: 0; } }
  #slime-wrap.tier-up { animation: tier-punch .18s ease-out; }
  @keyframes tier-punch {
    0% { transform: scale(1); }
    35% { transform: scale(1.09); }   /* 70ms 지점 — 히트스톱 체감 */
    100% { transform: scale(1); }
  }

  #buff-banner {
    position: absolute;
    top: 12px; left: 50%;
    transform: translateX(-50%);
    background: #ffd75e;
    color: #5e4517;
    font-weight: bold;
    padding: 8px 18px;
    font-size: 14px;
    border: 3px solid #fff;
    box-shadow: 4px 4px 0 #00000055;
    display: none;
    z-index: 5;
    animation: buff-pulse .4s infinite alternate;
    white-space: nowrap;
  }
  @keyframes buff-pulse { from { transform: translateX(-50%) scale(1);} to { transform: translateX(-50%) scale(1.06);} }

  /* ── 떠오르는 숫자 ── */
  .float-num {
    position: fixed;
    font-size: 20px;
    font-weight: bold;
    color: var(--gold);
    text-shadow: 2px 2px 0 #00000088;
    pointer-events: none;
    z-index: 50;
    animation: floatup .9s ease-out forwards;
  }
  .float-num.big { font-size: 28px; color: var(--pink); }
  @keyframes floatup {
    0% { opacity: 1; transform: translateY(0) scale(1); }
    100% { opacity: 0; transform: translateY(-90px) scale(1.2); }
  }

  .spark {
    position: fixed;
    width: 8px; height: 8px;
    pointer-events: none;
    z-index: 49;
  }

  /* ── 황금별 / 미니 별똥별 ── */
  #golden-star {
    position: fixed;
    width: 64px; height: 64px;
    cursor: pointer;
    z-index: 60;
    display: none;
    image-rendering: pixelated;
    animation: starwobble .6s ease-in-out infinite alternate;
    filter: drop-shadow(0 0 12px #ffd75ecc);
  }
  @keyframes starwobble { from { transform: rotate(-12deg) scale(1);} to { transform: rotate(12deg) scale(1.12);} }

  /* ── 먹구름 손님 ── */
  #raincloud {
    position: fixed;
    width: 108px;
    height: 72px;
    cursor: pointer;
    z-index: 61;
    display: none;
    image-rendering: pixelated;
    filter: drop-shadow(0 4px 10px #00000088);
  }
  #raincloud.drift { animation: cloud-bob 2.4s ease-in-out infinite; }
  @keyframes cloud-bob {
    0%, 100% { transform: translateY(0); }
    50% { transform: translateY(-8px); }
  }
  #raincloud.challenge { animation: cloud-shake .35s ease-in-out infinite; }
  @keyframes cloud-shake {
    0%, 100% { transform: rotate(-2deg); }
    50% { transform: rotate(2deg); }
  }
  #raincloud img { width: 100%; height: 100%; image-rendering: pixelated; }
  #cloud-hint {
    position: absolute;
    top: -36px;
    left: 50%;
    transform: translateX(-50%);
    font-size: 11px;
    color: var(--gold);
    background: #000000aa;
    border: 2px solid var(--border);
    padding: 3px 8px;
    white-space: nowrap;
    text-shadow: 1px 1px 0 #000;
  }
  #cloud-bar-outer {
    position: absolute;
    top: -16px; left: 4px; right: 4px;
    height: 9px;
    background: #00000088;
    border: 2px solid #2a3140;
    display: none;
  }
  #raincloud.challenge #cloud-bar-outer { display: block; }
  #cloud-bar { height: 100%; width: 0%; background: linear-gradient(90deg, #7fc4ff, #ffd75e); }
  .raindrop {
    position: fixed;
    width: 4px; height: 9px;
    background: #7fc4ff;
    pointer-events: none;
    z-index: 60;
  }

  /* ── 길 잃은 별똥이 ── */
  #starlet {
    position: fixed;
    width: 56px;
    height: 56px;
    cursor: pointer;
    z-index: 61;
    display: none;
    image-rendering: pixelated;
    filter: drop-shadow(0 0 10px #ffd75e88);
    transition: left .4s ease-out, top .4s ease-out;
  }
  #starlet.waiting { animation: starlet-sniff 1.8s ease-in-out infinite; }
  @keyframes starlet-sniff {
    0%, 100% { transform: translateY(0) rotate(-3deg); }
    50% { transform: translateY(3px) rotate(3deg); }
  }
  #starlet.happy { animation: starlet-fly 1.1s ease-in forwards; }
  @keyframes starlet-fly {
    0% { transform: translateY(0) scale(1); opacity: 1; }
    100% { transform: translateY(-70vh) scale(.4); opacity: 0; }
  }
  #starlet img { width: 100%; height: 100%; image-rendering: pixelated; }
  #starlet-hint {
    position: absolute;
    top: -32px;
    left: 50%;
    transform: translateX(-50%);
    font-size: 11px;
    color: var(--gold);
    background: #000000aa;
    border: 2px solid var(--border);
    padding: 3px 8px;
    white-space: nowrap;
    text-shadow: 1px 1px 0 #000;
  }

  .mini-star {
    position: fixed;
    width: 32px; height: 32px;
    cursor: pointer;
    z-index: 60;
    image-rendering: pixelated;
    animation: starwobble .5s ease-in-out infinite alternate;
    filter: drop-shadow(0 0 8px #ffd75ecc);
  }

  /* ── 상점 패널 ── */
  #shop {
    width: 360px;
    background: var(--panel);
    border-left: 4px solid var(--border);
    display: flex;
    flex-direction: column;
    z-index: 2;
  }

  #shop-header {
    padding: 14px 16px 10px;
    border-bottom: 3px solid var(--border);
    display: flex;
    justify-content: space-between;
    align-items: center;
  }
  #shop-header h2 { font-size: 16px; color: var(--gold); letter-spacing: 1px; }
  #discount-badge {
    display: none;
    font-size: 11px;
    color: #5e4517;
    background: var(--gold);
    padding: 2px 8px;
    border: 2px solid #fff;
    animation: buff-pulse .5s infinite alternate;
  }

  .icon-btn {
    background: var(--panel-light);
    border: 2px solid var(--border);
    color: var(--text);
    font-family: inherit;
    font-size: 14px;
    padding: 4px 10px;
    cursor: pointer;
  }
  .icon-btn:hover { background: var(--border); }
  #reset-btn.holding { background: #8a2b2b; }

  #shop-tabs { display: flex; border-bottom: 3px solid var(--border); }
  .tab {
    flex: 1;
    text-align: center;
    padding: 10px 0;
    font-size: 12px;
    cursor: pointer;
    color: var(--text-dim);
    background: var(--panel);
  }
  .tab.active { color: var(--gold); background: var(--panel-light); }

  #buy-modes {
    display: none;
    gap: 6px;
    padding: 8px 10px 0;
  }
  #buy-modes.on { display: flex; }
  .mode-btn {
    flex: 1;
    background: var(--panel-light);
    border: 2px solid var(--border);
    color: var(--text-dim);
    font-family: inherit;
    font-size: 12px;
    padding: 5px 0;
    cursor: pointer;
  }
  .mode-btn.active { color: var(--gold); border-color: var(--gold); }

  #shop-list {
    flex: 1;
    overflow-y: auto;
    padding: 10px;
  }
  #shop-list::-webkit-scrollbar { width: 8px; }
  #shop-list::-webkit-scrollbar-thumb { background: var(--border); }

  .shop-item {
    display: flex;
    align-items: center;
    gap: 12px;
    background: var(--panel-light);
    border: 3px solid var(--border);
    padding: 10px 12px;
    margin-bottom: 8px;
    cursor: pointer;
    transition: transform .06s;
    position: relative;
  }
  .shop-item:hover:not(.locked) { border-color: var(--gold); }
  .shop-item:active:not(.locked) { transform: scale(.98); }
  .shop-item.locked { opacity: .45; cursor: not-allowed; }

  .shop-icon {
    font-size: 30px;
    width: 72px;
    min-width: 72px;
    text-align: center;
    display: flex;
    align-items: center;
    justify-content: center;
    filter: drop-shadow(2px 2px 0 #00000044);
  }
  .shop-info { flex: 1; min-width: 0; }
  .shop-name { font-size: 14px; font-weight: bold; }
  .shop-desc { font-size: 11px; color: var(--text-dim); margin-top: 3px; line-height: 1.4; }
  .shop-cost { font-size: 13px; color: var(--gold); margin-top: 4px; }
  .shop-count {
    font-size: 20px;
    font-weight: bold;
    color: var(--green);
    min-width: 36px;
    text-align: right;
  }

  /* 업적 */
  #ach-summary {
    text-align: center;
    font-size: 12px;
    color: var(--gold);
    padding: 4px 0 10px;
  }
  .ach-item { cursor: default; }
  .ach-item.done { border-color: var(--gold); }
  .ach-item.done .shop-name { color: var(--gold); }
  .ach-item:not(.done) { opacity: .5; }

  /* 환생 */
  #prestige-info {
    text-align: center;
    font-size: 12px;
    color: var(--soul);
    padding: 4px 0 10px;
    line-height: 1.8;
  }
  .prestige-btn { border-color: var(--soul); }
  .prestige-btn .shop-name { color: var(--soul); }
  .prestige-btn:hover:not(.locked) { border-color: var(--text); }
  .perk-item .shop-cost { color: var(--soul); }
  .perk-item.maxed { border-color: var(--soul); opacity: .8; cursor: default; }

  #stats-bar {
    border-top: 3px solid var(--border);
    padding: 10px 16px;
    font-size: 11px;
    color: var(--text-dim);
    line-height: 1.7;
  }
  #stats-bar .soul { color: var(--soul); }

  /* ── 슬라임 방 (장식) ── */
  #decor-layer {
    position: absolute;
    inset: 0;
    pointer-events: none;
    z-index: 0;
  }
  .decor {
    position: absolute;
    font-size: 34px;
    filter: drop-shadow(2px 2px 0 #00000055);
    animation: decorbob 3.2s ease-in-out infinite alternate;
  }
  @keyframes decorbob {
    from { transform: translateY(0); }
    to { transform: translateY(-5px); }
  }
  .decor.center { transform: translateX(-50%); animation: none; }

  .room-section-title {
    font-size: 12px;
    color: var(--gold);
    margin: 14px 4px 8px;
    letter-spacing: 1px;
  }
  .codex-grid {
    display: grid;
    grid-template-columns: repeat(5, 1fr);
    gap: 6px;
    margin-bottom: 4px;
  }
  .codex-grid.cols4 { grid-template-columns: repeat(4, 1fr); }
  .codex-cell {
    background: var(--panel-light);
    border: 2px solid var(--border);
    text-align: center;
    padding: 8px 2px 6px;
    font-size: 10px;
    color: var(--text-dim);
    line-height: 1.4;
    min-height: 58px;
  }
  .codex-cell.seen { border-color: var(--gold); color: var(--text); }
  .codex-swatch {
    width: 22px; height: 22px;
    margin: 0 auto 4px;
    border: 2px solid #00000055;
  }
  .trait-cell {
    min-height: 92px;
    padding-top: 6px;
  }
  .trait-preview {
    width: 48px;
    height: 51px;
    image-rendering: pixelated;
    margin: 0 auto 3px;
  }
  .trait-cell .trait-desc {
    color: var(--text-dim);
    font-size: 10px;
    line-height: 1.35;
  }
  .trait-cell.seen .trait-desc { color: var(--text); opacity: .8; }
  .codex-cell .sprite-icon { margin-bottom: 2px; }
  .story-entry {
    background: var(--panel-light);
    border: 3px solid var(--border);
    border-left-color: var(--gold);
    padding: 10px 12px;
    margin-bottom: 8px;
    font-size: 11px;
    line-height: 1.7;
    color: var(--text);
  }
  .story-entry .story-title { color: var(--gold); font-weight: bold; margin-bottom: 4px; font-size: 12px; }
  .story-entry.locked { opacity: .4; border-left-color: var(--border); }

  /* ── 기록의 선반: 업적 트로피가 물리적으로 켜지는 공간 ── */
  #trophy-shelf {
    position: absolute;
    bottom: 0; left: 0; right: 0;
    z-index: 3;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: clamp(10px, 0.9vw, 24px);
    padding: clamp(5px, 0.45vw, 14px) 14px;
    background: #00000033;
    border-top: 2px solid #ffffff0d;
    cursor: pointer;
  }
  #trophy-shelf .shelf-label {
    font-size: clamp(11px, 0.72vw, 28px);
    color: var(--text-dim);
    white-space: nowrap;
  }
  /* QHD에서 ≈44px — 구버전 22px의 200% 체감 기준 */
  #trophy-shelf .trophy { width: clamp(28px, 1.7vw, 66px); height: clamp(28px, 1.7vw, 66px); display: inline-block; }
  #trophy-shelf .trophy.dim { filter: grayscale(1) brightness(.35); }
  #trophy-shelf .trophy.fresh { animation: trophy-pop .5s ease-out; }
  @keyframes trophy-pop {
    0% { transform: scale(.2); }
    60% { transform: scale(1.35); }
    100% { transform: scale(1); }
  }

  /* ── 슬라임 앨범 ── */
  .album-box {
    background: var(--panel-light);
    border: 3px solid var(--border);
    padding: 10px 14px;
    margin-bottom: 8px;
  }
  .album-row {
    display: flex;
    justify-content: space-between;
    font-size: 11px;
    color: var(--text-dim);
    padding: 4px 0;
    border-bottom: 1px solid #00000033;
  }
  .album-row:last-child { border-bottom: none; }
  .album-row b { color: var(--gold); }

  .shop-syn { color: #d9b84a; }
  .syn-line { font-size: 10px; color: var(--text-dim); margin-top: 3px; line-height: 1.4; }
  .syn-line.on { color: var(--green); }

  /* ── 소원 / 별가루 ── */
  #stardust-display {
    text-align: center;
    font-size: 13px;
    color: var(--gold);
    padding: 6px 0 10px;
  }
  .wish-item { cursor: default; }
  .wish-item.done { border-color: var(--green); }
  .wish-bar-outer {
    height: 8px;
    background: #00000066;
    border: 2px solid var(--border);
    margin-top: 6px;
  }
  .wish-bar {
    height: 100%; width: 0%;
    background: linear-gradient(90deg, var(--pink), var(--gold));
    transition: width .25s ease;
  }
  .wish-reward { font-size: 11px; color: var(--gold); margin-top: 4px; }
  .cosmetic-item.equipped { border-color: var(--gold); }
  .cosmetic-item.equipped .shop-name::after { content: ' (장착 중)'; color: var(--green); font-size: 11px; }

  /* ── 배경 테마 ── */
  body.bg-dawn {
    background:
      radial-gradient(ellipse at 50% 120%, #7a3b5e 0%, transparent 60%),
      linear-gradient(180deg, #2b1a3e 0%, #5e2c50 70%, #8a4a4a 100%);
  }
  body.bg-abyss {
    background:
      radial-gradient(ellipse at 50% 120%, #173f5e 0%, transparent 60%),
      linear-gradient(180deg, #081826 0%, #0e2c44 100%);
  }
  body.bg-aurora {
    background:
      radial-gradient(ellipse at 30% 0%, #1d5e4a55 0%, transparent 50%),
      radial-gradient(ellipse at 70% 10%, #5e2c7a55 0%, transparent 50%),
      linear-gradient(180deg, #0e1f33 0%, #1d3a4e 100%);
  }

  /* ── 말풍선 테마 ── */
  #speech-bubble.bubble-pink { background: #ffd9ec; border-color: #a8336e; color: #5e1740; }
  #speech-bubble.bubble-pink::after { border-top-color: #a8336e; }
  #speech-bubble.bubble-gold { background: #ffeec4; border-color: #8a6d1f; color: #5c4312; }
  #speech-bubble.bubble-gold::after { border-top-color: #8a6d1f; }

  /* ── 주스: 코인 팝 / 구매 플래시 / 환생 플래시 ── */
  #coin-display.pop { animation: coinpop .15s ease-out; }
  @keyframes coinpop { 50% { transform: scale(1.09); } }
  .shop-item.bought { animation: boughtflash .45s ease-out; }
  @keyframes boughtflash {
    0% { transform: scale(.97); border-color: var(--gold); box-shadow: 0 0 16px #ffd75e99; }
    100% { transform: scale(1); }
  }
  #evo-flash.rebirth { background: radial-gradient(circle, #e8dcff 0%, #8d5ce8 100%); }

  /* ── 말랑 뉴스 티커: 상단 전폭 스트립 ── */
  #news-ticker {
    position: absolute;
    top: 0;
    left: 0;
    right: 0;
    text-align: center;
    /* 해상도 무관 균일 비율: QHD(2560)에서 ≈23px — 구버전 11px의 200% 체감 기준 */
    font-size: clamp(13px, 0.9vw, 36px);
    color: var(--text-dim);
    background: #00000044;
    border-bottom: 2px solid #ffffff0d;
    padding: clamp(7px, 0.55vw, 18px) 16px;
    text-shadow: 1px 1px 0 #00000088;
    opacity: 0;
    transition: opacity 1.2s ease;
    pointer-events: none;
    z-index: 3;
    line-height: 1.5;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }

  /* ── 퍼펙트 말랑 ── */
  .float-num.perfect {
    font-size: 32px;
    color: #ff5ea8;
    text-shadow: 2px 2px 0 #ffffff88, 4px 4px 0 #00000066;
  }
  .emoji-spark {
    position: fixed;
    font-size: 15px;
    pointer-events: none;
    z-index: 49;
  }

  /* ── 진화 축복 모달 ── */
  #blessing-overlay {
    position: fixed;
    inset: 0;
    background: #000000bb;
    z-index: 210;
    display: none;
    align-items: center;
    justify-content: center;
  }
  #blessing-overlay.open { display: flex; }
  #blessing-modal {
    background: var(--panel);
    border: 4px solid var(--gold);
    box-shadow: 6px 6px 0 #00000066, 0 0 30px #ffd75e44;
    width: min(380px, 92vw);
    padding: 18px;
    text-align: center;
    animation: modal-in .3s ease-out;
  }
  @keyframes modal-in {
    from { transform: scale(.8); opacity: 0; }
    to { transform: scale(1); opacity: 1; }
  }
  #blessing-modal.guarding .blessing-card { opacity: .55; pointer-events: none; }
  #blessing-modal h3 { color: var(--gold); font-size: 15px; margin-bottom: 4px; letter-spacing: 1px; }
  #blessing-modal .blessing-sub { font-size: 11px; color: var(--text-dim); margin-bottom: 14px; }
  .blessing-card {
    display: flex;
    align-items: center;
    gap: 12px;
    width: 100%;
    background: var(--panel-light);
    border: 3px solid var(--border);
    padding: 12px;
    margin-bottom: 8px;
    cursor: pointer;
    font-family: inherit;
    color: var(--text);
    text-align: left;
    transition: transform .08s;
  }
  .blessing-card:hover { transform: scale(1.02); }
  .blessing-card .b-icon { font-size: 28px; filter: drop-shadow(2px 2px 0 #00000044); }
  .blessing-card .b-name { font-size: 14px; font-weight: bold; }
  .blessing-card .b-rarity { font-size: 10px; margin-left: 6px; opacity: .9; }
  .blessing-card .b-desc { font-size: 11px; color: var(--text-dim); margin-top: 3px; }
  .blessing-card.rarity-common { border-color: #555a6e; }
  .blessing-card.rarity-rare { border-color: #56b8f2; }
  .blessing-card.rarity-epic { border-color: #b48aff; box-shadow: 0 0 10px #b48aff33; }
  .blessing-card.rarity-legendary {
    border-color: var(--gold);
    animation: leg-pulse .6s infinite alternate;
  }
  @keyframes leg-pulse {
    from { box-shadow: 0 0 10px #ffd75e44; }
    to { box-shadow: 0 0 22px #ffd75e99; }
  }

  /* ── 설정 모달 ── */
  #settings-overlay {
    position: fixed;
    inset: 0;
    background: #000000aa;
    z-index: 200;
    display: none;
    align-items: center;
    justify-content: center;
  }
  #settings-overlay.open { display: flex; }

  /* ── 젤리 결정: 화단 + 먹이기 모달 ── */
  #crystal-bed {
    position: absolute;
    left: 14px;
    bottom: clamp(46px, 4.2vw, 100px);  /* 기록의 선반 위 */
    z-index: 4;
    cursor: pointer;
    text-align: center;
    padding: 6px;
  }
  #crystal-visual {
    display: block;
    font-size: clamp(26px, 2vw, 44px);
    filter: drop-shadow(0 2px 4px #00000088);
    transition: filter .4s;
  }
  #crystal-bed.ripe #crystal-visual {
    animation: crystal-pulse 1.6s ease-in-out infinite;
    filter: drop-shadow(0 0 10px #b48aff) drop-shadow(0 2px 4px #00000088);
  }
  @keyframes crystal-pulse {
    0%, 100% { transform: scale(1); }
    50% { transform: scale(1.12); }
  }
  #crystal-label {
    display: block;
    font-size: clamp(9px, 0.62vw, 16px);
    color: var(--text-dim);
    text-shadow: 1px 1px 0 #000c;
    margin-top: 2px;
  }
  #crystal-bed.ripe #crystal-label { color: var(--gold); }
  #crystal-overlay {
    position: fixed;
    inset: 0;
    background: #000000aa;
    z-index: 200;
    display: none;
    align-items: center;
    justify-content: center;
  }
  #crystal-overlay.open { display: flex; }
  #crystal-modal {
    background: var(--panel);
    border: 4px solid var(--border);
    box-shadow: 6px 6px 0 #00000066;
    width: min(420px, 92vw);
    max-height: 86vh;
    overflow-y: auto;
    padding: 18px;
  }
  #crystal-modal h3 { color: var(--gold); font-size: 15px; margin-bottom: 8px; letter-spacing: 1px; }
  #crystal-count-line { font-size: 12px; color: var(--text); margin-bottom: 12px; line-height: 1.6; }
  .crystal-row {
    display: flex;
    align-items: center;
    gap: 10px;
    padding: 7px 4px;
    border-bottom: 2px solid #ffffff0d;
    font-size: 12px;
  }
  .crystal-row .cr-name { flex: 1; }
  .crystal-row .cr-lv { color: var(--green); font-size: 11px; }
  .crystal-row button {
    background: var(--panel-light);
    border: 2px solid var(--gold);
    color: var(--gold);
    font-family: inherit;
    font-size: 11px;
    padding: 5px 10px;
    cursor: pointer;
  }
  .crystal-row button:disabled { border-color: var(--border); color: var(--text-dim); cursor: default; }
  /* 황금 소원 카드 */
  .wish-item.golden { border-color: var(--gold); background: #ffd75e14; }
  .wish-item.golden.done { border-color: var(--green); }
  #crystal-banner { border-color: #b48aff; cursor: pointer; }
  #settings-modal {
    background: var(--panel);
    border: 4px solid var(--border);
    box-shadow: 6px 6px 0 #00000066;
    width: min(420px, 92vw);
    max-height: 86vh;
    overflow-y: auto;
    padding: 18px;
  }
  #settings-modal h3 { color: var(--gold); font-size: 15px; margin-bottom: 12px; letter-spacing: 1px; }
  #settings-modal h4 { color: var(--text-dim); font-size: 12px; margin: 14px 0 6px; }
  #settings-modal textarea {
    width: 100%;
    height: 64px;
    background: #00000055;
    border: 2px solid var(--border);
    color: var(--text);
    font-family: inherit;
    font-size: 10px;
    padding: 6px;
    resize: none;
  }
  .settings-row { display: flex; gap: 8px; margin-top: 6px; }
  .settings-btn {
    flex: 1;
    background: var(--panel-light);
    border: 2px solid var(--border);
    color: var(--text);
    font-family: inherit;
    font-size: 12px;
    padding: 8px 0;
    cursor: pointer;
  }
  .settings-btn:hover { border-color: var(--gold); }
  .settings-btn.danger { border-color: #8a2b2b; color: #ff9a9a; }

  /* ── 토스트 ── */
  #toast {
    position: fixed;
    bottom: 28px; left: 50%;
    transform: translateX(-50%) translateY(80px);
    background: var(--panel-light);
    border: 3px solid var(--gold);
    color: var(--text);
    padding: 12px 22px;
    font-size: 14px;
    z-index: 100;
    transition: transform .3s ease, opacity .3s ease, visibility .3s;
    box-shadow: 4px 4px 0 #00000066;
    text-align: center;
    line-height: 1.6;
    max-width: 90vw;
    opacity: 0;
    visibility: hidden;
    pointer-events: none;
  }
  #toast.show { transform: translateX(-50%) translateY(0); opacity: 1; visibility: visible; }

  /* ── 진화 플래시 ── */
  #evo-flash {
    position: fixed;
    inset: 0;
    background: #fff;
    opacity: 0;
    pointer-events: none;
    z-index: 90;
  }
  #evo-flash.go { animation: flash 1s ease-out; }
  @keyframes flash { 0% { opacity: .9; } 100% { opacity: 0; } }

  @media (max-width: 760px) {
    body { flex-direction: column; }
    /* 게임 영역은 화면의 44%로 고정 — 상점이 절반 이상을 확보한다 */
    #game-area {
      flex: 0 0 44dvh;
      height: 44dvh;
      padding-top: 30px;  /* 말랑뉴스 스트립 전용 공간 — 제목과 겹침 방지 */
      justify-content: flex-start;
    }
    #title { font-size: 13px; margin-top: 2px; }
    #stage-name { font-size: 10px; margin-bottom: 4px; }
    #evo-silhouette { width: 26px; height: 28px; }
    #evo-progress-label { font-size: 9px; }
    #coin-display { font-size: 17px; gap: 6px; }
    #coin-icon { width: 17px; height: 17px; }
    #cps-display { font-size: 10px; margin-top: 1px; }
    #slime-wrap { margin: 6px 0 2px; }
    #slime-canvas { width: 108px; height: 115px; }
    #slime-shadow { width: 72px; height: 13px; margin-top: -10px; }
    #combo-aura { width: 170px; height: 170px; }
    #tier-ring { width: 110px; height: 110px; margin: -55px 0 0 -55px; }
    /* 이벤트 손님들: 무대 크기에 맞는 비율로 */
    #golden-star { width: 44px; height: 44px; }
    #raincloud { width: 76px; height: 51px; }
    #cloud-hint { font-size: 10px; top: -30px; }
    #starlet { width: 44px; height: 44px; }
    #starlet-hint { font-size: 10px; top: -28px; }
    .mini-star { width: 24px; height: 24px; }
    .decor { font-size: 24px; }
    #combo-box { height: 34px; margin-top: 4px; }
    #combo-label { font-size: 12px; }
    #combo-bar-outer { width: 140px; height: 8px; }
    #challenge-badge { font-size: 10px; padding: 2px 8px; margin-bottom: 4px; }
    .friend { font-size: 20px; }
    #speech-bubble { font-size: 10px; max-width: 160px; padding: 6px 10px; }
    /* 상점: 나머지 전부 + iOS 홈바 안전영역 */
    #shop {
      width: 100%;
      flex: 1 1 auto;
      border-left: none;
      border-top: 4px solid var(--border);
      min-height: 0;
      padding-bottom: env(safe-area-inset-bottom);
    }
    #shop-header { padding: 6px 12px 4px; }
    #shop-header h2 { font-size: 12px; }
    .icon-btn { font-size: 11px; padding: 2px 7px; }
    .tab { padding: 7px 0; font-size: 11px; }
    /* 정보 밀도: 박스·아이콘·여백을 줄이고 폰트는 지킨다 —
       전체 축소(zoom)가 아니라 비율 재조정 */
    #shop-list { -webkit-overflow-scrolling: touch; padding: 6px 8px; }
    .shop-item { padding: 6px 8px; gap: 8px; margin-bottom: 5px; border-width: 2px; }
    .shop-icon { width: 40px; min-width: 40px; font-size: 24px; }
    /* scale은 시각만 줄인다 — 음수 마진으로 레이아웃 footprint도 40px로 */

/* 강화 타입별 집계 (신규 타입용) */
function upSum(type) {
  let v = 0;
  for (const u of UPGRADES) if (S.upgrades[u.id] && u.type === type) v += u.value;
  return v;
}
function upProd(type) {
  let v = 1;
  for (const u of UPGRADES) if (S.upgrades[u.id] && u.type === type) v *= u.value;
  return v;
}

/* 색 복원 틴트: 생성 파이프라인이 회색으로 죽인 에셋을 CSS colorize로 살린다.
   회색 픽셀은 명암 정보가 온전해서 sepia→hue-rotate 틴트가 깨끗하게 먹는다.
   새로 회색 에셋을 발견하면 여기에 한 줄 추가하면 끝. */
const TINT_FILTERS = {
  pink:   'sepia(1) saturate(5) hue-rotate(287deg) brightness(1.08)',
  violet: 'sepia(1) saturate(3.5) hue-rotate(220deg) brightness(1.02)',
};

const SPRITE_TINTS = {
  'cosmetics:aura-pink':   'pink',
  'cosmetics:bubble-pink': 'pink',
  'cosmetics:pt-heart':    'pink',
  'blessings:soulwhisper': 'violet',
  'items:prestige':        'violet',
};

/* 범용 스프라이트 렌더러.
   opts: { size, className, frame } — layout 미존재 시 fallback(이모지) 반환 */
function spriteHtml(atlasKey, id, fallback, opts = {}) {
  const atlas = SPRITE_ATLASES[atlasKey];
  if (!atlas || !atlas.sheet) return fallback;
  const frames = atlas.layout[id];
  if (!frames || !frames.length) return fallback;
  const r = frames[(opts.frame || 0) % frames.length];
  const size = opts.size || 60;
  const className = opts.className || 'shop-sprite';
  const scale = size / r.w;
  const style = [
    `width:${size}px`,
    `height:${size}px`,
    `background-image:url('${atlas.src}')`,
    `background-size:${atlas.sheet.w * scale}px ${atlas.sheet.h * scale}px`,
    `background-position:-${r.x * scale}px -${r.y * scale}px`,
  ];
  const tint = SPRITE_TINTS[`${atlasKey}:${id}`];
  if (tint) style.push(`filter:${TINT_FILTERS[tint]} drop-shadow(2px 2px 0 #00000044)`);
  return `<span class="sprite-icon ${className}" aria-hidden="true" style="${style.join(';')}"></span>`;
}

/* 기존 호출부 호환 래퍼 */
function producerSpriteHtml(id, fallback, className = 'shop-sprite', frame = 0) {
  const size = className.includes('friend-sprite') ? 56 : 64;
  return spriteHtml('friends', id, fallback, { size, className, frame });
}

function itemSpriteHtml(id, fallback, className = 'shop-sprite') {
  return spriteHtml('items', id, fallback, { size: 60, className });
}

function achievementSpriteHtml(id, fallback, done) {
  const className = done ? 'shop-sprite' : 'shop-sprite locked-sprite';
  return spriteHtml('achievements', id, done ? fallback : '❓', { size: 54, className });
}

function decorSpriteHtml(id, fallback, className = 'shop-sprite') {
  const size = className.includes('room-decor-sprite') ? 78 : 60;
  return spriteHtml('decor', id, fallback, { size, className });
}

function setProducerShopIcon(el, p, reveal) {

function fmt(n) {
  if (n < 0) return '0';
  if (n < 1000) return n < 100 && n % 1 !== 0 ? n.toFixed(1) : Math.floor(n).toLocaleString();
  const units = [[1e16, '경'], [1e12, '조'], [1e8, '억'], [1e4, '만']];
  for (const [v, u] of units) {
    if (n >= v) {
      const x = n / v;
      return (x >= 100 ? Math.floor(x).toLocaleString() : x.toFixed(x >= 10 ? 1 : 2)) + u;
    }
  }
  return Math.floor(n).toLocaleString();
}

function fmtTime(sec) {
  if (!isFinite(sec)) return '∞';
  if (sec < 60) return Math.ceil(sec) + '초';
  if (sec < 3600) return Math.floor(sec / 60) + '분 ' + Math.ceil(sec % 60) + '초';
  if (sec < 86400) return (sec / 3600).toFixed(1) + '시간';
  return (sec / 86400).toFixed(1) + '일';
}

/* 모든 코인 획득은 여기로: lifetime/run 통계가 함께 기록된다.
   kind: 'click' | 'idle' | 'offline' | 'event' */
function earnCoins(gain, kind) {
  S.coins += gain;
  S.totalEarned += gain;
  S.stats.lifetime.earned += gain;
  if (kind === 'click') S.stats.run.clickEarned += gain;
  else if (kind === 'idle') S.stats.run.idleEarned += gain;
  else if (kind === 'offline') S.stats.run.offlineEarned += gain;
  if (frenzyTimer > 0) frenzyEarned += gain;
  wishEvent('earn', gain);
}

function earnShare(key) {
  const r = S.stats.run;
  const tot = r.clickEarned + r.idleEarned + r.offlineEarned;
  return tot > 0 ? r[key] / tot : 0;
}

function producerCost(p, owned) {
  if (owned === undefined) owned = S.producers[p.id];
  return Math.ceil(p.baseCost * Math.pow(1.15, owned) * BC.prodDisc);
}

function bulkInfo(p) {
  const owned = S.producers[p.id];
  const budget = S.coins;
  const disc = S.buffs.discount ? 0.5 : 1;
  if (buyMode === '1') {
    return { count: 1, cost: producerCost(p, owned) * disc };
  }
  if (buyMode === '10') {
    let total = 0;
    for (let k = 0; k < 10; k++) total += producerCost(p, owned + k);
    return { count: 10, cost: total * disc };
  }
  // 상한 1000: 비용이 1.15^n 지수 성장이라 실질적으로 도달 불가능한 안전망
  let total = 0, count = 0;
  for (let k = 0; k < 1000; k++) {
    const c = producerCost(p, owned + count) * disc;
    if (total + c > budget) break;
    total += c;
    count++;
  }
  if (count === 0) return { count: 0, cost: producerCost(p, owned) * disc };
  return { count, cost: total };
}

function perkLv(id) { return S.prestige.perks[id] || 0; }

/* 특성 비용: (다음 레벨)² × 계수 — 영혼이 진짜 자원이 되도록 */
function perkCost(id) {
  const perk = PERKS.find(p => p.id === id);
  const next = perkLv(id) + 1;
  return next * next * ((perk && perk.costMul) || 1);
}

/* ── 친구 시너지 헬퍼 ── */
function hasSyn(id, n) { return S.producers[id] >= n; }

function nextSynergy(id) {
  const list = SYNERGIES[id] || [];
  return list.find(s => S.producers[id] < s.at) || null;
}

function codexEntryCount() {
  return Object.keys(S.codex.stages).length + Object.keys(S.codex.traits).length +
         Object.keys(S.codex.friends).length + Object.keys(S.story).length;
}

function decorAmp() {
  return 1 + (hasSyn('unicorn', 10) ? 0.1 : 0) + (hasSyn('planet', 10) ? 0.1 : 0);
}

function planetMul() {
  const n = S.producers.planet;
  return 1 + 0.01 * Math.min(n, 25) + 0.002 * Math.max(0, n - 25);
}

function clickSynMul() {
  let m = 1;
  if (hasSyn('chick', 10)) m *= 1.05;
  if (hasSyn('chick', 50) && combo >= 30) m *= 1.2;
  if (hasSyn('dragon', 50) && frenzyTimer > 0) m *= 1.25;
  if (festActive > 0) m *= 2;
  return m;
}

function frenzyDuration() { return 20 + (hasSyn('dragon', 10) ? 2 : 0) + BC.frenzyDur; }
function partyDuration() { return 30 + (hasSyn('whale', 25) ? 5 : 0) + BC.partyDur; }
function offlineCapHours() {
  return 8 + (hasSyn('cat', 25) ? 1 : 0) + (hasSyn('whale', 10) ? 2 : 0) + BC.offlineCap
    + 2 * perkLv('deeproot') + (hasSyn('turtle', 10) ? 3 : 0);
}

/* 별 코인 보상 통합 배율 (축복 + 강화 + 별의 혈통 특성) */
function starRewardMul() {
  return BC.starBonus * upProd('starBon') * (1 + 0.2 * perkLv('starborn'))
    * (hasSyn('spirit', 25) ? 1.2 : 1);
}
function offlineSynMul() { return (hasSyn('cat', 10) ? 1.1 : 1) * (hasSyn('whale', 100) ? 1.15 : 1); }
function dreamThreshold() { return hasSyn('cat', 50) ? 0.18 : 0.25; }

function achCount() { return Object.keys(S.achievements).length; }

/* 영혼 보너스: 총 획득량 기준 + 소프트캡 —
   처음 100개 +5%, 다음 400개 +2%, 그 이후 +0.5% */
function soulMul() {
  const n = S.prestige.totalSoulsEarned;
  return 1
    + 0.05 * Math.min(n, 100)
    + 0.02 * Math.min(Math.max(n - 100, 0), 400)
    + 0.005 * Math.max(n - 500, 0);
}

function globalMul() {
  const codexBonus = hasSyn('unicorn', 50) ? 1 + 0.005 * codexEntryCount() : 1;
  const levelMul = 1 + (slimeLevel - 1) * 0.02;  // 레벨당 +2% (이번 생)
  const soulfire = 1 + 0.1 * perkLv('soulfire');
  return (1 + achCount() * 0.01) * soulMul() * codexBonus * levelMul * BC.globalMulX * upProd('globMul') * soulfire
    * (hasSyn('turtle', 100) ? 1.1 : 1);
}

function comboWindow() {
  return 0.9 + 0.15 * perkLv('combo') + BC.comboWindow + upSum('comboWin') + (hasSyn('turtle', 25) ? 0.3 : 0);
}

function offlineRate() {
  if (BC.offlineFull) return 1;
  return Math.min(1, 0.5 + 0.1 * perkLv('softtime') + BC.offlineAdd);
}

/* 레벨 요구 배율: 초반 2배, Lv13부터 점점 가팔라져 최대 3.4배.
   중후반에 "갈증 구간"을 만들어 강화·축복·환생으로 뚫는 맛을 준다 */
function levelRatio(L) {
  return Math.min(3.4, 2 + 0.05 * Math.max(0, L - 12));
}

let levelTable = null;
function buildLevelTable() {
  levelTable = [0, 0, 100];  // L1=0, L2=100
  for (let L = 3; L <= MAX_LEVEL; L++) {
    levelTable[L] = levelTable[L - 1] * levelRatio(L);
  }
}
buildLevelTable();

/* 레벨 L에 도달하기 위한 누적 코인 */
function levelNeed(L) {
  if (L <= 1) return 0;
  const reduct = (1 - 0.05 * perkLv('evoseed')) * BC.evoNeed * (hasSyn('turtle', 50) ? 0.95 : 1);
  return levelTable[Math.min(L, MAX_LEVEL)] * reduct;
}

function currentLevelFor(total) {
  if (total < levelNeed(2)) return 1;
  let L = 2;
  while (L < MAX_LEVEL && total >= levelNeed(L + 1)) L++;
  return L;
}

function stageForLevel(level) {
  let idx = 0;
  for (let i = 0; i < STAGES.length; i++) if (level >= STAGES[i].atLevel) idx = i;
  return idx;
}

/* 영혼 획득: 로그 기반 — 누적코인이 지수로 커져도 영혼은 런의 "깊이"에 비례.
   (구 sqrt 공식은 환생마다 영혼이 3배씩 폭주해 수입 배율이 며칠만에 x1000+) */
function soulsGain() {
  const E = S.totalEarned;
  if (E < 6e7) return 0;
  const depth = Math.log10(E / 6e7);
  const base = Math.floor((1 + 3 * Math.pow(depth, 2.2)) * (hasSyn('planet', 5) ? 1.05 : 1));
  return base + BC.soulFlat;
}

function decorClickMul() {
  let sum = 0;
  for (const d of DECOR) if (S.decor[d.id] && d.boost.click) sum += d.boost.click;
  return 1 + sum * decorAmp();
}

function decorCpsMul() {
  let sum = 0;
  for (const d of DECOR) if (S.decor[d.id] && d.boost.cps) sum += d.boost.cps;
  return 1 + sum * decorAmp();
}

function starLinger() {
  let bonus = 0;
  for (const d of DECOR) if (S.decor[d.id] && d.boost.star) bonus += d.boost.star;
  return (10 + bonus * decorAmp() + (hasSyn('dog', 10) ? 1 : 0) + BC.starLinger) * BC.starLingerMul;
}

function clickPower() {
  let add = 1, mul = 1, cpsPart = 0;
  for (const u of UPGRADES) {
    if (!S.upgrades[u.id]) continue;
    if (u.type === 'clickAdd') add += u.value;
    if (u.type === 'clickMul') mul *= u.value;
    if (u.type === 'clickCps') cpsPart += u.value;
  }
  if (chActive() === 'silence') return 0;  // 침묵의 손: 클릭 수입 봉인
  const sticky = 1 + 0.25 * perkLv('sticky');
  return add * mul * globalMul() * sticky * decorClickMul() * clickSynMul() * BC.clickMul
    + totalCps() * (cpsPart + BC.clickCps);
}

function cpsMulFactor() {
  let mul = 1;
  for (const u of UPGRADES) {
    if (S.upgrades[u.id] && u.type === 'cpsMul') mul *= u.value;
  }
  return mul * globalMul() * (1 + 0.2 * perkLv('promise')) * decorCpsMul()
    * planetMul()
    * (hasSyn('whale', 50) ? 1.1 : 1)
    * (hasSyn('planet', 25) ? 1.1 : 1)
    * BC.cpsMul
    * (chActive() === 'starlit' ? 0.05 : 1);  // 별빛 사냥꾼: 생산 5%
}

function totalCps() {
  let base = 0;
  for (const p of PRODUCERS) base += p.cps * S.producers[p.id] * (1 + 0.01 * crystalLv(p.id));
  return base * cpsMulFactor();
}

function comboMul() {
  const amp = (hasSyn('chick', 25) ? 1.1 : 1) + BC.comboAmp;
  return 1 + Math.min(combo, BC.comboCap) * 0.02 * amp;
}

/* 콤보 온도 단계 — 열기가 그래픽으로 보인다 (디자인 시스템) */
function comboTier() {
  const r = Math.min(1, combo / BC.comboCap);
  if (r >= 0.7)  return { t: 3, label: '불타는 말랑!', color: '#ffd75e', r };
  if (r >= 0.45) return { t: 2, label: '후끈', color: '#ff8ac4', r };
  if (r >= 0.18) return { t: 1, label: '따끈', color: '#ff8ac4', r };
  return { t: 0, label: '말랑', color: '#9d8ac4', r };
}

/* 콤보 칩·오라·열기 파티클 갱신 — 클릭 즉시 + 매 프레임.
   매 프레임은 composite 속성(opacity/transform)만 — 페인트 비용(그라디언트·클래스)은

let auraTierShown = -1;

    aura.classList.toggle('pulse', tier.t >= 2);

    });

}
/* 콤보 승급: 경계(18/45/70%)를 넘는 그 한 클릭에 연출을 몰아준다 */
const TIER_ARPS = [null, [523, 659], [659, 784, 988], [784, 988, 1319, 1568]];
function comboTierUp(t) {

/* 불타는 콤보를 자연 타임아웃으로 잃었을 때만 — 환생/도전 리셋은 직접 0 대입이라 안 탄다 */
function comboLost() {
  const r = slimeCv.getBoundingClientRect();
  spawnFloat(r.left + r.width / 2, r.top, '🌫️ 열기가 식었어요', false, false);
  beep(196, 0.18, 'sine', 0.025);  // 극소 볼륨 한숨
}

function frenzyMul() { return frenzyTimer > 0 ? (hasSyn('dragon', 25) ? 8 : 7) + BC.frenzyMulAdd : 1; }
function partyMul() { return partyTimer > 0 ? 5 : 1; }

/* ════════════════════════ 사운드 (WebAudio) ════════════════════════ */

let audioCtx = null;
function beep(freq, dur = 0.07, type = 'square', vol = 0.08) {
  if (!S.soundOn) return;
  try {
    if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
    const o = audioCtx.createOscillator();
    const g = audioCtx.createGain();
    o.type = type;
    o.frequency.value = freq;
    g.gain.setValueAtTime(vol, audioCtx.currentTime);
    g.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + dur);
    o.connect(g); g.connect(audioCtx.destination);
    o.start(); o.stop(audioCtx.currentTime + dur);
  } catch (e) { /* 오디오 미지원 환경 무시 */ }
}

/* 음계 클릭: 클릭음을 BGM과 같은 C 펜타토닉으로 양자화 — 연타가 그대로 연주가 된다.
   트랜지언트(노이즈) + 바디(음계) + 스파클(10콤보마다 옥타브 위) 3레이어 */
let noiseBuf = null;
function clickNoise(vol) {
  if (!noiseBuf) {  // 버퍼는 1회만 생성 — 매 클릭 생성 시 GC 스터터
    noiseBuf = audioCtx.createBuffer(1, Math.ceil(audioCtx.sampleRate * 0.004), audioCtx.sampleRate);
    const d = noiseBuf.getChannelData(0);
    for (let i = 0; i < d.length; i++) d[i] = Math.random() * 2 - 1;
  }
  const src = audioCtx.createBufferSource();
  const g = audioCtx.createGain();
  src.buffer = noiseBuf;
  g.gain.value = vol;
  src.connect(g); g.connect(audioCtx.destination);
  src.start();
}

/* 햅틱: 안드로이드 즉발, iOS는 자동 no-op. 단발이 패턴 재생을 중간에 끊지 않게 가드 */
let hapticPatternUntil = 0;
function haptic(pattern) {
  if (!S.hapticOn || !navigator.vibrate) return;
  const now = Date.now();
  if (!Array.isArray(pattern) && now < hapticPatternUntil) return;
  if (Array.isArray(pattern)) hapticPatternUntil = now + pattern.reduce((a, b) => a + b, 0) + 150;
  try { navigator.vibrate(pattern); } catch (e) { /* 권한/지원 문제 무시 */ }
}

/* ── BGM: 프로시저럴 칩튠 자장가 (에셋 없음) ──
   C장조 펜타토닉 8분음표 패턴 4종 순환, 광란 중엔 한 옥타브 위 + 가벼운 박자 */
let musicTimer = null;
let musicNextTime = 0;
let musicBar = 0;

const MUSIC = {
  bpm: 72,
  scale: [262, 294, 330, 392, 440, 523],   // C4 D4 E4 G4 A4 C5
  bass: [131, 98, 110, 131],               // C3 G2 A2 C3
  patterns: [
    [0, 2, 4, -1, 3, 2, 0, -1],
    [2, 3, 4, -1, 5, 4, 3, -1],
    [4, 3, 2, 0, -1, 2, 1, -1],
    [0, 1, 2, -1, 1, 0, -1, -1],
  ],
};

function musicNote(freq, t, dur, type, vol) {
  const o = audioCtx.createOscillator();
  const g = audioCtx.createGain();
  o.type = type;
  o.frequency.value = freq;
  g.gain.setValueAtTime(0, t);
  g.gain.linearRampToValueAtTime(vol, t + 0.02);
  g.gain.exponentialRampToValueAtTime(0.001, t + dur);
  o.connect(g);
  g.connect(audioCtx.destination);
  o.start(t);
  o.stop(t + dur);
}

function scheduleMusicBar(t) {
  const beat = 60 / MUSIC.bpm;
  const eighth = beat / 2;
  const pat = MUSIC.patterns[musicBar % MUSIC.patterns.length];
  const frenzy = frenzyTimer > 0;
  pat.forEach((idx, i) => {
    if (idx < 0) return;
    musicNote(MUSIC.scale[idx] * (frenzy ? 2 : 1), t + i * eighth, eighth * 0.9, 'triangle', 0.022);
  });
  const bf = MUSIC.bass[musicBar % MUSIC.bass.length];
  musicNote(bf, t, beat * 1.8, 'sine', 0.03);
  musicNote(bf * 1.5, t + beat * 2, beat * 1.8, 'sine', 0.02);
  if (frenzy) for (let i = 0; i < 4; i++) musicNote(2093, t + i * beat, 0.03, 'square', 0.006);
  musicBar++;
  return beat * 4;
}

function musicTick() {
  if (!S.musicOn || !audioCtx || document.hidden) return;
  while (musicNextTime < audioCtx.currentTime + 0.45) {
    if (musicNextTime < audioCtx.currentTime) musicNextTime = audioCtx.currentTime + 0.05;
    musicNextTime += scheduleMusicBar(musicNextTime);
  }
}

function startMusic() {
  if (musicTimer) return;
  try {
    if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
    if (audioCtx.state === 'suspended') audioCtx.resume();
  } catch (e) { return; }
  musicNextTime = 0;
  musicTimer = setInterval(musicTick, 250);
}

function px(ctx, x, y, color, w = 1, h = 1) {
  ctx.fillStyle = color;

}

function drawTinyStar(ctx, x, y, color = '#ffd75e') {
  px(ctx, x, y - 1, '#fff8d6');
  px(ctx, x - 1, y, color);
  px(ctx, x, y, color);
  px(ctx, x + 1, y, color);
  px(ctx, x, y + 1, color);
}

function drawTraitOverlay(ctx, key, t = 0) {
  if (!key) return;
  if (key === 'muscle') {
    px(ctx, 4, 8, '#8f2334', 8, 1);
    px(ctx, 5, 7, '#ef5b66', 6, 1);
    px(ctx, 12, 8, '#ef5b66', 1, 1);
    px(ctx, 13, 7, '#8f2334', 1, 1);
    px(ctx, 13, 9, '#8f2334', 1, 1);
    px(ctx, 1, 11, '#ef5b66', 1, 2);
    px(ctx, 14, 11, '#ef5b66', 1, 2);
  } else if (key === 'ranch') {
    px(ctx, 3, 4, '#8f6a2f', 10, 1);
    px(ctx, 5, 2, '#d6b35b', 6, 1);
    px(ctx, 4, 3, '#f0cf72', 8, 1);
    px(ctx, 6, 4, '#f0cf72', 4, 1);
    px(ctx, 11, 2, '#6ed26d', 1, 1);
    px(ctx, 12, 1, '#3a9e4d', 1, 1);
  } else if (key === 'star') {
    drawTinyStar(ctx, 3, 4);
    drawTinyStar(ctx, 12, 3, '#e8b73a');
    px(ctx, 6, 9, '#fff8d6');
    px(ctx, 11, 9, '#fff8d6');
    px(ctx, 14, 7, '#ffd75e');
  } else if (key === 'dream') {
    px(ctx, 5, 3, '#5a9ad9', 6, 1);
    px(ctx, 6, 2, '#8ed0ff', 5, 1);
    px(ctx, 10, 1, '#5a9ad9', 2, 1);
    px(ctx, 12, 2, '#ffffff');
    px(ctx, 2, 5, '#dff5ff', 2, 1);
    px(ctx, 1, 6, '#bfe8ff', 4, 1);
    px(ctx, 3, 4, '#ffffff');
  } else if (key === 'samsara') {
    const pulse = Math.floor(t / 450) % 2;
    ctx.save();
    ctx.globalAlpha = pulse ? 0.55 : 0.35;
    for (let y = 4; y < SLIME_MAP.length; y++) {
      for (let x = 0; x < 16; x++) {
        if (SLIME_MAP[y][x] !== '.' && x > 0) px(ctx, x - 1, y, '#b48aff');
      }

    ctx.restore();
    px(ctx, 5, 2, '#d8c2ff', 6, 1);
    px(ctx, 4, 3, '#8d5ce8');
    px(ctx, 11, 3, '#8d5ce8');
    px(ctx, 3, 8, '#d8c2ff');
    px(ctx, 12, 8, '#d8c2ff');
    px(ctx, 5, 14, '#8d5ce8', 6, 1);
  }
}

function drawTraitPreview(ctx, key) {
  const pal = { b: '#5ad95a', l: '#aef2a4', d: '#37a837', o: '#1b4a26' };

/* 본체 스프라이트: 캔버스의 CSS 배경으로 아틀라스 셀을 깐다.
   캔버스 픽셀은 성향 오버레이 전용이 된다 (DOM 변경 없음) */
let slimeSpriteStage = -1;
let slimeFrame = 0;

function applySlimeSprite(force) {
  if (!slimeAtlasOk || !STAGES[stageIdx].spriteId) return false;
  if (!force && slimeSpriteStage === stageIdx) return true;
  slimeSpriteStage = stageIdx;
  slimeCv.style.backgroundImage = `url('${SLIME_ATLAS.src}')`;
  slimeCv.style.backgroundSize = '200% 500%';     // 셀 = 시트의 1/2 × 1/5
  slimeCv.style.backgroundRepeat = 'no-repeat';
  slimeCv.style.backgroundPosition = `${slimeFrame * 100}% ${stageIdx * 25}%`;
  return true;
}

function drawSlime(t) {
  // ── 스프라이트 모드: 본체는 배경, 캔버스엔 성향 흔적만 ──
  if (applySlimeSprite()) {
    const f = Math.floor(t / 700) % 2;  // 2프레임 idle
    if (f !== slimeFrame) {
      slimeFrame = f;
      slimeCv.style.backgroundPosition = `${f * 100}% ${stageIdx * 25}%`;
    }
    // 16×17용 성향 픽셀은 고해상 스프라이트와 형태가 안 맞아 블록 잔상이 됨 —
    // 스프라이트 모드에선 성향을 tick의 filter 오라 글로우로 표현 (전용 액세서리 아틀라스 대기)
    slimeCtx.clearRect(0, 0, 16, 17);
    return;
  }
  // ── 폴백: 기존 캔버스 픽셀 렌더 ──
  slimeCv.style.backgroundImage = '';
  const stage = STAGES[stageIdx];
  let pal = stage.pal;
  if (stage.rainbow) {
    const hue = (t / 30) % 360;
    pal = {
      b: `hsl(${hue},80%,65%)`, l: `hsl(${hue},85%,82%)`,
      d: `hsl(${hue},70%,45%)`, o: `hsl(${hue},60%,22%)`,
    };
  }
  const colors = {
    o: pal.o, b: pal.b, l: pal.l, d: pal.d,
    w: '#ffffff',
    k: currentTrait ? currentTrait.pupil : (hasSamsaraAura() ? SAMSARA_TRAIT.pupil : '#26203a'),  // 성향에 따라 눈동자 색 변화
    p: '#ff9fb2', y: '#ffd75e',
  };
  slimeCtx.clearRect(0, 0, 16, 17);

  for (let y = 0; y < SLIME_MAP.length; y++) {
    for (let x = 0; x < 16; x++) {
      let c = SLIME_MAP[y][x];
      if (c === '.') continue;
      if (blinking > 0 && (c === 'w' || c === 'k')) {
        if (y === 9) c = 'b';
        else c = 'k';
      }
      slimeCtx.fillStyle = colors[c];
      slimeCtx.fillRect(x, y, 1, 1);
    }
  }
  if (stage.crown) {
    for (let y = 0; y < CROWN_MAP.length; y++) {
      for (let x = 0; x < 16; x++) {
        const c = CROWN_MAP[y][x];
        if (c === '.') continue;
        slimeCtx.fillStyle = (y === 2 || (y === 1 && x % 3 === 0)) ? '#e0a82e' : colors.y;
        slimeCtx.fillRect(x, y + 1, 1, 1);
      }
    }
  }
  if (currentTrait) drawTraitOverlay(slimeCtx, currentTrait.key, t);
  // 윤회 오라는 행동 성향과 함께 겹쳐 보인다
  if (hasSamsaraAura()) drawTraitOverlay(slimeCtx, 'samsara', t);
}

  if (perfect) {
    spawnFloat(x, y - 10, '퍼펙트 말랑! +' + fmt(gain), false, true);
    spawnSparks(x, y);
    spawnSparks(x, y);
    sndPerfect();
    haptic([12, 40, 12]);
    wishEvent('perfect', 1);
  } else {
    spawnFloat(x, y, '+' + fmt(gain), frenzyTimer > 0);
    spawnSparks(x, y);
    sndClick();
    haptic(8);
  }

  // 오늘의 첫 말랑: 하루의 첫 클릭은 보장된 한 방 (로드 직후 2.5초는 오프라인 토스트에 양보)
  if (S.daily && S.daily.lastFirstSquish !== todayKey() && performance.now() > 2500) {
    firstSquishOfDay(x, y);
  }
  // 코인 카운터 팝
  const coinEl = $('coin-display');
  coinEl.classList.remove('pop');
  void coinEl.offsetWidth;
  coinEl.classList.add('pop');

  wishEvent('click', 1);
  wishEvent('combo', combo);
  updateComboVisual();  // 열기 즉시 반응
  checkEvolution();
  renderHud();
}

/* 무대 어디를 눌러도 말랑 — 정중앙 저격 불필요.
   별·먹구름·별똥이·선반 등 인터랙티브 요소는 자기 핸들러가 우선 */
$('game-area').addEventListener('pointerdown', e => {
  if (e.target.closest('#golden-star, #raincloud, #starlet, #trophy-shelf, #crystal-bed, .mini-star')) return;
  doClick(e.clientX, e.clientY);
});

/* iOS 더블탭 줌 마지막 구멍 막기.
   touch-action: manipulation은 첫 탭에서 요소가 사라지는 경우(구름·미니별 연타)와
   모달 위 빠른 연타에서 새는 케이스가 있다 — 350ms 내 두 번째 touchend의
   기본 동작(줌)을 직접 차단하고, 죽는 네이티브 click은 합성 click으로 살려서
   상점 연타 구매·축복 카드 탭이 끊기지 않게 한다 */
let lastTouchEnd = 0;
document.addEventListener('touchend', e => {
  const now = Date.now();
  // 텍스트 입력은 포커스·붙여넣기 동작을 건드리지 않는다
  if (e.target.closest('input, textarea, select')) { lastTouchEnd = now; return; }
  if (now - lastTouchEnd < 350 && e.cancelable) {
    e.preventDefault();
    const t = e.changedTouches[0];
    if (t) {
      const el = document.elementFromPoint(t.clientX, t.clientY);
      if (el) el.dispatchEvent(new MouseEvent('click', {
        bubbles: true, cancelable: true, clientX: t.clientX, clientY: t.clientY,
      }));
    }
  }
  lastTouchEnd = now;
}, { passive: false });

$('crystal-bed').addEventListener('click', crystalClick);
$('close-crystal-btn').addEventListener('click', () => $('crystal-overlay').classList.remove('open'));
$('crystal-overlay').addEventListener('click', e => {
  if (e.target.id === 'crystal-overlay') $('crystal-overlay').classList.remove('open');
});

window.addEventListener('keydown', e => {
  // Escape: 열려 있는 설정/결정 모달 닫기 (a11y — 키보드로 빠져나갈 길)
  if (e.key === 'Escape') {
    for (const id of ['settings-overlay', 'crystal-overlay']) {
      const ov = $(id);
      if (ov.classList.contains('open')) { ov.classList.remove('open'); e.preventDefault(); return; }
    }
    return;
  }
  if (e.code !== 'Space' && e.code !== 'Enter') return;
  const tag = (e.target.tagName || '').toLowerCase();
  if (tag === 'button' || tag === 'input') return;
  e.preventDefault();
  const r = slimeCv.getBoundingClientRect();
  doClick(r.left + r.width / 2 + (Math.random() * 60 - 30), r.top + r.height * 0.55);
});

function spawnFloat(x, y, text, big, perfect) {
  const el = document.createElement('div');
  el.className = 'float-num' + (big ? ' big' : '') + (perfect ? ' perfect' : '');
  el.textContent = text;
  el.style.left = (x - 20 + (Math.random() * 40 - 20)) + 'px';
  el.style.top = (y - 30) + 'px';
  document.body.appendChild(el);
  setTimeout(() => el.remove(), 900);
}

const SPARK_COLORS = ['#ffd75e', '#ff8ac4', '#7dff8a', '#56b8f2', '#ffffff'];
const PARTICLE_CAP = 60;  // 백그라운드 탭 타이머 스로틀에도 DOM이 무한히 쌓이지 않게

function particleCount() {
  return document.querySelectorAll('.spark, .emoji-spark').length;
}

function spawnSparks(x, y) {
  if (particleCount() > PARTICLE_CAP) return;
  const emoji = S.cosmetics.equipped.particle;  // 장착한 파티클 스킨
  for (let i = 0; i < 5; i++) {
    const el = document.createElement('div');
    if (emoji) {
      el.className = 'emoji-spark';
      el.textContent = emoji;
    } else {
      el.className = 'spark';
      el.style.background = SPARK_COLORS[Math.floor(Math.random() * SPARK_COLORS.length)];
    }
    el.style.left = x + 'px';
    el.style.top = y + 'px';
    const ang = Math.random() * Math.PI * 2;
    const dist = 30 + Math.random() * 50;
    el.animate([
      { transform: 'translate(0,0) scale(1)', opacity: 1 },
      { transform: `translate(${Math.cos(ang) * dist}px, ${Math.sin(ang) * dist - 20}px) scale(0)`, opacity: 0 },
    ], { duration: 500 + Math.random() * 300, easing: 'ease-out' });
    document.body.appendChild(el);
    setTimeout(() => el.remove(), 850);
  }
}

/* ════════════════════════ 진화 / 성향 ════════════════════════ */


function confettiBurst() {
  const r = slimeCv.getBoundingClientRect();
  const cx = r.left + r.width / 2;
  const cy = r.top + r.height / 2;
  for (let i = 0; i < 26; i++) {
    setTimeout(() => spawnSparkAt(
      cx + (Math.random() * 120 - 60),
      cy + (Math.random() * 80 - 40),
      SPARK_COLORS[Math.floor(Math.random() * SPARK_COLORS.length)],
    ), i * 28);

}

function checkEvolution() {
  const newLevel = currentLevelFor(S.totalEarned);
  if (newLevel <= slimeLevel) return;
  const jumped = newLevel - slimeLevel;
  slimeLevel = newLevel;
  const newStage = stageForLevel(slimeLevel);

  queueBlessing(jumped);  // 레벨업마다 축복 3택 1 (점프 시 누적)

  if (newStage > stageIdx) {
    // 외형 진화 마일스톤: 큰 축제
    stageIdx = newStage;
    const flash = $('evo-flash');
    flash.classList.remove('go', 'rebirth');
    void flash.offsetWidth;
    flash.classList.add('go');
    confettiBurst();
    sndEvo();
    toast(`🎉 Lv.${slimeLevel} 진화! <b>${STAGES[newStage].name}</b> 등장!`);
    showQuip(QUIPS.evolve[Math.floor(Math.random() * QUIPS.evolve.length)]);
  } else {
    // 일반 레벨업: 가벼운 축하
    sndAch();
    toast(`⬆️ <b>레벨 ${slimeLevel}!</b> 수입 +2% · 축복을 골라보세요`);
  }
  renderStageName();
  save();
}

function detectTrait() {
  for (const t of TRAITS) if (t.cond()) return t;
  return null;
}

function hasSamsaraAura() { return SAMSARA_TRAIT.cond(); }

/* 도감 표시용: 행동 성향 4종 + 윤회 */
const ALL_TRAITS = [...TRAITS, SAMSARA_TRAIT];

/* 스테이지별 하늘 글로우 — 진화하면 세계의 빛이 바뀐다 (코스메틱 배경 미장착 시) */
function applyStageGlow() {

function renderStageName() {

/* 진화 게이지: 슬라임 실루엣이 아래부터 차오른다 */
let silhouetteStage = -1;

function refreshSilhouette() {
  if (silhouetteStage === stageIdx) return;
  silhouetteStage = stageIdx;
  const el = $('evo-silhouette');
  if (slimeAtlasOk && STAGES[stageIdx].spriteId) {

    el.style.maskImage = `url('${SLIME_ATLAS.src}')`;

    el.style.maskSize = '200% 500%';

  el.style.maskSize = 'contain';

function renderEvoProgress() {
  const sil = $('evo-silhouette');
  const label = $('evo-progress-label');
  refreshSilhouette();
  if (slimeLevel >= MAX_LEVEL) {
    sil.style.background = 'linear-gradient(to top, var(--green), var(--gold))';
    label.textContent = '✨ 최고 레벨! 우주가 슬라임을 우러러봐요 ✨';
    return;
  }
  const cur = levelNeed(slimeLevel);
  const next = levelNeed(slimeLevel + 1);
  const pct = Math.max(0, Math.min(100, (S.totalEarned - cur) / (next - cur) * 100));
  sil.style.background =
    `linear-gradient(to top, var(--green) ${pct * 0.55}%, var(--gold) ${pct}%, #ffffff22 ${pct}%)`;
  const nextStage = STAGES.find(st => st.atLevel === slimeLevel + 1);
  label.textContent = `Lv.${slimeLevel + 1}까지 ${fmt(Math.max(0, next - S.totalEarned))} 코인 (${pct.toFixed(1)}%)`
    + (nextStage ? ` · ✨ 다음 레벨에 ${nextStage.name} 진화!` : '');
}

function checkAchievements() {

  let lastUnlocked = null;
  for (const a of ACHIEVEMENTS) {

function renderTrophyShelf(freshId) {

function recordCodex() {
  let changed = false;
  for (let i = 0; i <= stageIdx; i++) {
    if (!S.codex.stages[i]) { S.codex.stages[i] = true; changed = true; }
  }
  if (currentTrait && !S.codex.traits[currentTrait.key]) {
    S.codex.traits[currentTrait.key] = true;
    changed = true;
  }
  if (hasSamsaraAura() && !S.codex.traits.samsara) {
    S.codex.traits.samsara = true;
    changed = true;
    toast(`🌀 슬라임에게 <b>윤회의 고리</b>가 생겼어요!`);
  }
  for (const p of PRODUCERS) {
    const owned = S.producers[p.id];
    if (owned <= 0) continue;
    let entry = S.codex.friends[p.id];
    if (!entry) {
      entry = S.codex.friends[p.id] = { discovered: true, maxOwned: 0 };
      changed = true;
    }
    if (owned > entry.maxOwned) entry.maxOwned = owned;  // 환생해도 최고 기록은 남는다
  }
  return changed;
}

function checkStory() {
  let newUnlock = false;
  for (const st of STORY) {
    if (S.story[st.id]) continue;
    if (st.cond()) {
      S.story[st.id] = true;

      toast(`📜 별의 기록에 <b>${st.title}</b>이(가) 추가되었어요!`);
      beep(784, 0.12, 'triangle', 0.08);

  if (newUnlock) {
    save();
    if (currentTab === 'room') buildShop();
  }
}

/* ════════════════════════ 슬라임의 소원 / 별가루 ════════════════════════ */

function drawWish() {
  const activeTypes = S.wishes.active.map(w => w.type);
  const pool = WISH_TYPES.filter(t => {
    if (activeTypes.includes(t.type)) return false;
    if (t.type === 'upgrade' && UPGRADES.every(u => S.upgrades[u.id])) return false;
    return true;
  });
  if (!pool.length) return;
  const tpl = pool[Math.floor(Math.random() * pool.length)];
  const made = tpl.make(S.wishes.completed);
  S.wishes.active.push({
    type: tpl.type,
    icon: tpl.icon,
    target: made.target,
    progress: 0,
    reward: tpl.reward,
  });
}

function initWishes() {
  // 손상된 항목 정리 후 3개 채우기
  S.wishes.active = S.wishes.active.filter(w =>
    w && WISH_TYPES.some(t => t.type === w.type) && w.target > 0);
  while (S.wishes.active.length < 3) drawWish();
}

function wishText(w) {
  const tpl = WISH_TYPES.find(t => t.type === w.type);
  return tpl ? tpl.text(w) : '';
}

function wishEvent(type, amount) {
  let completedAny = false;
  for (let i = S.wishes.active.length - 1; i >= 0; i--) {
    const w = S.wishes.active[i];
    if (w.type !== type) continue;
    if (type === 'combo') w.progress = Math.max(w.progress, amount);
    else w.progress += amount;
    if (w.progress >= w.target) {
      S.wishes.active.splice(i, 1);
      const rw = w.reward + BC.wishDust;
      S.stardust += rw;
      S.wishes.completed++;
      completedAny = true;
      toast(`💫 소원 성취! <b>${wishText(w)}</b><br><small>별가루 +${rw}</small>`);
      sndAch();
    }
  }
  // 황금 소원: 하루 1개의 큰 소원
  const g = S.wishes.golden;
  if (g && !g.done && g.date === todayKey() && g.type === type) {
    if (type === 'combo') g.progress = Math.max(g.progress, amount);
    else g.progress += amount;
    if (g.progress >= g.target) {
      g.done = true;
      S.stardust += g.reward;
      S.wishes.completed++;
      completedAny = true;
      toast(`🌟 <b>황금 소원 성취!</b> ${goldenWishText(g)}<br><small>별가루 +${g.reward}</small>`);
      sndStar();
    }
  }
  if (completedAny) {
    initWishes();
    save();
    if (currentTab === 'wishes') buildShop();
  }
}

/* ── 황금 소원: 날짜 시드로 매일 1개, 자정 교체, 미완 페널티 없음 ── */
function dateSeed(key) {
  let h = 0;
  for (const ch of key) h = (h * 31 + ch.charCodeAt(0)) >>> 0;
  return h;
}

function goldenWishText(w) {
  const tpl = GOLDEN_WISH_TYPES.find(t => t.type === w.type);
  return tpl ? tpl.text(w) : '';
}

function refreshGoldenWish() {
  const today = todayKey();
  if (S.wishes.golden && S.wishes.golden.date === today) return;
  const seed = dateSeed(today);
  for (let i = 0; i < GOLDEN_WISH_TYPES.length; i++) {
    const tpl = GOLDEN_WISH_TYPES[(seed + i) % GOLDEN_WISH_TYPES.length];
    // 완료 불가 템플릿 폴백: 손님 계열은 첫 환생 전엔 페이스가 느려 일반형으로
    if ((tpl.type === 'cloud' || tpl.type === 'starlet') && S.prestige.totalResets < 1 && S.totalEarned < 1e6) continue;
    const made = tpl.make(S.wishes.completed);
    S.wishes.golden = {
      date: today, type: tpl.type, icon: tpl.icon,
      target: made.target, progress: 0, reward: 5, done: false,
    };
    return;
  }
}

/* ── 젤리 결정: 22시간 숙성 일일 자원 (Date.now() 기반, 오프라인 진행) ── */
const CRYSTAL = {
  early: 20 * 3600e3,   // 조기 수확 가능 (성공률 60%→)
  grow:  22 * 3600e3,   // 완숙 (100%)
  auto:  26 * 3600e3,   // 자동 수확 — 놓침 방지
  water: 2 * 3600e3,    // 하루 1회 물 주기 단축량
};

function crystalLv(id) { return S.crystal.friendLv[id] || 0; }
function crystalElapsed() { return Date.now() - S.crystal.plantedAt; }

function crystalHarvest(auto) {
  S.crystal.count++;
  S.crystal.plantedAt = auto ? S.crystal.plantedAt + CRYSTAL.auto : Date.now();
  if (!auto) {
    confettiBurst();
    sndAch();
    toast(`💎 <b>젤리 결정 수확!</b> 보유 ${S.crystal.count}개<br><small>친구들 탭에서 친구에게 먹여보세요</small>`);
  }
  save();
}

function crystalClick() {
  const el = crystalElapsed();
  if (el >= CRYSTAL.grow) { crystalHarvest(false); renderCrystalBed(true); return; }
  if (el >= CRYSTAL.early) {
    // 조기 수확 도박: 시간 경과형 성공률 60%→100%
    const p = 0.6 + 0.4 * (el - CRYSTAL.early) / (CRYSTAL.grow - CRYSTAL.early);
    if (!confirm(`아직 덜 익었어요. 지금 따면 성공 확률 ${Math.round(p * 100)}%!\n실패하면 결정이 부서져요. 딸까요?`)) return;
    if (Math.random() < p) {
      crystalHarvest(false);
    } else {
      S.crystal.plantedAt = Date.now();
      toast('💔 결정이 부서졌어요… 새 결정이 자라기 시작해요');
      beep(196, 0.2, 'sine', 0.04);
      save();
    }
    renderCrystalBed(true);
    return;
  }
  // 아직 어린 결정: 하루 1회 물 주기 = 2시간 단축
  if (S.crystal.watered !== todayKey()) {
    S.crystal.watered = todayKey();
    S.crystal.plantedAt -= CRYSTAL.water;
    spawnSparks(innerWidth * 0.08, innerHeight * 0.8);
    toast('💧 물을 주었어요! 결정이 <b>2시간</b> 빨리 익어요');
    beep(523, 0.1, 'triangle', 0.06);
    save();
  } else {
    toast(`💠 결정이 자라는 중… <b>${Math.round(crystalElapsed() / CRYSTAL.grow * 100)}%</b> (오늘 물은 이미 줬어요)`);
  }
  renderCrystalBed(true);
}

let crystalShownPhase = -1;
function renderCrystalBed(force) {
  const bed = $('crystal-bed');
  if (bed.hidden) bed.hidden = false;
  const el = crystalElapsed();
  const phase = el >= CRYSTAL.grow ? 3 : el >= CRYSTAL.early ? 2 : el >= 10 * 3600e3 ? 1 : 0;
  if (!force && phase === crystalShownPhase) return;
  crystalShownPhase = phase;
  const ids = ['seed', 'sprout', 'bud', 'ripe'];

/* ════════════════════════ 진화 축복 ════════════════════════ */

function hasBless(id) { return S.runBlessings.includes(id); }
function blessCount(id) { return S.runBlessings.filter(x => x === id).length; }

/* 축복 캐시: runBlessings가 바뀔 때만 재계산 (클릭 핫패스에서 순회 방지) */
let BC = null;

function computeBlessCache() {
  const c = {
    clickMul: 1, cpsMul: 1, globalMulX: 1, clickCps: 0,
    comboStart: 0, comboWindow: 0, comboAmp: 0, comboCap: 50, comboEternal: false,
    perfectAdd: 0, perfectPower: 5, perfectX2: false, perfectCombo: 0,
    starInt: 1, starLinger: 0, starLingerMul: 1, starBonus: 1, miniCount: 0,
    frenzyDur: 0, partyDur: 0, frenzyMulAdd: 0,
    offlineAdd: 0, offlineFull: false, offlineCap: 0,
    wishDust: 0, prodDisc: 1, upDisc: 1, evoNeed: 1, soulFlat: 0,
    luck: 0, twinStars: false,
  };
  for (const id of S.runBlessings) {
    const b = BLESSINGS.find(x => x.id === id);
    if (b) b.fx(c);
  }
  BC = c;
}
computeBlessCache();  // 초기 상태로 즉시 1회 (load 전 BC 참조 안전)

function luckTotal() {
  const raw = BC.luck + perkLv('instinct') * 5 + (hasSyn('spirit', 50) ? 10 : 0);
  // 소프트캡: 30 초과분은 40%만 — 전설 독점 방지
  return raw <= 30 ? raw : 30 + (raw - 30) * 0.4;
}

/* 등급 추첨: 행운이 상위 등급 확률을 끌어올린다 */
function pickRarity() {
  const L = luckTotal();
  let w = {
    common: Math.max(10, RARITY.common.w - L * 0.75),
    rare: RARITY.rare.w + L * 0.4,
    epic: RARITY.epic.w + L * 0.25,
    legendary: RARITY.legendary.w + L * 0.1,
  };
  const total = w.common + w.rare + w.epic + w.legendary;
  let r = Math.random() * total;
  for (const k of ['common', 'rare', 'epic', 'legendary']) {
    r -= w[k];
    if (r <= 0) return k;
  }
  return 'common';
}

function chActive() { return S.challenge.active; }

function challengeOf(id) { return CHALLENGES.find(c => c.id === id); }

/* 외길 목장: 처음 고용한 친구 종 */
function monoSpecies() {
  for (const p of PRODUCERS) if (S.producers[p.id] > 0) return p.id;
  return null;
}

let pendingBlessings = 0;
function rerollBase() { return 3 + Math.floor(slimeLevel / 10) * 2; }  // 후반일수록 리롤도 비싸게
let rerollCost = 3;   // 리롤할수록 +2, 새 선택마다 리셋 (Balatro식)

function drawOneBlessing(excludeIds) {
  // 1) 등급 추첨 → 2) 해당 등급 풀에서 성향 태그 3배 가중 추첨
  const favTag = currentTrait ? TRAIT_BLESSING_TAG[currentTrait.key] : (hasSamsaraAura() ? 'meta' : null);
  const order = ['legendary', 'epic', 'rare', 'common'];
  let rarity = pickRarity();
  let startIdx = order.indexOf(rarity);
  for (let step = startIdx; step < order.length; step++) {
    const r = order[step];
    const pool = BLESSINGS.filter(b =>
      b.rarity === r && !excludeIds.includes(b.id) && (b.stack || !hasBless(b.id)));
    if (!pool.length) continue;  // 등급 풀 고갈 시 하위 등급으로
    const weights = pool.map(b => b.tag === favTag ? 3 : 1);
    const total = weights.reduce((a, w) => a + w, 0);
    let roll = Math.random() * total;
    for (let i = 0; i < pool.length; i++) {
      roll -= weights[i];
      if (roll <= 0) return pool[i];
    }
    return pool[pool.length - 1];
  }
  return null;
}

function drawBlessingChoices() {
  const picks = [];
  for (let i = 0; i < 3; i++) {
    const b = drawOneBlessing(picks.map(x => x.id));
    if (b) picks.push(b);
  }
  return picks;
}

function renderBlessingCards() {
  const choices = drawBlessingChoices();
  if (!choices.length) { pendingBlessings = 0; $('blessing-overlay').classList.remove('open'); return false; }
  const wrap = $('blessing-cards');
  wrap.innerHTML = '';
  for (const b of choices) {
    const r = RARITY[b.rarity];
    const owned = b.stack ? blessCount(b.id) : 0;
    const card = document.createElement('button');
    card.className = 'blessing-card rarity-' + b.rarity;
    card.innerHTML = `
      <span class="b-icon">${spriteHtml('blessings', b.id, b.icon, { size: 34 })}</span>
      <span style="flex:1"><span class="b-name" style="color:${r.color}">${b.name}</span>
        <span class="b-rarity" style="color:${r.color}">${r.name}</span>
        <div class="b-desc">${b.desc}${owned ? ` · 보유 ${owned}개` : ''}</div></span>`;
    card.addEventListener('click', () => pickBlessing(b));
    wrap.appendChild(card);
  }
  // 리롤/스킵 버튼 상태 — 리롤과 패스 보상은 첫 환생부터 (운명을 다시 굴리는 힘)
  const rerollUnlocked = S.prestige.totalResets >= 1;
  $('blessing-reroll').style.display = rerollUnlocked ? '' : 'none';
  if (rerollUnlocked) {
    $('blessing-reroll').textContent = `🔁 리롤 (별가루 ${rerollCost})`;
    $('blessing-reroll').disabled = S.stardust < rerollCost;
  }
  $('blessing-skip').textContent = rerollUnlocked ? '괜찮아 (+1💫)' : '이번엔 괜찮아';
  return true;
}

let blessGuardUntil = 0;

function openBlessingModal() {
  rerollCost = rerollBase();
  if (!renderBlessingCards()) return;
  updateBlessingSub();
  $('blessing-overlay').classList.add('open');
  // 연타 중 오터치 방지: 잠깐 입력 잠금 + 흐리게 표시
  blessGuardUntil = performance.now() + 700;
  $('blessing-modal').classList.add('guarding');
  setTimeout(() => $('blessing-modal').classList.remove('guarding'), 700);
}

function rerollBlessings() {
  if (performance.now() < blessGuardUntil) return;
  if (S.stardust < rerollCost) return;
  S.stardust -= rerollCost;
  rerollCost += 2;
  S.telemetry.rerolls++;
  beep(523, 0.07);
  renderBlessingCards();
  save();
}

function updateBlessingSub() {
  const sub = document.querySelector('#blessing-modal .blessing-sub');
  if (sub) {
    sub.textContent = '진화한 슬라임이 축복을 하나 고를 수 있어요 (이번 생 한정)'
      + (pendingBlessings > 1 ? ` · 남은 선택 ${pendingBlessings}개` : '');
  }
}

function pickBlessing(b) {
  if (performance.now() < blessGuardUntil) return;
  S.runBlessings.push(b.id);
  S.codex.blessings[b.id] = true;
  computeBlessCache();
  sndAch();
  const r = RARITY[b.rarity];
  toast(`${b.icon} <b style="color:${r.color}">[${r.name}] ${b.name}</b>의 축복을 받았어요!`);
  if (b.rarity === 'legendary') { confettiBurst(); sndRebirth(); }
  afterBlessingChoice();
}

function skipBlessing() {
  if (performance.now() < blessGuardUntil) return;
  S.telemetry.skips++;
  if (S.prestige.totalResets >= 1) {
    S.stardust += 1;  // 패스에도 작은 보상 — 모든 선택이 유의미하게
    toast('💫 이번엔 괜찮아 — 별가루 +1');
  }
  afterBlessingChoice();
}

/* 선택 처리 후: 남은 선택이 있으면 모달을 닫지 않고 카드만 새로 —
   빠른 레벨업 구간에서 모달이 연속으로 떴다 닫히는 마찰 제거 */
function afterBlessingChoice() {
  pendingBlessings = Math.max(0, pendingBlessings - 1);
  save();
  if (pendingBlessings > 0) {
    rerollCost = rerollBase();
    renderBlessingCards();
    updateBlessingSub();
    blessGuardUntil = performance.now() + 350;
    const modal = $('blessing-modal');
    modal.classList.add('guarding');
    setTimeout(() => modal.classList.remove('guarding'), 350);
  } else {
    closeBlessingModal();
  }
}

function closeBlessingModal() {
  $('blessing-overlay').classList.remove('open');
  pendingBlessings = 0;
  save();
  if (currentTab === 'prestige' || currentTab === 'room') buildShop();
}

function queueBlessing(count) {
  pendingBlessings += count;
  if ($('blessing-overlay').classList.contains('open')) {
    updateBlessingSub();  // 이미 고르는 중이면 남은 개수만 갱신
  } else {
    setTimeout(openBlessingModal, 900);  // 레벨업 연출 먼저
  }
}

function cosmicSeedHtml() {
  // 12x12 픽셀 씨앗: 보랏빛 발아체
  const map = [
    '.....gg.....',
    '....gllg....',
    '.....gg.....',
    '....pppp....',
    '..ppllllpp..',
    '.plllsslllp.',
    '.plsslssslp.',
    '.plllsslllp.',
    '..ppllllpp..',
    '....pppp....',
    '...oooooo...',
    '..oooooooo..',
  ];
  const col = { g: '#7dff8a', l: '#d8c2ff', p: '#8d5ce8', s: '#fff8d6', o: '#3a2a5e' };
  const cv = document.createElement('canvas');
  cv.width = 12; cv.height = 12;
  const ctx = cv.getContext('2d');
  map.forEach((row, y) => [...row].forEach((ch, x) => {
    if (ch === '.') return;
    ctx.fillStyle = col[ch];
    ctx.fillRect(x, y, 1, 1);
  }));
  return `<img src="${cv.toDataURL()}" alt="우주 씨앗" style="width:44px;height:44px;image-rendering:pixelated;">`;
}

function playstyleName() {

  const idle = earnShare('idleEarned');
