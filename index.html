function doPrestige(challengeId = null) {
  const gain = soulsGain();
  if (gain < 1) return;
  const style = playstyleName();
  const ch = challengeId ? challengeOf(challengeId) : null;
  const ok = confirm(
    (ch ? `[도전 런: ${ch.name}] ${ch.desc}\n\n` : '') +
    `젤리 환생을 할까요?\n\n` +
    `+ 젤리 영혼 ${gain}개 획득 (영혼 1개당 모든 수입 +5%)\n` +
    `- 코인, 친구들, 강화가 초기화돼요\n` +
    `- 업적, 영혼, 특성, 방 장식은 유지돼요\n\n` +
    `이번 생의 플레이스타일: ${style.replace(/^\S+ /, '')}`
  );
  if (!ok) return;

  S.prestige.souls += gain;
  S.prestige.totalSoulsEarned += gain;
  S.prestige.totalResets++;
  S.coins = 0;
  S.totalEarned = 0;
  S.producers = {};
  PRODUCERS.forEach(p => S.producers[p.id] = 0);
  S.upgrades = {};
  S.buffs.discount = false;
  S.stats.run = defaultState().stats.run;  // 이번 생 통계만 초기화
  S.runBlessings = [];                      // 축복도 이번 생 한정
  S.challenge = { active: challengeId, startedAt: challengeId ? Date.now() : 0 };
  if (challengeId) S.telemetry.challengesStarted++;
  if (challengeId === 'silence') S.producers.chick = 3;  // 침묵의 손: 동행 병아리
  pendingBlessings = 0;
  $('blessing-overlay').classList.remove('open');
  combo = 0; comboTimer = 0; frenzyTimer = 0; partyTimer = 0;
  frenzyEarned = 0; festActive = 0; festWait = 60;
  rerollCost = 3;
  computeBlessCache();

  // 깊은 층 시작: 이미 정복한 초반 레벨은 건너뛴다 (환생 1.5회당 +1, 최대 Lv15)
  const startLevel = Math.min(1 + Math.floor(S.prestige.totalResets * 1.5), 15);
  if (startLevel > 1) {
    S.totalEarned = levelNeed(startLevel);
    slimeLevel = startLevel;
    // 건너뛴 구간의 축복은 일부를 일괄 선택 (3레벨당 1회)
    queueBlessing(Math.ceil((startLevel - 1) / 3));
  } else {
    slimeLevel = 1;
  }
  stageIdx = stageForLevel(slimeLevel);

  sndRebirth();
  const flash = $('evo-flash');
  flash.classList.remove('go', 'rebirth');
  void flash.offsetWidth;
  flash.classList.add('go', 'rebirth');  // 환생은 보랏빛 별빛 플래시
  toast(`🌸 <b>환생!</b> 젤리 영혼 +${gain}`
    + (startLevel > 1 ? `<br><small>깊은 층에서 시작 — <b>Lv.${startLevel}</b>부터, 시작 축복 ${Math.ceil((startLevel - 1) / 3)}개!</small>` : '')
    + `<br><small>이번 생의 플레이스타일: <b>${style}</b></small>`);
  showQuip(QUIPS.rebirth[0]);

  currentTrait = detectTrait();
  renderStageName();
  rebuildFriends();
  buildShop();
  renderHud();
  save();
}

function completeChallenge() {
  const c = challengeOf(chActive());
  if (!c) { S.challenge.active = null; return; }
  S.codex.challenges[c.id] = true;
  S.stardust += c.reward;

  toast(`🏆 <b>도전 완수!</b> ${c.icon} ${c.name}<br><small>별가루 +${c.reward} — 이제 편하게 플레이해도 돼요</small>`);
  showQuip('우리, 해냈어!');

}

function abandonChallenge(silent) {
  S.challenge.active = null;
  if (!silent) toast('도전을 내려놓았어요. 잃은 건 없어요!');
  if (currentTab === 'prestige') buildShop();
  save();
}

function buyPerk(perk) {
  const lv = perkLv(perk.id);
  if (lv >= perk.max) return;
  const cost = perkCost(perk.id);
  if (S.prestige.souls < cost) return;
  S.prestige.souls -= cost;
  S.prestige.perks[perk.id] = lv + 1;
  sndBuy();
  toast(`${perk.icon} <b>${perk.name}</b> Lv.${lv + 1}!`);
  buildShop();
  renderHud();
  save();
}

function friendCount(owned) {
  if (owned >= 25) return 3;
  if (owned >= 10) return 2;
  if (owned >= 1) return 1;
  return 0;
}

/* 2프레임 스프라이트 애니메이션 (아틀라스에 친구별 2프레임 존재) */
function friendSpriteAnimHtml(id, size) {
  const frames = PRODUCER_SPRITE_LAYOUT[id];
  if (!frames) {
    const p = PRODUCERS.find(x => x.id === id);
    return `<span class="friend-emoji">${p ? p.icon : '❓'}</span>`;
  }
  const f0 = frames[0];
  const f1 = frames[1] || frames[0];
  const scale = size / f0.w;
  const style = [
    `width:${size}px`,
    `height:${size}px`,
    `background-image:url('${PRODUCER_SPRITE_ATLAS}')`,
    `background-size:${PRODUCER_SPRITE_SHEET.w * scale}px ${PRODUCER_SPRITE_SHEET.h * scale}px`,
    `--fx0:${(-f0.x * scale).toFixed(1)}px`,
    `--fx1:${(-f1.x * scale).toFixed(1)}px`,
    `--fy:${(-f0.y * scale).toFixed(1)}px`,
    `animation-duration:${(0.7 + Math.random() * 0.6).toFixed(2)}s`,
    `animation-delay:${(Math.random() * 0.9).toFixed(2)}s`,
  ].join(';');
  return `<span class="sprite-icon fr-frames" aria-hidden="true" style="${style}"></span>`;
}

function isMobileLayout() {
  return window.matchMedia('(max-width: 760px)').matches;
}

/* 모바일: 종별 1마리, 바닥 한 줄 정렬로 난잡함 방지 */
const MOBILE_GROUND_ORDER = ['chick', 'dog', 'cat', 'rabbit', 'unicorn', 'dragon', 'spirit', 'turtle'];

function rebuildFriends() {
  friendsLayer.innerHTML = '';
  const mobile = isMobileLayout();
  let groundIdx = 0;

  PRODUCERS.forEach(p => {
    const bhv = FRIEND_BEHAVIOR[p.id];
    const owned = S.producers[p.id];
    if (!bhv || !owned) return;
    const n = mobile ? 1 : Math.min(bhv.max, friendCount(owned));

    let pos = bhv.pos();
    if (mobile) {
      if (p.id === 'whale') pos = { left: '50%', top: '16%' };
      else if (p.id === 'planet') pos = { right: '6%', top: '20%' };
      else {
        const slot = MOBILE_GROUND_ORDER.indexOf(p.id);
        pos = { left: (5 + (slot < 0 ? groundIdx : slot) * 11) + '%', bottom: '7%' };
        groundIdx++;
      }
    }

    for (let k = 0; k < n; k++) {
      const el = document.createElement('div');
      el.className = 'friend';
      el.dataset.id = p.id;
      for (const key of ['left', 'right', 'top', 'bottom']) {
        if (pos[key] === undefined) continue;
        el.style[key] = (key === 'left' || key === 'right')
          ? `calc(${pos[key]} + ${k * 46}px)`
          : pos[key];
      }
      const mover = document.createElement('span');
      mover.className = 'fr-move bv-' + bhv.anim;
      mover.style.animationDelay = (Math.random() * 2.5).toFixed(2) + 's';
      const size = mobile ? 36 : (p.id === 'whale' || p.id === 'planet') ? 64 : 48;
      mover.innerHTML = friendSpriteAnimHtml(p.id, size);
      el.appendChild(mover);
      friendsLayer.appendChild(el);
    }
  });
}

/* 코인 배달: 친구 자리에서 코인이 카운터로 날아온다 — "같이 번다" 체감 */
function flyCoinFromFriend() {
  if (document.hidden || totalCps() <= 0) return;
  const friends = friendsLayer.querySelectorAll('.friend');
  if (!friends.length) return;
  const f = friends[Math.floor(Math.random() * friends.length)];
  const fr = f.getBoundingClientRect();
  const cr = $('coin-display').getBoundingClientRect();
  if (!fr.width || !cr.width) return;
  const img = document.createElement('img');
  img.src = COIN_DATA_URL;
  img.className = 'fly-coin';
  const sx = fr.left + fr.width / 2;
  const sy = fr.top + fr.height / 3;
  img.style.left = sx + 'px';
  img.style.top = sy + 'px';
  document.body.appendChild(img);
  const dx = cr.left + cr.width / 2 - sx;
  const dy = cr.top + cr.height / 2 - sy;
  img.animate([
    { transform: 'translate(0,0) scale(1)', opacity: 1 },
    { transform: `translate(${dx * 0.5}px, ${dy * 0.5 - 40}px) scale(1.1)`, opacity: 1, offset: 0.55 },
    { transform: `translate(${dx}px, ${dy}px) scale(.5)`, opacity: 0.9 },
  ], { duration: 750, easing: 'ease-in' }).onfinish = () => {
    img.remove();
    const coinEl = $('coin-display');
    coinEl.classList.remove('pop');
    void coinEl.offsetWidth;
    coinEl.classList.add('pop');
  };
  setTimeout(() => img.remove(), 1200);
}

/* 분위기 파티클: 드래곤 불꽃, 유니콘 반짝이 */
function spawnSparkAt(x, y, color) {
  if (particleCount() > PARTICLE_CAP + 30) return;  // 컨페티 여유분
  const el = document.createElement('div');
  el.className = 'spark';
  el.style.background = color;
  el.style.left = x + 'px';
  el.style.top = y + 'px';
  const ang = Math.random() * Math.PI * 2;
  const dist = 16 + Math.random() * 26;
  el.animate([
    { transform: 'translate(0,0) scale(1)', opacity: 1 },
    { transform: `translate(${Math.cos(ang) * dist}px, ${Math.sin(ang) * dist - 22}px) scale(0)`, opacity: 0 },
  ], { duration: 600 + Math.random() * 300, easing: 'ease-out' });
  document.body.appendChild(el);
  setTimeout(() => el.remove(), 950);
}

setInterval(() => {
  if (document.hidden) return;
  const ambient = [['dragon', '#ff9d4d'], ['unicorn', '#ffd9f2']];
  for (const [id, color] of ambient) {
    const el = friendsLayer.querySelector(`.friend[data-id="${id}"]`);
    if (!el) continue;
    const r = el.getBoundingClientRect();
    for (let i = 0; i < 3; i++) {
      spawnSparkAt(r.left + r.width / 2, r.top + r.height / 3, color);
    }
  }
}, 6500);

const shopList = $('shop-list');

function buildShop() {

  if (currentTab === 'producers') {
    // 젤리 결정 배너: 결정을 갖고 있으면 친구들 탭 맨 위에
    if (S.crystal.count > 0 || Object.keys(S.crystal.friendLv).length > 0) {
      const banner = document.createElement('div');
      banner.className = 'shop-item';
      banner.id = 'crystal-banner';
      banner.innerHTML = `
        <div class="shop-icon">💎</div>
        <div class="shop-info">
          <div class="shop-name">젤리 결정 ${S.crystal.count}개</div>
          <div class="shop-desc">친구에게 먹이면 생산이 영구로 늘어요 — 눌러서 먹이기</div>
        </div>`;
      banner.addEventListener('click', openCrystalModal);
      shopList.appendChild(banner);
    }
    for (const p of PRODUCERS) {
      const el = document.createElement('div');
      el.className = 'shop-item';
      el.dataset.id = p.id;
      el.innerHTML = `
        <div class="shop-icon">${producerSpriteHtml(p.id, p.icon)}</div>
        <div class="shop-info">
          <div class="shop-name">${p.name}</div>
          <div class="shop-desc flavor">${p.desc}</div>
          <div class="shop-desc shop-payback"></div>
          <div class="shop-desc shop-syn"></div>
          <div class="shop-cost"></div>
        </div>
        <div class="shop-count"></div>`;
      el.addEventListener('click', () => buyProducer(p));
      shopList.appendChild(el);
    }
  } else if (currentTab === 'upgrades') {
    for (const u of UPGRADES) {
      if (S.upgrades[u.id]) continue;
      const el = document.createElement('div');
      el.className = 'shop-item';
      el.dataset.id = u.id;
      el.innerHTML = `
        <div class="shop-icon">${itemSpriteHtml(u.id, u.icon)}</div>
        <div class="shop-info">
          <div class="shop-name">${u.name}</div>
          <div class="shop-desc">${u.desc}</div>
          <div class="shop-cost"></div>
        </div>`;
      el.addEventListener('click', () => buyUpgrade(u));
      shopList.appendChild(el);
    }
    if (!shopList.children.length) {
      shopList.innerHTML = '<div style="text-align:center;color:var(--text-dim);padding:30px 10px;font-size:13px;">모든 강화 완료! 🏆</div>';
    }
  } else if (currentTab === 'achievements') {
    const summary = document.createElement('div');
    summary.id = 'ach-summary';
    summary.textContent = `업적 ${achCount()}/${ACHIEVEMENTS.length} 달성 · 전체 수입 +${achCount()}%`;
    shopList.appendChild(summary);
    for (const a of ACHIEVEMENTS) {
      const done = !!S.achievements[a.id];
      const el = document.createElement('div');
      el.className = 'shop-item ach-item' + (done ? ' done' : '');
      el.innerHTML = `
        <div class="shop-icon">${achievementSpriteHtml(a.id, a.icon, done)}</div>
        <div class="shop-info">
          <div class="shop-name">${a.name}</div>
          <div class="shop-desc">${a.desc}</div>
        </div>
        <div class="shop-count">${done ? '✓' : ''}</div>`;
      shopList.appendChild(el);
    }
  } else if (currentTab === 'prestige') {
    buildPrestigeTab();
  } else if (currentTab === 'room') {
    buildRoomTab();
  } else {
    buildWishesTab();
  }
  refreshShop();
}

  titleA.textContent = '📔 슬라임 앨범 — 함께한 기억';
  shopList.appendChild(titleA);

  const days = Math.max(1, Math.ceil((Date.now() - S.createdAt) / 86400000));
  let bestFriend = null;
  for (const p of PRODUCERS) {
    const e = S.codex.friends[p.id];
    if (e && (!bestFriend || e.maxOwned > bestFriend.max)) bestFriend = { name: p.name, max: e.maxOwned };
  }
  const albumRows = [
    ['함께한 지', `${days}일째`],
    ['함께한 시간', fmtTime(S.playTime)],
    ['쓰다듬은 횟수', S.totalClicks.toLocaleString() + '번'],
    ['평생 모은 코인', fmt(S.stats.lifetime.earned)],
    ['가장 길었던 콤보', S.stats.lifetime.bestCombo + ''],
    ['마중 나간 별', S.stats.lifetime.starsClicked + '개'],
    ['이뤄준 소원', S.wishes.completed + '개'],
    ['거쳐온 생', (S.prestige.totalResets + 1) + '번째'],
    ['달래준 먹구름', (S.stats.lifetime.cloudsSoothed || 0) + '번'],
    ['데려다준 별똥이', (S.stats.lifetime.starletsHelped || 0) + '번'],
    ['완수한 도전', Object.keys(S.codex.challenges).length + '/' + CHALLENGES.length],
    ['우주 씨앗', S.cosmicSeed ? '🌌 싹틈 — 우주를 한 번 완성함' : '아직 잠들어 있음'],
    ['가장 아낀 친구', bestFriend ? `${bestFriend.name} (${bestFriend.max}마리)` : '아직 없어요'],
  ];
  const album = document.createElement('div');
  album.className = 'album-box';
  album.innerHTML = albumRows.map(([k, v]) =>
    `<div class="album-row"><span>${k}</span><b>${v}</b></div>`).join('');
  shopList.appendChild(album);
}

function buildPrestigeTab() {
  const info = document.createElement('div');
  info.id = 'prestige-info';
  info.innerHTML =
    `🍮 보유 영혼 <b>${S.prestige.souls}</b>개 · 총 획득 <b>${S.prestige.totalSoulsEarned}</b>개<br>` +
    `모든 수입 +${S.prestige.totalSoulsEarned * 5}% (총 획득 기준 — 특성을 사도 줄지 않아요)<br>` +
    `환생 ${S.prestige.totalResets}회 · 이번 생의 플레이스타일: ${playstyleName()}` +
    `<br>행운 ${luckTotal()}` +
    (S.runBlessings.length
      ? `<br>이번 생의 축복: ${[...new Set(S.runBlessings)].map(id => {
          const b = BLESSINGS.find(x => x.id === id);
          if (!b) return '';
          const n = blessCount(id);
          return `<span style="color:${RARITY[b.rarity].color}">${b.icon}${b.name}${n > 1 ? `x${n}` : ''}</span>`;
        }).join(' · ')}`
      : '');
  shopList.appendChild(info);

  // 환생 버튼
  const gain = soulsGain();
  const unlocked = S.totalEarned >= PRESTIGE_UNLOCK;
  const btn = document.createElement('div');
  btn.className = 'shop-item prestige-btn' + (gain < 1 ? ' locked' : '');
  btn.innerHTML = `
    <div class="shop-icon">${itemSpriteHtml('prestige', '🌸')}</div>
    <div class="shop-info">
      <div class="shop-name">젤리 환생</div>
      <div class="shop-desc">${unlocked
        ? `지금 환생하면 젤리 영혼 <b>+${gain}</b>개! (코인·친구·강화 초기화, 업적·영혼·특성 유지)`
        : `누적 ${fmt(PRESTIGE_UNLOCK)} 코인부터 환생할 수 있어요 (현재 ${fmt(S.totalEarned)})`}</div>
    </div>`;
  if (unlocked && gain >= 1) btn.addEventListener('click', () => doPrestige(null));
  shopList.appendChild(btn);

  // 도전 런 섹션
  const chTitle = document.createElement('div');
  chTitle.className = 'room-section-title';
  chTitle.textContent = `🎲 이상한 이번 생 — 도전 런 (완수 ${Object.keys(S.codex.challenges).length}/${CHALLENGES.length})`;
  shopList.appendChild(chTitle);

  if (chActive()) {
    const c = challengeOf(chActive());
    const el = document.createElement('div');
    el.className = 'shop-item prestige-btn';
    el.innerHTML = `
      <div class="shop-icon">${c.icon}</div>
      <div class="shop-info">
        <div class="shop-name">도전 중: ${c.name}</div>
        <div class="shop-desc">${c.desc}<br>환생선(영혼 1개)에 도달하면 완수! 보상 별가루 +${c.reward}</div>
        <div class="shop-cost">클릭해서 도전 내려놓기 (손해 없음)</div>
      </div>`;
    el.addEventListener('click', () => {
      if (confirm('도전을 내려놓을까요? 잃는 건 없어요.')) abandonChallenge();
    });
    shopList.appendChild(el);
  } else if (S.prestige.totalResets < CHALLENGE_UNLOCK_RESETS) {
    const el = document.createElement('div');
    el.className = 'shop-item locked';
    el.style.cursor = 'default';
    el.innerHTML = `
      <div class="shop-icon">🔒</div>
      <div class="shop-info">
        <div class="shop-name">도전 런</div>
        <div class="shop-desc">환생 ${CHALLENGE_UNLOCK_RESETS}회부터 열려요 (현재 ${S.prestige.totalResets}회)</div>
      </div>`;
    shopList.appendChild(el);
  } else {
    for (const c of CHALLENGES) {
      const done = !!S.codex.challenges[c.id];
      const can = unlocked && gain >= 1;
      const el = document.createElement('div');
      el.className = 'shop-item' + (can ? '' : ' locked');
      el.innerHTML = `
        <div class="shop-icon">${c.icon}</div>
        <div class="shop-info">
          <div class="shop-name">${c.name} ${done ? '<span style="color:var(--green)">✓ 완수</span>' : ''}</div>
          <div class="shop-desc">${c.desc}</div>
          <div class="shop-cost">${can ? `이 도전으로 환생하기 — 보상 별가루 +${c.reward}` : '환생 가능 시점부터 시작할 수 있어요'}</div>
        </div>`;
      if (can) el.addEventListener('click', () => doPrestige(c.id));
      shopList.appendChild(el);
    }
  }

  // 특성 목록
  for (const perk of PERKS) {
    const lv = perkLv(perk.id);
    const maxed = lv >= perk.max;
    const cost = perkCost(perk.id);
    const el = document.createElement('div');
    el.className = 'shop-item perk-item' + (maxed ? ' maxed' : (S.prestige.souls < cost ? ' locked' : ''));
    el.innerHTML = `
      <div class="shop-icon">${itemSpriteHtml(perk.id, perk.icon)}</div>
      <div class="shop-info">
        <div class="shop-name">${perk.name} <span style="color:var(--soul)">Lv.${lv}/${perk.max}</span></div>
        <div class="shop-desc">${perk.desc} (레벨당)</div>
        <div class="shop-cost">${maxed ? 'MAX' : `젤리 영혼 ${cost}개`}</div>
      </div>`;
    if (!maxed) el.addEventListener('click', () => buyPerk(perk));
    shopList.appendChild(el);
  }
}

function refreshShop() {
  $('discount-badge').style.display = S.buffs.discount ? 'inline-block' : 'none';

  if (currentTab === 'producers') {
    for (const el of shopList.querySelectorAll('.shop-item')) {
      const p = PRODUCERS.find(x => x.id === el.dataset.id);
      if (!p) continue;
      const info = bulkInfo(p);
      const costEl = el.querySelector('.shop-cost');
      const prefix = buyMode === '1' ? '' : (buyMode === '10' ? 'x10 = ' : `x${info.count} = `);
      costEl.textContent = prefix + fmt(info.cost) + ' 코인' + (S.buffs.discount ? ' (50%↓)' : '');
      el.querySelector('.shop-count').textContent = S.producers[p.id] || '';

      const oneCost = producerCost(p) * (S.buffs.discount ? 0.5 : 1);
      const crysMul = 1 + 0.01 * crystalLv(p.id);
      const oneCps = p.cps * crysMul * cpsMulFactor();
      el.querySelector('.shop-payback').textContent = `초당 +${fmt(p.cps * crysMul)} · 회수 ${fmtTime(oneCost / oneCps)}`
        + (crystalLv(p.id) > 0 ? ` · 💎Lv.${crystalLv(p.id)}` : '');

      const affordable = buyMode === 'max' ? info.count > 0 : S.coins >= info.cost;
      el.classList.toggle('locked', !affordable);

      const reveal = S.totalEarned >= p.baseCost * 0.4 || S.producers[p.id] > 0;
      el.querySelector('.shop-name').textContent = reveal ? p.name : '???';
      setProducerShopIcon(el, p, reveal);

      // 다음 시너지 표시 — "25마리까지만 더 사자"를 만드는 줄
      const synEl = el.querySelector('.shop-syn');
      if (reveal) {
        const next = nextSynergy(p.id);
        synEl.textContent = next
          ? `다음 시너지: ${next.at}마리 — ${next.desc}`
          : (SYNERGIES[p.id] ? '시너지 완성! ✨' : '');
      } else {
        synEl.textContent = '';
      }
    }
  } else if (currentTab === 'upgrades') {
    for (const el of shopList.querySelectorAll('.shop-item')) {
      const u = UPGRADES.find(x => x.id === el.dataset.id);
      if (!u) continue;
      const cost = u.cost * (S.buffs.discount ? 0.5 : 1) * BC.upDisc;
      el.querySelector('.shop-cost').textContent = fmt(cost) + ' 코인' + (S.buffs.discount ? ' (50%↓)' : '');
      el.classList.toggle('locked', S.coins < cost);
    }
  } else if (currentTab === 'room') {
    for (const el of shopList.querySelectorAll('.decor-item')) {
      const d = DECOR.find(x => x.id === el.dataset.id);
      if (!d || S.decor[d.id]) continue;
      el.classList.toggle('locked', S.coins < d.cost);
    }
  } else if (currentTab === 'wishes') {
    const dust = $('stardust-display');
    if (dust) dust.innerHTML = `💫 별가루 <b>${S.stardust}</b>개 · 이룬 소원 ${S.wishes.completed}개`;
    for (const el of shopList.querySelectorAll('.wish-item')) {
      const w = el.dataset.golden ? S.wishes.golden : S.wishes.active[el.dataset.idx];
      if (!w) continue;
      const pct = w.done ? 100 : Math.min(100, w.progress / w.target * 100);
      el.querySelector('.wish-bar').style.width = pct + '%';
      const prog = el.querySelector('.wish-progress');
      if (prog) prog.textContent = `${fmt(Math.min(w.progress, w.target))} / ${fmt(w.target)}`;
    }
    for (const el of shopList.querySelectorAll('.cosmetic-item')) {
      const c = COSMETICS.find(x => x.id === el.dataset.id);
      if (!c || S.cosmetics.owned[c.id]) continue;
      el.classList.toggle('locked', S.stardust < c.cost);
    }
  }
}

function consumeDiscount() {
  if (S.buffs.discount) {
    S.buffs.discount = false;
    toast('⭐ 할인이 적용되었어요!');
  }
}

function buyProducer(p) {
  // 외길 목장: 처음 고용한 종 외 구매 잠금
  if (chActive() === 'mono') {
    const sp = monoSpecies();
    if (sp && sp !== p.id) {
      toast('🐾 외길 목장 중! <b>' + (PRODUCERS.find(x => x.id === sp) || {}).name + '</b>만 키울 수 있어요');
      return;
    }
  }
  const info = bulkInfo(p);
  if (info.count === 0 || S.coins < info.cost) return;
  S.coins -= info.cost;
  S.producers[p.id] += info.count;
  consumeDiscount();
  sndBuy();
  wishEvent('hire', info.count);
  rebuildFriends();
  refreshShop();
  // 구매 플래시
  const itemEl = shopList.querySelector(`.shop-item[data-id="${p.id}"]`);
  if (itemEl) {
    itemEl.classList.remove('bought');
    void itemEl.offsetWidth;
    itemEl.classList.add('bought');
  }
  renderHud();
  save();
}

function buyUpgrade(u) {
  const cost = u.cost * (S.buffs.discount ? 0.5 : 1) * BC.upDisc;
  if (S.upgrades[u.id] || S.coins < cost) return;
  S.coins -= cost;
  S.upgrades[u.id] = true;
  consumeDiscount();
  sndBuy();
  wishEvent('upgrade', 1);
  toast(`${u.icon} <b>${u.name}</b> 구매 완료!`);
  buildShop();
  renderHud();
  save();
}

document.querySelectorAll('.tab').forEach(tab => {
  tab.addEventListener('click', () => {
    document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
    tab.classList.add('active');
    currentTab = tab.dataset.tab;
    buildShop();
  });
});

document.querySelectorAll('.mode-btn').forEach(btn => {
  btn.addEventListener('click', () => {
    document.querySelectorAll('.mode-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    buyMode = btn.dataset.mode;
    refreshShop();
  });
});

/* ════════════════════════ 황금별 이벤트 ════════════════════════ */

const starEl = $('golden-star');
let starTimer = 20 + Math.random() * 40;
let starVisible = 0;

function starInterval() {
  return (40 + Math.random() * 60) * (1 - 0.08 * perkLv('starlight')) * (hasSyn('dog', 25) ? 0.95 : 1)
    * BC.starInt
    * (1 - upSum('starInt'))
    * (hasSyn('spirit', 10) ? 0.95 : 1);
}

function starSpawnRect() {
  const area = $('game-area').getBoundingClientRect();
  const maxX = Math.max(0, area.width - 140);
  const maxY = Math.max(0, area.height - 240);
  return {
    x: area.left + 40 + Math.random() * maxX,
    y: area.top + 70 + Math.random() * maxY,
  };
}

function spawnStar() {
  starVisible = starLinger();
  starEl.style.display = 'block';
  S.telemetry.starsSeen++;
  // 첫 황금별 안내
  if (S.stats.lifetime.starsClicked === 0) {
    toast('⭐ <b>황금별</b>이 떴어요! 누르면 광란·코인 보너스 같은 <b>행운 이벤트</b>가 터져요');
  }
  const pos = starSpawnRect();
  starEl.style.left = pos.x + 'px';
  starEl.style.top = pos.y + 'px';
  // 강아지 100: 별 등장을 놓치지 않게 반짝임 + 알림음
  if (hasSyn('dog', 100)) {
    starEl.style.filter = 'drop-shadow(0 0 24px #ffd75e)';
    beep(1568, 0.15, 'triangle', 0.07);
  } else {
    starEl.style.filter = '';
  }
}

let twinFollow = false;
function hideStar() {
  starVisible = 0;
  starEl.style.display = 'none';
  // 쌍둥이 별: 연달아 한 번 더
  if (BC.twinStars && !twinFollow) {
    twinFollow = true;
    starTimer = 1.5;
  } else {
    twinFollow = false;
    starTimer = starInterval();
  }
}

const STAR_EVENTS = [
  { w: () => 30, run: (e) => {
      frenzyEarned = 0;
      frenzyTimer = frenzyDuration();
      toast(`⭐ <b>광란의 시간!</b> ${frenzyDuration()}초간 모든 수입 x${frenzyMul()}!`);
  }},
  { w: () => 25, run: (e) => {
      let bonus = Math.max(totalCps() * 90, clickPower() * 150, 50);
      if (hasSyn('dog', 50)) bonus *= 1.2;
      if (chActive() === 'starlit') bonus *= 3;
      bonus *= starRewardMul();
      earnCoins(bonus, 'event');
      spawnFloat(e.clientX, e.clientY, '+' + fmt(bonus), true);
      toast(`⭐ 행운의 보너스! <b>+${fmt(bonus)}</b> 코인!`);
  }},
  { w: () => 20, run: (e) => {
      partyTimer = partyDuration();
      toast(`🎉 <b>친구 파티!</b> ${partyDuration()}초간 자동 생산 x5!`);
  }},
  { w: () => 15 + (hasSyn('rabbit', 50) ? 5 : 0), run: (e) => {
      S.buffs.discount = true;
      toast('🏷️ <b>별의 할인!</b> 다음 구매가 50% 할인돼요!');
  }},
  { w: () => 10, run: (e) => {
      toast('🌠 <b>미니 별똥별!</b> 작은 별들을 빠르게 클릭하세요!');
      spawnMiniStars();
  }},
];

function pickStarEvent() {
  const weights = STAR_EVENTS.map(ev => ev.w());
  const total = weights.reduce((a, w) => a + w, 0);
  let r = Math.random() * total;
  for (let i = 0; i < STAR_EVENTS.length; i++) {
    r -= weights[i];
    if (r <= 0) return STAR_EVENTS[i];
  }
  return STAR_EVENTS[0];
}

starEl.addEventListener('pointerdown', e => {
  e.stopPropagation();
  sndStar();
  S.stats.run.starsClicked++;
  S.stats.lifetime.starsClicked++;
  S.telemetry.starsClicked++;
  wishEvent('star', 1);
  pickStarEvent().run(e);
  // 로켓 토끼 100: 별 이벤트 후 20% 확률로 미니 별똥별 추가
  if (hasSyn('rabbit', 100) && Math.random() < 0.2) {
    setTimeout(() => {
      toast('🐰 토끼들이 별똥별을 더 몰고 왔어요!');
      spawnMiniStars();
    }, 900);
  }
  hideStar();
  checkEvolution();
  renderHud();
  save();
});

/* ════════════════════════ 먹구름 손님 ════════════════════════
   무손실 액티브 이벤트: 두드려서 비를 털면 큰 보상,
   실패해도 위로 간식, 무시해도 아무 일 없음 */

const cloudEl = $('raincloud');
let cloudTimer = 80 + Math.random() * 80;  // 첫 등장 1.3~2.7분
let cloudState = 'hidden';                    // hidden | drift | challenge
let cloudLife = 0;
let cloudTime = 0;
let cloudClicks = 0;
let cloudNeed = 0;

function spawnCloud() {
  // 탭이 안 보일 때 떴다 사라지면 손님을 영영 못 봄 — 잠시 미룸
  if (document.hidden) { cloudTimer = 30; return; }
  cloudState = 'drift';
  cloudLife = 14;
  const pos = starSpawnRect();
  cloudEl.style.left = pos.x + 'px';
  cloudEl.style.top = pos.y + 'px';
  cloudEl.classList.add('drift');
  cloudEl.classList.remove('challenge');
  cloudEl.style.display = 'block';
  $('cloud-hint').textContent = '👆 두드리면 코인+별가루!';
  S.telemetry.cloudsSeen++;
  toast('☁️ <b>먹구름 손님</b>! 빠르게 두드려 비를 털면 <b>코인과 별가루</b>를 받아요');
  beep(294, 0.12, 'triangle', 0.07);
}

function hideCloud() {
  cloudState = 'hidden';
  cloudEl.style.display = 'none';
  $('cloud-bar').style.width = '0%';
  cloudTimer = 150 + Math.random() * 150;
}

cloudEl.addEventListener('pointerdown', e => {
  e.stopPropagation();
  if (cloudState === 'drift') {
    cloudState = 'challenge';
    cloudClicks = 0;
    cloudNeed = Math.min(30, 12 + stageIdx * 3 + S.prestige.totalResets * 2);
    cloudTime = 10;
    cloudEl.classList.remove('drift');
    cloudEl.classList.add('challenge');
    S.telemetry.cloudsEngaged++;
    $('cloud-hint').textContent = `⚡ 연타! ${cloudNeed}번 두드리기!`;
    toast(`☁️ 10초 안에 <b>${cloudNeed}번</b> 연타해서 비를 털어내자!`);
    beep(330, 0.1);
  } else if (cloudState === 'challenge') {
    cloudClicks++;
    spawnRaindrops(e.clientX, e.clientY);
    beep(392 + cloudClicks * 8, 0.05);
    $('cloud-bar').style.width = Math.min(100, cloudClicks / cloudNeed * 100) + '%';
    $('cloud-hint').textContent = `⚡ ${Math.max(0, cloudNeed - cloudClicks)}번 남았어!`;
    if (cloudClicks >= cloudNeed) cloudSuccess();
  }
});

function spawnRaindrops(x, y) {
  for (let i = 0; i < 3; i++) {
    const d = document.createElement('div');
    d.className = 'raindrop';
    d.style.left = (x - 22 + Math.random() * 44) + 'px';
    d.style.top = y + 'px';
    d.animate([
      { transform: 'translateY(0)', opacity: 1 },
      { transform: `translateY(${40 + Math.random() * 40}px)`, opacity: 0 },
    ], { duration: 450 + Math.random() * 250, easing: 'ease-in' });
    document.body.appendChild(d);
    setTimeout(() => d.remove(), 750);
  }
}

function cloudSuccess() {
  const bonus = Math.max(totalCps() * 180, clickPower() * 250, 200);
  earnCoins(bonus, 'event');
  S.stardust += 2;
  S.stats.lifetime.cloudsSoothed = (S.stats.lifetime.cloudsSoothed || 0) + 1;
  wishEvent('cloud', 1);
  confettiBurst();
  sndStar();
  toast(`🌤️ 비가 그쳤어요! <b>+${fmt(bonus)}</b> 코인과 별가루 2개!`);
  showQuip('먹구름도 사실은 말랑했어.');

/* ════════════════════════ 길 잃은 별똥이 ════════════════════════
   세 번째 손님: 연타도 룰렛도 아닌 "데려다주기".
   클릭할 때마다 슬라임 쪽으로 폴짝 — 서두르면 안 움직인다(0.45초 간격).
   도착하면 안아주고 하늘로 복귀 + 보상. 방치해도 30초 뒤 혼자 떠남(무손실). */

const starletEl = $('starlet');
let starletTimer = 240 + Math.random() * 240;  // 첫 등장 4~8분
let starletState = 'hidden';                    // hidden | waiting | leaving
let starletLife = 0;
let starletLastHop = 0;
let starletX = 0, starletY = 0;

function spawnStarlet() {
  if (slimeLevel < 5) { starletTimer = 120; return; }          // 초반 과밀 방지
  if (cloudState !== 'hidden') { starletTimer = 45; return; }  // 먹구름과 동시 등장 방지
  starletState = 'waiting';
  starletLife = 30;
  const pos = starSpawnRect();
  starletX = pos.x; starletY = pos.y;
  starletEl.style.left = starletX + 'px';
  starletEl.style.top = starletY + 'px';
  starletEl.classList.add('waiting');
  starletEl.classList.remove('happy');
  let vis = starletEl.querySelector('#starlet-visual');
  if (!vis) {
    starletEl.insertAdjacentHTML('beforeend', '<span id="starlet-visual"></span>');
    vis = starletEl.querySelector('#starlet-visual');
  }
  vis.innerHTML = spriteHtml('guests', 'starlet',
    `<img src="${STARLET_URLS.sad}" alt="">`, { size: 56, className: 'guest-sprite' });
  $('starlet-hint').textContent = '👆 눌러서 집에 데려다주자!';
  starletEl.style.display = 'block';
  S.telemetry.starletsSeen = (S.telemetry.starletsSeen || 0) + 1;
  toast('💫 <b>길 잃은 별똥이</b>가 떨어졌어요! 천천히 눌러서 슬라임에게 데려다주세요');
  beep(880, 0.12, 'triangle', 0.06);
}

function hideStarlet() {
  starletState = 'hidden';
  starletEl.style.display = 'none';
  starletEl.classList.remove('waiting', 'happy');
  starletTimer = 240 + Math.random() * 240;
}

starletEl.addEventListener('pointerdown', e => {
  e.stopPropagation();
  if (starletState !== 'waiting') return;
  const now = performance.now();
  if (now - starletLastHop < 450) return;  // 서두르면 겁먹어서 안 움직임
  starletLastHop = now;

  const r = slimeCv.getBoundingClientRect();
  const tx = r.left + r.width / 2 - 28;
  const ty = r.top + r.height / 2 - 28;
  starletX += (tx - starletX) * 0.32;
  starletY += (ty - starletY) * 0.32;
  starletEl.style.left = starletX + 'px';
  starletEl.style.top = starletY + 'px';
  beep(660 + Math.random() * 120, 0.06, 'triangle', 0.05);
  starletLife = Math.max(starletLife, 12);  // 데려다주는 중엔 떠나지 않게

  const dist = Math.hypot(tx - starletX, ty - starletY);
  if (dist < 70) starletArrive();
  else $('starlet-hint').textContent = dist < 200 ? '조금만 더!' : '이쪽이야, 따라와!';
});

function starletArrive() {
  starletState = 'leaving';
  starletEl.querySelector('#starlet-visual').innerHTML = spriteHtml('guests', 'starlet-happy',
    `<img src="${STARLET_URLS.happy}" alt="">`, { size: 56, className: 'guest-sprite' });
  $('starlet-hint').textContent = '고마워! 또 올게!';
  starletEl.classList.remove('waiting');
  starletEl.classList.add('happy');

  let bonus = Math.max(totalCps() * 100, clickPower() * 150, 100) * starRewardMul();
  earnCoins(bonus, 'event');
  S.stardust += 1;
  S.stats.lifetime.starletsHelped = (S.stats.lifetime.starletsHelped || 0) + 1;
  S.telemetry.starletsHelped = (S.telemetry.starletsHelped || 0) + 1;
  wishEvent('starlet', 1);

  spawnSparks(starletX + 28, starletY + 28);
  sndStar();
  showQuip('잘 가, 별똥아! 또 놀러 와.');
  toast(`💫 별똥이가 집으로 돌아갔어요! <b>+${fmt(bonus)}</b> 코인과 별가루 1개`);
  checkEvolution();
  renderHud();
  save();
  setTimeout(hideStarlet, 1100);
}

function spawnMiniStars() {
  const count = 5 + (hasSyn('rabbit', 10) ? 1 : 0) + BC.miniCount + (hasSyn('spirit', 100) ? 2 : 0);
  for (let i = 0; i < count; i++) {
    const img = document.createElement('img');
    img.src = starDataURL;
    img.className = 'mini-star';
    img.alt = '미니 별똥별';
    const pos = starSpawnRect();
    img.style.left = pos.x + 'px';
    img.style.top = pos.y + 'px';
    img.addEventListener('pointerdown', ev => {
      ev.stopPropagation();
      let bonus = Math.max(totalCps() * 8, clickPower() * 15, 25);
      if (hasSyn('rabbit', 25)) bonus *= 1.3;
      if (hasSyn('dog', 50)) bonus *= 1.2;
      if (chActive() === 'starlit') bonus *= 3;
      bonus *= starRewardMul();
      earnCoins(bonus, 'event');
      wishEvent('ministar', 1);
      spawnFloat(ev.clientX, ev.clientY, '+' + fmt(bonus), true);
      beep(1175, 0.1, 'triangle', 0.09);
      img.remove();
      checkEvolution();
      checkAchievements();
      renderHud();
      save();  // 보상 직후 닫아도 유실 없게
    }, { once: true });
    document.body.appendChild(img);
    setTimeout(() => img.remove(), 6000);

}

/* ════════════════════════ 저장 / 불러오기 ════════════════════════ */

let wiping = false;  // 초기화 진행 중 — 언로드 시 finalSave가 세이브를 되살리는 것 방지

function save() {
  if (wiping) return;
  S.lastSave = Date.now();
  try { localStorage.setItem(SAVE_KEY, JSON.stringify(S)); } catch (e) {}
}

function migrateSave(data) {
  const base = defaultState();
  const out = Object.assign(base, data);

  // v4 이하: 평면 stats → lifetime/run 분리
  const ds = defaultState().stats;
  if (data.stats && data.stats.run) {
    out.stats = {
      lifetime: Object.assign({}, ds.lifetime, data.stats.lifetime || {}),
      run: Object.assign({}, ds.run, data.stats.run || {}),
    };
  } else {
    const old = data.stats || {};
    out.stats = {
      lifetime: {
        bestCombo: old.bestCombo || 0,
        starsClicked: old.starsClicked || 0,
        earned: data.totalEarned || 0,  // 과거 생애 누적은 복원 불가, 현재 누적으로 근사
      },
      run: {
        clicks: data.totalClicks || 0,
        bestCombo: old.bestCombo || 0,
        starsClicked: old.starsClicked || 0,
        clickEarned: old.clickEarned || 0,
        idleEarned: old.idleEarned || 0,
        offlineEarned: old.offlineEarned || 0,
      },
    };
  }

  out.buffs = Object.assign(defaultState().buffs, data.buffs || {});
  out.prestige = Object.assign(defaultState().prestige, data.prestige || {});
  out.prestige.perks = (data.prestige && data.prestige.perks) || {};
  // v4 이하: 총 획득 영혼 = 보유 + 특성에 쓴 영혼 (비용 = 1+2+...+lv)
  if (!out.prestige.totalSoulsEarned || out.prestige.totalSoulsEarned < out.prestige.souls) {
    let spent = 0;
    for (const k in out.prestige.perks) {
      const lv = out.prestige.perks[k];
      spent += lv * (lv + 1) / 2;
    }
    out.prestige.totalSoulsEarned = out.prestige.souls + spent;
  }
  out.decor = data.decor || {};
  out.story = data.story || {};
  out.codex = Object.assign(defaultState().codex, data.codex || {});
  out.codex.stages = (data.codex && data.codex.stages) || {};
  out.codex.traits = (data.codex && data.codex.traits) || {};
  out.codex.friends = (data.codex && data.codex.friends) || {};
  // v4 이하: boolean → { discovered, maxOwned } 객체
  for (const k in out.codex.friends) {
    if (out.codex.friends[k] === true) {
      out.codex.friends[k] = { discovered: true, maxOwned: (data.producers && data.producers[k]) || 0 };
    }
  }

  // v5 이하: 별가루/소원/코스메틱 기본값
  out.stardust = data.stardust || 0;
  out.wishes = Object.assign({ active: [], completed: 0 }, data.wishes || {});
  if (!Array.isArray(out.wishes.active)) out.wishes.active = [];
  out.cosmetics = {
    owned: (data.cosmetics && data.cosmetics.owned) || {},
    equipped: (data.cosmetics && data.cosmetics.equipped) || {},
  };

  // v6 이하: 진화 축복 기본값
  out.runBlessings = Array.isArray(data.runBlessings) ? data.runBlessings : [];
  out.codex.blessings = (data.codex && data.codex.blessings) || {};

  // v7 이하: 앨범 필드
  out.playTime = data.playTime || 0;
  out.createdAt = data.createdAt || data.lastSave || Date.now();

  // v8 이하: 도전 런
  out.challenge = Object.assign({ active: null, startedAt: 0 }, data.challenge || {});
  out.codex.challenges = (data.codex && data.codex.challenges) || {};

  // v9 이하: 우주 씨앗 + 텔레메트리 + 음악 설정
  out.musicOn = data.musicOn !== false;
  out.cosmicSeed = !!data.cosmicSeed;
  out.telemetry = Object.assign(defaultState().telemetry, data.telemetry || {});
  if (!Array.isArray(out.telemetry.sessionLengths)) out.telemetry.sessionLengths = [];
  out.achievements = data.achievements || {};
  out.producers = Object.assign({}, defaultState().producers, data.producers || {});
  out.upgrades = data.upgrades || {};
  out.version = SAVE_VERSION;
  return out;
}

function load() {
  try {
    const raw = localStorage.getItem(SAVE_KEY);
    if (!raw) return;
    S = migrateSave(JSON.parse(raw));
    computeBlessCache();  // 오프라인 보상 계산 전에 축복 캐시 갱신

    // 오프라인 보상: 기본 50% + 말랑한 시간 특성 + 고양이/고래 시너지
    const away = Math.min((Date.now() - (S.lastSave || Date.now())) / 1000, offlineCapHours() * 3600);
    let offline = totalCps() * away * offlineRate() * offlineSynMul();
    if (offline >= 1) {
      let dream = false;
      if (hasSyn('cat', 100) && Math.random() < 0.1) { offline *= 2; dream = true; }
      earnCoins(offline, 'offline');
      setTimeout(() => toast(dream
        ? `🐱💤 고양이의 꿈 보너스! 친구들이 <b>${fmt(offline)}</b> 코인을 모았어요! (x2)`
        : `💤 자리 비운 동안 친구들이 <b>${fmt(offline)}</b> 코인을 모았어요!`), 600);
    }
  } catch (e) {}
}

/* ════════════════════════ 메인 루프 ════════════════════════
   경제(수입·버프·타이머)는 econTick()으로 분리.
   rAF는 백그라운드 탭에서 완전히 멈추므로 setInterval에서도 호출한다.
   lastEcon 기준 실제 경과 시간으로 계산해 이중 적립은 없다. */

let lastEcon = performance.now();
let saveAcc = 0;
let achAcc = 0;

function econTick(silent = false) {
  silentTick = silent;
  try {
    econTickBody();
  } finally {
    silentTick = false;
  }
}

function gamePaused() {
  // 축복 선택·설정·결정 먹이기 중에는 시간이 멈춘다 — 광란 중에도 찬찬히 고를 수 있게
  return $('blessing-overlay').classList.contains('open')
    || $('settings-overlay').classList.contains('open')
    || $('crystal-overlay').classList.contains('open');
}

function econTickBody() {
  const now = performance.now();
  let dt = (now - lastEcon) / 1000;
  lastEcon = now;
  if (dt <= 0) return;
  if (gamePaused()) return;  // lastEcon은 갱신됐으므로 멈춘 시간은 그냥 증발
  dt = Math.min(dt, 3600); // 안전 상한

  S.playTime += dt;

  const income = totalCps() * frenzyMul() * partyMul() * dt;
  if (income > 0) earnCoins(income, 'idle');

  if (comboTimer > 0 && !BC.comboEternal) {  // 영원한 박자: 콤보 시간 미적용
    comboTimer -= dt;
    if (comboTimer <= 0) {
      if (comboTier().t >= 3) comboLost();  // 불타는을 놓친 순간만 알림
      combo = 0;
    }
  }

  if (frenzyTimer > 0) {
    frenzyTimer -= dt;
    if (frenzyTimer <= 0) {
      frenzyTimer = 0;
      // 드래곤 100: 광란 중 번 코인의 10%를 보너스로
      if (hasSyn('dragon', 100) && frenzyEarned > 0) {
        const b = frenzyEarned * 0.1;
        earnCoins(b, 'event');
        toast(`🐲 광란 종료! 드래곤의 선물 <b>+${fmt(b)}</b> 코인!`);
      } else {

// 딸기 행은 마젠타 크로마 핑크 충돌로 회색 생성됨(ASSET-PIPELINE 규약) → 명암 보존 colorize로 복원
function pinkifyGray(d) {
  // 핑크 램프 (기존 딸기 팔레트): 외곽 #591238 → 어두움 #c2538e → 본색 #f78fc0 → 하이라이트 #ffc8e2
  const stops = [
    [0.00, 0x30, 0x08, 0x1d], [0.16, 0x59, 0x12, 0x38], [0.45, 0xc2, 0x53, 0x8e],
    [0.69, 0xf7, 0x8f, 0xc0], [0.85, 0xff, 0xc8, 0xe2], [1.00, 0xff, 0xf0, 0xf8],
  ];
  for (let p = 0; p < d.length; p += 4) {
    if (d[p + 3] === 0) continue;
    const mx = Math.max(d[p], d[p + 1], d[p + 2]), mn = Math.min(d[p], d[p + 1], d[p + 2]);
    if (mx && (mx - mn) / mx > 0.45) continue;  // 이미 유채색인 디테일(볼터치 등)은 보존
    const l = (0.299 * d[p] + 0.587 * d[p + 1] + 0.114 * d[p + 2]) / 255;
    let i = 1; while (i < stops.length - 1 && stops[i][0] < l) i++;
    const [l0, r0, g0, b0] = stops[i - 1], [l1, r1, g1, b1] = stops[i];
    const t = Math.min(1, Math.max(0, (l - l0) / (l1 - l0)));
    d[p] = r0 + (r1 - r0) * t; d[p + 1] = g0 + (g1 - g0) * t; d[p + 2] = b0 + (b1 - b0) * t;
  }
}

window.simRun = function simRun(opts = {}) {
  const hours = opts.hours || 2;
  const cpsClick = opts.clicksPerSec ?? 4;
  const fromCurrent = !!opts.fromCurrent;  // true면 현재 세이브에서 이어서

  const snapS = JSON.stringify(S);
  const snapLevel = slimeLevel, snapStage = stageIdx, snapCombo = combo;

  if (!fromCurrent) { S = migrateSave({}); computeBlessCache(); slimeLevel = 1; stageIdx = 0; }
  const levelTimes = {};
  let rebirthAt = null;
  const coinMarks = {};
  const marks = [1e6, 1e9, 1e12, 1e15];
  const total = Math.round(hours * 3600);

  for (let t = 0; t < total; t++) {
    const g = clickPower() * comboMul() * cpsClick + totalCps();
    S.coins += g; S.totalEarned += g;
    combo = Math.min(combo + cpsClick, 100);
    let nl = currentLevelFor(S.totalEarned);
    while (nl > slimeLevel) {
      slimeLevel++;
      const b = BLESSINGS[Math.floor(Math.random() * BLESSINGS.length)];
      if (b.stack || !S.runBlessings.includes(b.id)) S.runBlessings.push(b.id);
      computeBlessCache();
      levelTimes[slimeLevel] = (t / 60).toFixed(1);
      nl = currentLevelFor(S.totalEarned);
    }
    stageIdx = stageForLevel(slimeLevel);
    for (const u of UPGRADES) {
      const c = u.cost * BC.upDisc;
      if (!S.upgrades[u.id] && S.coins >= c) { S.coins -= c; S.upgrades[u.id] = true; }
    }
    for (const p of PRODUCERS) {
      let gd = 0;
      while (gd++ < 50) {
        const c = producerCost(p);
        if (S.coins >= c && c / (p.cps * cpsMulFactor()) < 600) { S.coins -= c; S.producers[p.id]++; }
        else break;
      }
    }
    if (!rebirthAt && soulsGain() >= 1) rebirthAt = (t / 60).toFixed(1);
    for (const m of marks) {
      if (!coinMarks[m] && S.totalEarned >= m) coinMarks[m] = (t / 60).toFixed(1);
    }
  }
  const report = {
    levelTimesMin: levelTimes,
    rebirthLineMin: rebirthAt,
    coinMilestonesMin: { '100만': coinMarks[1e6], '10억': coinMarks[1e9], '1조': coinMarks[1e12], '1000조': coinMarks[1e15] },
    finalLevel: slimeLevel,
    upgradesBought: Object.keys(S.upgrades).length + '/' + UPGRADES.length,
    blessings: S.runBlessings.length,
  };
  S = migrateSave(JSON.parse(snapS)); computeBlessCache();
  slimeLevel = snapLevel; stageIdx = snapStage; combo = snapCombo;
  renderHud(); buildShop(); rebuildFriends();
  return report;
};

    }
    combo = 0;
    add('onboarding', '60초 내 첫 친구 구매 도달', onbT < 60, onbT + '초');
    add('onboarding', '첫 황금별 안내 존재', spawnStar.toString().includes('starsClicked === 0'));
    add('onboarding', '먹구름 상시 힌트 요소', !!document.getElementById('cloud-hint'));
    add('onboarding', '첫 클릭 말풍선 온보딩', typeof showQuip === 'function' && document.body.contains($('speech-bubble')));
    add('onboarding', '첫 친구 고용 힌트 로직', typeof hintFriendShown !== 'undefined');
    const tipText = TIPS.map(t => t.text).join(' ');
    for (const [kw, label] of [['황금별', '황금별'], ['먹구름', '먹구름'], ['시너지', '친구 시너지'], ['회수', '회수 시간'], ['환생', '환생'], ['리롤', '리롤'], ['성향', '성향'], ['장식', '장식'], ['별가루', '별가루'], ['오프라인', '오프라인']]) {
      add('onboarding', `팁 커버리지: ${label}`, tipText.includes(kw));
    }

    /* ═══ 3. 콘텐츠·페이싱 ═══ */
    S = migrateSave({}); computeBlessCache(); slimeLevel = 1; stageIdx = 0;
    const rep = simRun({ hours: 1.2, clicksPerSec: 4 });
    const rb = parseFloat(rep.rebirthLineMin);
    add('pacing', '첫 환생 20~50분', rb >= 20 && rb <= 50, rep.rebirthLineMin + '분');
    const lt = rep.levelTimesMin;
    const ivs = [];
    for (let L = 15; L <= 20; L++) {
      if (lt[L] && lt[L - 1]) ivs.push(parseFloat(lt[L]) - parseFloat(lt[L - 1]));
    }
    add('pacing', '갈증 곡선(후반 간격 증가)', ivs.length >= 3 && ivs[ivs.length - 1] > ivs[0], JSON.stringify(ivs.map(v => v.toFixed(1))));
    add('pacing', '첫 런 강화 소진 ≤68% (최소 8개 잔존)', parseInt(rep.upgradesBought) <= 17, rep.upgradesBought);
    add('pacing', '영혼 배율 소프트캡(3000영혼 ≤ x30)', smAt(3000) <= 30, 'x' + smAt(3000).toFixed(1));
    add('pacing', '영혼 획득 로그화(45조 런 ≤ 200)', (() => { const d = Math.log10(4.5e13 / 6e7); return Math.floor(1 + 3 * Math.pow(d, 2.2)) <= 200; })());
    let leg = 0;
    for (let i = 0; i < 3000; i++) if (pickRarity() === 'legendary') leg++;
    add('pacing', '전설 확률(행운 0) ≤ 2%', leg / 3000 <= 0.02, (leg / 30).toFixed(2) + '%');
    add('pacing', '장기 업적 ≥ 5종', ACHIEVEMENTS.filter(a => ['life1e15', 'reset10', 'level40', 'click200k', 'wish100', 'allCh', 'life1e12', 'reset5'].includes(a.id)).length >= 5);
    add('pacing', '축복 풀 40+ · 4등급', BLESSINGS.length >= 40 && new Set(BLESSINGS.map(b => b.rarity)).size === 4);
    add('pacing', '레벨 상한 여유(MAX 60)', MAX_LEVEL >= 50);

    /* ═══ 4. 성능 ═══ */
    const tp0 = performance.now();
    for (let i = 0; i < 10000; i++) { clickPower(); totalCps(); comboMul(); }
    const hotMs = performance.now() - tp0;
    add('performance', '경제 핫패스 1만회 < 300ms', hotMs < 300, hotMs.toFixed(0) + 'ms');

    const tp1 = performance.now();
    for (let i = 0; i < 300; i++) renderHud();
    const hudMs = performance.now() - tp1;
    add('performance', 'HUD 렌더 300회 < 400ms', hudMs < 400, hudMs.toFixed(0) + 'ms');

    PRODUCERS.forEach(p => S.producers[p.id] = 30);
    const tp2 = performance.now();
    rebuildFriends();
    add('performance', '친구 재배치 < 50ms', performance.now() - tp2 < 50);
    add('performance', '친구 DOM ≤ 30개', friendsLayer.querySelectorAll('.friend').length <= 30);

    for (let i = 0; i < 50; i++) spawnSparks(innerWidth / 2, innerHeight / 2);
    const burst = particleCount();
    add('performance', '파티클 하드캡(폭주 시 ≤ 90)', burst <= PARTICLE_CAP + 30, burst + '개');
    document.querySelectorAll('.spark, .emoji-spark').forEach(el => el.remove());

    const blessLen = rep.blessings;
    add('performance', '런 축복 배열 폭주 없음(< 200)', blessLen < 200, blessLen + '개');

    /* ═══ 5. 패키징·준수 ═══ */
    const isHttp = location.protocol.startsWith('http');
    if (isHttp) {
      try {
        const mf = await (await fetch('manifest.json')).json();
        add('compliance', 'PWA manifest 유효', mf.name && mf.icons && mf.icons.length >= 2 && mf.start_url);
      } catch (e) { add('compliance', 'PWA manifest 유효', false, String(e)); }
      try {
        const swText = await (await fetch('sw.js')).text();
        const atlasSrcs = Object.values(SPRITE_ATLASES).filter(a => a.sheet).map(a => a.src);
        const missing = atlasSrcs.filter(src => !swText.includes(src));
        add('compliance', 'SW 캐시-아틀라스 정합', missing.length === 0, missing.join(','));
      } catch (e) { add('compliance', 'SW 캐시-아틀라스 정합', false, String(e)); }
      const regs = await navigator.serviceWorker.getRegistrations();
      add('compliance', 'SW 등록', regs.length >= 1);
    } else {
      add('compliance', 'PWA manifest 유효', true, 'file:// 생략');
      add('compliance', 'SW 캐시-아틀라스 정합', true, 'file:// 생략');
      add('compliance', 'SW 등록', true, 'file:// 생략');
    }
    const iconOk = await new Promise(res => {
      const im = new Image();
      im.onload = () => res(true); im.onerror = () => res(false);
      im.src = 'icons/icon-192.png';
    });
    add('compliance', '앱 아이콘 로드', iconOk);

    const code = exportSaveCode();
    const back = JSON.parse(decodeURIComponent(escape(atob(code))));
    add('compliance', '세이브 코드 왕복', back.version === SAVE_VERSION);

    const fixtures = {
      'v1(최초)': { coins: 5, totalEarned: 5, totalClicks: 1, producers: { chick: 1 }, upgrades: {}, soundOn: true, lastSave: Date.now() },
      'v4(평면 stats)': { version: 4, coins: 1, totalEarned: 2e4, totalClicks: 9, producers: { chick: 2 }, upgrades: {}, stats: { bestCombo: 3, starsClicked: 1, clickEarned: 5, idleEarned: 5, offlineEarned: 0 }, prestige: { souls: 2, totalResets: 1, perks: { sticky: 1 } }, codex: { stages: { 0: true }, traits: {}, friends: { chick: true } }, decor: {}, story: {} },
      'v9(현행)': JSON.parse(snapS),
    };
    for (const [name, fx] of Object.entries(fixtures)) {
      try {
        const m = migrateSave(JSON.parse(JSON.stringify(fx)));
        add('compliance', `마이그레이션 ${name}`, m.version === SAVE_VERSION && noNaN(m));
      } catch (e) { add('compliance', `마이그레이션 ${name}`, false, String(e)); }
    }
    add('compliance', '가로 오버플로 없음', document.documentElement.scrollWidth <= innerWidth + 2,
      document.documentElement.scrollWidth + ' vs ' + innerWidth);
    add('compliance', '픽셀 폰트 + 폴백 체인', getComputedStyle(document.body).fontFamily.includes('Galmuri11'));
  } finally {
    // 완전 복원
    console.error = origErr;
    window.removeEventListener('error', onWinErr);
    window.confirm = origConfirm;
    if (snapLS === null) localStorage.removeItem(SAVE_KEY);
    else localStorage.setItem(SAVE_KEY, snapLS);
    S = migrateSave(JSON.parse(snapS)); computeBlessCache();
    slimeLevel = snapLevel; stageIdx = snapStage; combo = snapCombo;
    frenzyTimer = 0; partyTimer = 0; festActive = 0; pendingBlessings = 0;
    hideStar(); hideCloud(); hideStarlet();
    $('blessing-overlay').classList.remove('open');
    $('settings-overlay').classList.remove('open');
    document.querySelectorAll('.mini-star').forEach(el => el.remove());
    renderStageName(); renderHud(); buildShop(); rebuildFriends(); renderDecor(); applyCosmetics();
  }

  const byCriterion = {};
  let weighted = 0;
  for (const [cat, checks] of Object.entries(cats)) {
    const passed = checks.filter(c => c.pass).length;
    const pct = checks.length ? passed / checks.length * 100 : 100;
    byCriterion[cat] = `${pct.toFixed(1)}% (${passed}/${checks.length})`;
    weighted += pct * WEIGHTS[cat];
  }
  const score = weighted / 100;
  const failures = Object.entries(cats).flatMap(([cat, checks]) =>
    checks.filter(c => !c.pass).map(c => `[${cat}] ${c.name}${c.detail ? ' — ' + c.detail : ''}`));
  return { score: score.toFixed(1), byCriterion, failures };
};

// PWA: http(s)에서만 서비스워커 등록 (file:// 더블클릭 실행은 그대로 동작)
if ('serviceWorker' in navigator && (location.protocol === 'https:' || location.hostname === 'localhost' || location.hostname === '127.0.0.1')) {
  navigator.serviceWorker.register('sw.js').catch(() => {});
}

requestAnimationFrame(loop);
</script>
</body>
</html>
