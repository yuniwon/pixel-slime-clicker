<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>픽셀 슬라임 클리커</title>
<meta name="theme-color" content="#1a1033">
<link rel="manifest" href="manifest.json">
<link rel="icon" type="image/png" href="icons/icon-192.png">
<link rel="apple-touch-icon" href="icons/icon-192.png">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/quiple/galmuri/dist/galmuri.css">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; user-select: none; -webkit-user-select: none; -webkit-tap-highlight-color: transparent; }

  :root {
    --bg1: #1a1033;
    --bg2: #2d1b4e;
    --panel: #241640;
    --panel-light: #322057;
    --border: #4a3178;
    --text: #f0e6ff;
    --text-dim: #9d8ac4;
    --gold: #ffd75e;
    --green: #7dff8a;
    --pink: #ff8ac4;
    --soul: #b48aff;
  }

  html, body { height: 100%; overflow: hidden; }

  body {
    font-family: 'Galmuri11', 'DungGeunMo', 'Courier New', monospace;
    background:
      radial-gradient(ellipse at 50% 120%, #3d2566 0%, transparent 60%),
      linear-gradient(180deg, var(--bg1) 0%, var(--bg2) 100%);
    color: var(--text);
    display: flex;
    flex-direction: row;
    image-rendering: pixelated;
  }

  /* ── 별 배경 ── */
  .star {
    position: fixed;
    width: 4px; height: 4px;
    background: #fff;
    opacity: .5;
    animation: twinkle 2.4s infinite;
    pointer-events: none;
    z-index: 0;
  }
  @keyframes twinkle { 0%,100% { opacity: .15; } 50% { opacity: .7; } }

  /* ── 메인 게임 영역 ── */
  #game-area {
    flex: 1;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    position: relative;
    z-index: 1;
    min-width: 0;
    overflow: hidden;
  }

  #title {
    font-size: 22px;
    letter-spacing: 2px;
    color: var(--gold);
    text-shadow: 3px 3px 0 #00000055;
    margin-bottom: 4px;
  }

  #stage-name {
    font-size: 13px;
    color: var(--text-dim);
    margin-bottom: 8px;
  }
  #stage-name .trait { color: var(--gold); }

  /* ── 진화 진행바 ── */
  #evo-progress-wrap { text-align: center; margin-bottom: 10px; }
  #evo-progress-outer {
    width: 240px; height: 12px;
    background: #00000066;
    border: 2px solid var(--border);
    margin: 0 auto;
  }
  #evo-progress-bar {
    height: 100%; width: 0%;
    background: linear-gradient(90deg, var(--green), var(--gold));
    transition: width .3s ease;
  }
  #evo-progress-label { font-size: 11px; color: var(--text-dim); margin-top: 5px; }

  #coin-display {
    font-size: 32px;
    font-weight: bold;
    color: var(--gold);
    text-shadow: 2px 2px 0 #00000066;
    display: flex;
    align-items: center;
    gap: 10px;
  }

  #coin-icon { width: 28px; height: 28px; image-rendering: pixelated; animation: coinspin 2s steps(4) infinite; }
  @keyframes coinspin { 0% { transform: scaleX(1);} 25%{ transform: scaleX(.2);} 50%{ transform: scaleX(-1);} 75%{ transform: scaleX(.2);} 100%{ transform: scaleX(1);} }

  #cps-display { font-size: 14px; color: var(--green); margin-top: 4px; text-shadow: 1px 1px 0 #00000066; }

  #slime-wrap {
    margin: 24px 0 10px;
    cursor: pointer;
    position: relative;
    transition: filter .15s;
    outline: none;
  }
  #slime-wrap:active { filter: brightness(1.15); }
  #slime-wrap:focus-visible { filter: drop-shadow(0 0 8px var(--gold)); }

  #slime-canvas {
    width: 288px;
    height: 306px;
    image-rendering: pixelated;
    animation: bob 2.2s ease-in-out infinite;
    transform-origin: 50% 100%;
  }
  @keyframes bob {
    0%, 100% { transform: scale(1, 1); }
    50% { transform: scale(1.03, .96) translateY(2px); }
  }
  #slime-canvas.squish {
    animation: squish .18s ease-out;
  }
  @keyframes squish {
    0% { transform: scale(1.18, .78); }
    60% { transform: scale(.94, 1.1); }
    100% { transform: scale(1, 1); }
  }

  #slime-shadow {
    width: 200px; height: 26px;
    background: #00000055;
    border-radius: 50%;
    margin: -18px auto 0;
    filter: blur(2px);
  }

  /* ── 말풍선 ── */
  #speech-bubble {
    position: absolute;
    top: -14px; left: 50%;
    transform: translateX(-50%) scale(0);
    background: var(--text);
    color: #2d1b4e;
    font-size: 12px;
    line-height: 1.5;
    padding: 8px 14px;
    border: 3px solid #2d1b4e;
    box-shadow: 3px 3px 0 #00000055;
    max-width: 240px;
    width: max-content;
    text-align: center;
    z-index: 10;
    transition: transform .2s ease;
    pointer-events: none;
  }
  #speech-bubble.show { transform: translateX(-50%) scale(1); }
  #speech-bubble::after {
    content: '';
    position: absolute;
    bottom: -10px; left: 50%;
    margin-left: -5px;
    border: 5px solid transparent;
    border-top-color: #2d1b4e;
  }

  /* ── 친구 시각화: 행동 기반 주민 시스템 ── */
  #friends-layer {
    position: absolute;
    inset: 0;
    pointer-events: none;
    overflow: visible;
    z-index: 0;
  }
  .friend {
    position: absolute;
    filter: drop-shadow(2px 2px 0 #00000044);
    animation: friend-pop-in .3s ease-out;
  }
  @keyframes friend-pop-in {
    from { transform: scale(.2); opacity: 0; }
    to { transform: scale(1); opacity: 1; }
  }
  .fr-move { display: inline-block; animation-timing-function: ease-in-out; animation-iteration-count: infinite; }
  .fr-frames {
    display: inline-block;
    background-repeat: no-repeat;
    background-position: var(--fx0) var(--fy);
    animation: frframes steps(1) infinite;
    image-rendering: auto;
  }
  @keyframes frframes {
    0%, 50% { background-position: var(--fx0) var(--fy); }
    50.1%, 100% { background-position: var(--fx1) var(--fy); }
  }
  .friend-emoji { font-size: 30px; }

  .bv-peck { animation-name: bv-peck; animation-duration: 1.6s; }
  @keyframes bv-peck {
    0%, 52%, 100% { transform: translateY(0) rotate(0deg); }
    62% { transform: translateY(4px) rotate(13deg); }
    72% { transform: translateY(1px) rotate(3deg); }
    82% { transform: translateY(4px) rotate(13deg); }
  }
  .bv-snooze { animation-name: bv-snooze; animation-duration: 3.6s; }
  @keyframes bv-snooze {
    0%, 100% { transform: scaleY(1) translateY(0); }
    50% { transform: scaleY(.93) translateY(2px); }
  }
  .bv-run { animation-name: bv-run; animation-duration: 5.4s; animation-timing-function: linear; }
  @keyframes bv-run {
    0% { transform: translateX(-34px) scaleX(1); }
    48% { transform: translateX(34px) scaleX(1); }
    50% { transform: translateX(34px) scaleX(-1); }
    98% { transform: translateX(-34px) scaleX(-1); }
    100% { transform: translateX(-34px) scaleX(1); }
  }
  .bv-hop { animation-name: bv-hop; animation-duration: 6.5s; }
  @keyframes bv-hop {
    0%, 60%, 100% { transform: translateY(0); }
    66% { transform: translateY(-72px) rotate(-6deg); }
    72% { transform: translateY(-64px) rotate(4deg); }
    80% { transform: translateY(0); }
  }
  .bv-shine { animation-name: bv-shine; animation-duration: 2.8s; }
  @keyframes bv-shine {
    0%, 100% { transform: translateY(0); filter: drop-shadow(0 0 2px #ffffff44); }
    50% { transform: translateY(-6px); filter: drop-shadow(0 0 10px #ffd75ecc); }
  }
  .bv-guard { animation-name: bv-guard; animation-duration: 4.2s; }
  @keyframes bv-guard {
    0%, 100% { transform: translateY(0) rotate(-3deg); }
    50% { transform: translateY(-4px) rotate(3deg); }
  }
  .bv-cross { animation-name: bv-cross; animation-duration: 46s; animation-timing-function: linear; }
  @keyframes bv-cross {
    0% { transform: translateX(calc(-1 * min(34vw, 300px))) scaleX(1); }
    49% { transform: translateX(min(34vw, 300px)) scaleX(1); }
    51% { transform: translateX(min(34vw, 300px)) scaleX(-1); }
    100% { transform: translateX(calc(-1 * min(34vw, 300px))) scaleX(-1); }
  }
  .bv-orbit { animation-name: bv-orbit; animation-duration: 52s; animation-timing-function: linear; }
  @keyframes bv-orbit { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }

  @media (prefers-reduced-motion: reduce) {
    .fr-move, .fr-frames, #slime-canvas, .decor { animation: none !important; }
  }
  .sprite-icon {
    display: inline-block;
    flex: 0 0 auto;
    background-repeat: no-repeat;
    image-rendering: auto;
    vertical-align: middle;
  }
  /* 생성 에셋이 전반적으로 채도가 낮아 가볍게 보정한다 */
  .sprite-icon.friend-sprite { filter: saturate(1.3) drop-shadow(2px 2px 0 #00000055); }
  .sprite-icon.shop-sprite { filter: saturate(1.3) drop-shadow(2px 2px 0 #00000044); }
  .sprite-icon.locked-sprite {
    filter: grayscale(1) brightness(.48) drop-shadow(2px 2px 0 #00000044);
    opacity: .72;
  }
  .fr-frames { filter: saturate(1.3); }
  @keyframes friendbob {
    from { transform: translateY(0); }
    to { transform: translateY(-10px); }
  }

  #combo-box {
    height: 44px;
    margin-top: 10px;
    text-align: center;
    visibility: hidden;
  }
  #combo-box.on { visibility: visible; }
  #combo-label { font-size: 16px; color: var(--pink); text-shadow: 2px 2px 0 #00000066; }
  #combo-bar-outer {
    width: 180px; height: 10px;
    background: #00000066;
    border: 2px solid var(--border);
    margin: 6px auto 0;
  }
  #combo-bar { height: 100%; width: 100%; background: var(--pink); transition: width .1s linear; }

  #buff-banner {
    position: absolute;
    top: 12px; left: 50%;
    transform: translateX(-50%);
    background: #ffd75e;
    color: #5e4517;
    font-weight: bold;
    padding: 8px 18px;
    font-size: 14px;
    border: 3px solid #fff;
    box-shadow: 4px 4px 0 #00000055;
    display: none;
    z-index: 5;
    animation: buff-pulse .4s infinite alternate;
    white-space: nowrap;
  }
  @keyframes buff-pulse { from { transform: translateX(-50%) scale(1);} to { transform: translateX(-50%) scale(1.06);} }

  /* ── 떠오르는 숫자 ── */
  .float-num {
    position: fixed;
    font-size: 20px;
    font-weight: bold;
    color: var(--gold);
    text-shadow: 2px 2px 0 #00000088;
    pointer-events: none;
    z-index: 50;
    animation: floatup .9s ease-out forwards;
  }
  .float-num.big { font-size: 28px; color: var(--pink); }
  @keyframes floatup {
    0% { opacity: 1; transform: translateY(0) scale(1); }
    100% { opacity: 0; transform: translateY(-90px) scale(1.2); }
  }

  .spark {
    position: fixed;
    width: 8px; height: 8px;
    pointer-events: none;
    z-index: 49;
  }

  /* ── 황금별 / 미니 별똥별 ── */
  #golden-star {
    position: fixed;
    width: 64px; height: 64px;
    cursor: pointer;
    z-index: 60;
    display: none;
    image-rendering: pixelated;
    animation: starwobble .6s ease-in-out infinite alternate;
    filter: drop-shadow(0 0 12px #ffd75ecc);
  }
  @keyframes starwobble { from { transform: rotate(-12deg) scale(1);} to { transform: rotate(12deg) scale(1.12);} }

  /* ── 먹구름 손님 ── */
  #raincloud {
    position: fixed;
    width: 108px;
    height: 72px;
    cursor: pointer;
    z-index: 61;
    display: none;
    image-rendering: pixelated;
    filter: drop-shadow(0 4px 10px #00000088);
  }
  #raincloud.drift { animation: cloud-bob 2.4s ease-in-out infinite; }
  @keyframes cloud-bob {
    0%, 100% { transform: translateY(0); }
    50% { transform: translateY(-8px); }
  }
  #raincloud.challenge { animation: cloud-shake .35s ease-in-out infinite; }
  @keyframes cloud-shake {
    0%, 100% { transform: rotate(-2deg); }
    50% { transform: rotate(2deg); }
  }
  #raincloud img { width: 100%; height: 100%; image-rendering: pixelated; }
  #cloud-bar-outer {
    position: absolute;
    top: -16px; left: 4px; right: 4px;
    height: 9px;
    background: #00000088;
    border: 2px solid #2a3140;
    display: none;
  }
  #raincloud.challenge #cloud-bar-outer { display: block; }
  #cloud-bar { height: 100%; width: 0%; background: linear-gradient(90deg, #7fc4ff, #ffd75e); }
  .raindrop {
    position: fixed;
    width: 4px; height: 9px;
    background: #7fc4ff;
    pointer-events: none;
    z-index: 60;
  }

  .mini-star {
    position: fixed;
    width: 32px; height: 32px;
    cursor: pointer;
    z-index: 60;
    image-rendering: pixelated;
    animation: starwobble .5s ease-in-out infinite alternate;
    filter: drop-shadow(0 0 8px #ffd75ecc);
  }

  /* ── 상점 패널 ── */
  #shop {
    width: 360px;
    background: var(--panel);
    border-left: 4px solid var(--border);
    display: flex;
    flex-direction: column;
    z-index: 2;
  }

  #shop-header {
    padding: 14px 16px 10px;
    border-bottom: 3px solid var(--border);
    display: flex;
    justify-content: space-between;
    align-items: center;
  }
  #shop-header h2 { font-size: 16px; color: var(--gold); letter-spacing: 1px; }
  #discount-badge {
    display: none;
    font-size: 11px;
    color: #5e4517;
    background: var(--gold);
    padding: 2px 8px;
    border: 2px solid #fff;
    animation: buff-pulse .5s infinite alternate;
  }

  .icon-btn {
    background: var(--panel-light);
    border: 2px solid var(--border);
    color: var(--text);
    font-family: inherit;
    font-size: 14px;
    padding: 4px 10px;
    cursor: pointer;
  }
  .icon-btn:hover { background: var(--border); }
  #reset-btn.holding { background: #8a2b2b; }

  #shop-tabs { display: flex; border-bottom: 3px solid var(--border); }
  .tab {
    flex: 1;
    text-align: center;
    padding: 10px 0;
    font-size: 12px;
    cursor: pointer;
    color: var(--text-dim);
    background: var(--panel);
  }
  .tab.active { color: var(--gold); background: var(--panel-light); }

  #buy-modes {
    display: none;
    gap: 6px;
    padding: 8px 10px 0;
  }
  #buy-modes.on { display: flex; }
  .mode-btn {
    flex: 1;
    background: var(--panel-light);
    border: 2px solid var(--border);
    color: var(--text-dim);
    font-family: inherit;
    font-size: 12px;
    padding: 5px 0;
    cursor: pointer;
  }
  .mode-btn.active { color: var(--gold); border-color: var(--gold); }

  #shop-list {
    flex: 1;
    overflow-y: auto;
    padding: 10px;
  }
  #shop-list::-webkit-scrollbar { width: 8px; }
  #shop-list::-webkit-scrollbar-thumb { background: var(--border); }

  .shop-item {
    display: flex;
    align-items: center;
    gap: 12px;
    background: var(--panel-light);
    border: 3px solid var(--border);
    padding: 10px 12px;
    margin-bottom: 8px;
    cursor: pointer;
    transition: transform .06s;
    position: relative;
  }
  .shop-item:hover:not(.locked) { border-color: var(--gold); }
  .shop-item:active:not(.locked) { transform: scale(.98); }
  .shop-item.locked { opacity: .45; cursor: not-allowed; }

  .shop-icon {
    font-size: 30px;
    width: 72px;
    min-width: 72px;
    text-align: center;
    display: flex;
    align-items: center;
    justify-content: center;
    filter: drop-shadow(2px 2px 0 #00000044);
  }
  .shop-info { flex: 1; min-width: 0; }
  .shop-name { font-size: 14px; font-weight: bold; }
  .shop-desc { font-size: 11px; color: var(--text-dim); margin-top: 3px; line-height: 1.4; }
  .shop-cost { font-size: 13px; color: var(--gold); margin-top: 4px; }
  .shop-count {
    font-size: 20px;
    font-weight: bold;
    color: var(--green);
    min-width: 36px;
    text-align: right;
  }

  /* 업적 */
  #ach-summary {
    text-align: center;
    font-size: 12px;
    color: var(--gold);
    padding: 4px 0 10px;
  }
  .ach-item { cursor: default; }
  .ach-item.done { border-color: var(--gold); }
  .ach-item.done .shop-name { color: var(--gold); }
  .ach-item:not(.done) { opacity: .5; }

  /* 환생 */
  #prestige-info {
    text-align: center;
    font-size: 12px;
    color: var(--soul);
    padding: 4px 0 10px;
    line-height: 1.8;
  }
  .prestige-btn { border-color: var(--soul); }
  .prestige-btn .shop-name { color: var(--soul); }
  .prestige-btn:hover:not(.locked) { border-color: var(--text); }
  .perk-item .shop-cost { color: var(--soul); }
  .perk-item.maxed { border-color: var(--soul); opacity: .8; cursor: default; }

  #stats-bar {
    border-top: 3px solid var(--border);
    padding: 10px 16px;
    font-size: 11px;
    color: var(--text-dim);
    line-height: 1.7;
  }
  #stats-bar .soul { color: var(--soul); }

  /* ── 슬라임 방 (장식) ── */
  #decor-layer {
    position: absolute;
    inset: 0;
    pointer-events: none;
    z-index: 0;
  }
  .decor {
    position: absolute;
    font-size: 34px;
    filter: drop-shadow(2px 2px 0 #00000055);
    animation: decorbob 3.2s ease-in-out infinite alternate;
  }
  @keyframes decorbob {
    from { transform: translateY(0); }
    to { transform: translateY(-5px); }
  }
  .decor.center { transform: translateX(-50%); animation: none; }

  .room-section-title {
    font-size: 12px;
    color: var(--gold);
    margin: 14px 4px 8px;
    letter-spacing: 1px;
  }
  .codex-grid {
    display: grid;
    grid-template-columns: repeat(5, 1fr);
    gap: 6px;
    margin-bottom: 4px;
  }
  .codex-grid.cols4 { grid-template-columns: repeat(4, 1fr); }
  .codex-cell {
    background: var(--panel-light);
    border: 2px solid var(--border);
    text-align: center;
    padding: 8px 2px 6px;
    font-size: 10px;
    color: var(--text-dim);
    line-height: 1.4;
    min-height: 58px;
  }
  .codex-cell.seen { border-color: var(--gold); color: var(--text); }
  .codex-swatch {
    width: 22px; height: 22px;
    margin: 0 auto 4px;
    border: 2px solid #00000055;
  }
  .trait-cell {
    min-height: 92px;
    padding-top: 6px;
  }
  .trait-preview {
    width: 48px;
    height: 51px;
    image-rendering: pixelated;
    margin: 0 auto 3px;
  }
  .trait-cell .trait-desc {
    color: var(--text-dim);
    font-size: 10px;
    line-height: 1.35;
  }
  .trait-cell.seen .trait-desc { color: var(--text); opacity: .8; }
  .codex-cell .sprite-icon { margin-bottom: 2px; }
  .story-entry {
    background: var(--panel-light);
    border: 3px solid var(--border);
    border-left-color: var(--gold);
    padding: 10px 12px;
    margin-bottom: 8px;
    font-size: 11px;
    line-height: 1.7;
    color: var(--text);
  }
  .story-entry .story-title { color: var(--gold); font-weight: bold; margin-bottom: 4px; font-size: 12px; }
  .story-entry.locked { opacity: .4; border-left-color: var(--border); }

  /* ── 슬라임 앨범 ── */
  .album-box {
    background: var(--panel-light);
    border: 3px solid var(--border);
    padding: 10px 14px;
    margin-bottom: 8px;
  }
  .album-row {
    display: flex;
    justify-content: space-between;
    font-size: 11px;
    color: var(--text-dim);
    padding: 4px 0;
    border-bottom: 1px solid #00000033;
  }
  .album-row:last-child { border-bottom: none; }
  .album-row b { color: var(--gold); }

  .shop-syn { color: #d9b84a; }
  .syn-line { font-size: 10px; color: var(--text-dim); margin-top: 3px; line-height: 1.4; }
  .syn-line.on { color: var(--green); }

  /* ── 소원 / 별가루 ── */
  #stardust-display {
    text-align: center;
    font-size: 13px;
    color: var(--gold);
    padding: 6px 0 10px;
  }
  .wish-item { cursor: default; }
  .wish-item.done { border-color: var(--green); }
  .wish-bar-outer {
    height: 8px;
    background: #00000066;
    border: 2px solid var(--border);
    margin-top: 6px;
  }
  .wish-bar {
    height: 100%; width: 0%;
    background: linear-gradient(90deg, var(--pink), var(--gold));
    transition: width .25s ease;
  }
  .wish-reward { font-size: 11px; color: var(--gold); margin-top: 4px; }
  .cosmetic-item.equipped { border-color: var(--gold); }
  .cosmetic-item.equipped .shop-name::after { content: ' (장착 중)'; color: var(--green); font-size: 11px; }

/* 색 복원 틴트: 생성 파이프라인이 회색으로 죽인 에셋을 CSS colorize로 살린다.
   회색 픽셀은 명암 정보가 온전해서 sepia→hue-rotate 틴트가 깨끗하게 먹는다.
   새로 회색 에셋을 발견하면 여기에 한 줄 추가하면 끝. */
const TINT_FILTERS = {
  pink:   'sepia(1) saturate(5) hue-rotate(287deg) brightness(1.08)',
  violet: 'sepia(1) saturate(3.5) hue-rotate(220deg) brightness(1.02)',
};

const SPRITE_TINTS = {
  'cosmetics:aura-pink':   'pink',
  'cosmetics:bubble-pink': 'pink',
  'cosmetics:pt-heart':    'pink',
  'blessings:soulwhisper': 'violet',
  'items:prestige':        'violet',
};

/* 범용 스프라이트 렌더러.
   opts: { size, className, frame } — layout 미존재 시 fallback(이모지) 반환 */
function spriteHtml(atlasKey, id, fallback, opts = {}) {
  const atlas = SPRITE_ATLASES[atlasKey];
  if (!atlas || !atlas.sheet) return fallback;
  const frames = atlas.layout[id];
  if (!frames || !frames.length) return fallback;
  const r = frames[(opts.frame || 0) % frames.length];
  const size = opts.size || 60;
  const className = opts.className || 'shop-sprite';
  const scale = size / r.w;
  const style = [
    `width:${size}px`,
    `height:${size}px`,
    `background-image:url('${atlas.src}')`,
    `background-size:${atlas.sheet.w * scale}px ${atlas.sheet.h * scale}px`,
    `background-position:-${r.x * scale}px -${r.y * scale}px`,
  ];
  const tint = SPRITE_TINTS[`${atlasKey}:${id}`];
  if (tint) style.push(`filter:${TINT_FILTERS[tint]} drop-shadow(2px 2px 0 #00000044)`);
  return `<span class="sprite-icon ${className}" aria-hidden="true" style="${style.join(';')}"></span>`;
}

/* 기존 호출부 호환 래퍼 */
function producerSpriteHtml(id, fallback, className = 'shop-sprite', frame = 0) {
  const size = className.includes('friend-sprite') ? 56 : 64;
  return spriteHtml('friends', id, fallback, { size, className, frame });
}

function itemSpriteHtml(id, fallback, className = 'shop-sprite') {
  return spriteHtml('items', id, fallback, { size: 60, className });
}

function achievementSpriteHtml(id, fallback, done) {
  const className = done ? 'shop-sprite' : 'shop-sprite locked-sprite';
  return spriteHtml('achievements', id, done ? fallback : '❓', { size: 54, className });
}

function decorSpriteHtml(id, fallback, className = 'shop-sprite') {
  const size = className.includes('room-decor-sprite') ? 78 : 60;
  return spriteHtml('decor', id, fallback, { size, className });
}

function setProducerShopIcon(el, p, reveal) {
  const icon = el.querySelector('.shop-icon');
  icon.innerHTML = reveal ? producerSpriteHtml(p.id, p.icon) : '❓';
}

function fmt(n) {
  if (n < 0) return '0';
  if (n < 1000) return n < 100 && n % 1 !== 0 ? n.toFixed(1) : Math.floor(n).toLocaleString();
  const units = [[1e16, '경'], [1e12, '조'], [1e8, '억'], [1e4, '만']];
  for (const [v, u] of units) {
    if (n >= v) {
      const x = n / v;
      return (x >= 100 ? Math.floor(x).toLocaleString() : x.toFixed(x >= 10 ? 1 : 2)) + u;
    }
  }
  return Math.floor(n).toLocaleString();
}

function fmtTime(sec) {
  if (!isFinite(sec)) return '∞';
  if (sec < 60) return Math.ceil(sec) + '초';
  if (sec < 3600) return Math.floor(sec / 60) + '분 ' + Math.ceil(sec % 60) + '초';
  if (sec < 86400) return (sec / 3600).toFixed(1) + '시간';
  return (sec / 86400).toFixed(1) + '일';
}

/* 모든 코인 획득은 여기로: lifetime/run 통계가 함께 기록된다.
   kind: 'click' | 'idle' | 'offline' | 'event' */
function earnCoins(gain, kind) {
  S.coins += gain;
  S.totalEarned += gain;
  S.stats.lifetime.earned += gain;
  if (kind === 'click') S.stats.run.clickEarned += gain;
  else if (kind === 'idle') S.stats.run.idleEarned += gain;
  else if (kind === 'offline') S.stats.run.offlineEarned += gain;
  if (frenzyTimer > 0) frenzyEarned += gain;
  wishEvent('earn', gain);
}

function earnShare(key) {
  const r = S.stats.run;
  const tot = r.clickEarned + r.idleEarned + r.offlineEarned;
  return tot > 0 ? r[key] / tot : 0;
}

function producerCost(p, owned) {
  if (owned === undefined) owned = S.producers[p.id];
  return Math.ceil(p.baseCost * Math.pow(1.15, owned) * (hasBless('firststep') ? 0.92 : 1));
}

function bulkInfo(p) {
  const owned = S.producers[p.id];
  const budget = S.coins;
  const disc = S.buffs.discount ? 0.5 : 1;
  if (buyMode === '1') {
    return { count: 1, cost: producerCost(p, owned) * disc };
  }
  if (buyMode === '10') {
    let total = 0;
    for (let k = 0; k < 10; k++) total += producerCost(p, owned + k);
    return { count: 10, cost: total * disc };
  }
  // 상한 1000: 비용이 1.15^n 지수 성장이라 실질적으로 도달 불가능한 안전망
  let total = 0, count = 0;
  for (let k = 0; k < 1000; k++) {
    const c = producerCost(p, owned + count) * disc;
    if (total + c > budget) break;
    total += c;
    count++;
  }
  if (count === 0) return { count: 0, cost: producerCost(p, owned) * disc };
  return { count, cost: total };
}

function perkLv(id) { return S.prestige.perks[id] || 0; }
function perkCost(id) { return perkLv(id) + 1; }

/* ── 친구 시너지 헬퍼 ── */
function hasSyn(id, n) { return S.producers[id] >= n; }

function nextSynergy(id) {
  const list = SYNERGIES[id] || [];
  return list.find(s => S.producers[id] < s.at) || null;
}

function codexEntryCount() {
  return Object.keys(S.codex.stages).length + Object.keys(S.codex.traits).length +
         Object.keys(S.codex.friends).length + Object.keys(S.story).length;
}

function decorAmp() {
  return 1 + (hasSyn('unicorn', 10) ? 0.1 : 0) + (hasSyn('planet', 10) ? 0.1 : 0);
}

function planetMul() {
  const n = S.producers.planet;
  return 1 + 0.01 * Math.min(n, 25) + 0.002 * Math.max(0, n - 25);
}

function clickSynMul() {
  let m = 1;
  if (hasSyn('chick', 10)) m *= 1.05;
  if (hasSyn('chick', 50) && combo >= 30) m *= 1.2;
  if (hasSyn('dragon', 50) && frenzyTimer > 0) m *= 1.25;
  if (festActive > 0) m *= 2;
  return m;
}

function frenzyDuration() { return 20 + (hasSyn('dragon', 10) ? 2 : 0) + (hasBless('partylong') ? 3 : 0); }
function partyDuration() { return 30 + (hasSyn('whale', 25) ? 5 : 0) + (hasBless('partylong') ? 3 : 0); }
function offlineCapHours() { return 8 + (hasSyn('cat', 25) ? 1 : 0) + (hasSyn('whale', 10) ? 2 : 0); }
function offlineSynMul() { return (hasSyn('cat', 10) ? 1.1 : 1) * (hasSyn('whale', 100) ? 1.15 : 1); }
function dreamThreshold() { return hasSyn('cat', 50) ? 0.18 : 0.25; }

function achCount() { return Object.keys(S.achievements).length; }

/* 영혼 보너스는 총 획득량 기준 — 특성을 사도 수입이 줄지 않는다 */
function soulMul() { return 1 + S.prestige.totalSoulsEarned * 0.05; }

function globalMul() {
  const codexBonus = hasSyn('unicorn', 50) ? 1 + 0.005 * codexEntryCount() : 1;
  return (1 + achCount() * 0.01) * soulMul() * codexBonus;
}

function comboWindow() { return 0.9 + 0.15 * perkLv('combo') + (hasBless('comboKeep') ? 0.25 : 0); }

function offlineRate() {
  return Math.min(1, 0.5 + 0.1 * perkLv('softtime') + (hasBless('napecon') ? 0.1 : 0));
}

function effNeed(i) {
  return STAGES[i].need * (1 - 0.05 * perkLv('evoseed')) * (hasBless('slowcrown') ? 0.96 : 1);
}

function soulsGain() {
  const base = Math.floor(Math.sqrt(S.totalEarned / 6e7) * (hasSyn('planet', 5) ? 1.05 : 1));
  return base >= 1 ? base + (hasBless('soulwhisper') ? 1 : 0) : 0;
}

function decorClickMul() {
  let sum = 0;
  for (const d of DECOR) if (S.decor[d.id] && d.boost.click) sum += d.boost.click;
  return 1 + sum * decorAmp();
}

function decorCpsMul() {
  let sum = 0;
  for (const d of DECOR) if (S.decor[d.id] && d.boost.cps) sum += d.boost.cps;
  return 1 + sum * decorAmp();
}

function starLinger() {
  let bonus = 0;
  for (const d of DECOR) if (S.decor[d.id] && d.boost.star) bonus += d.boost.star;
  return 10 + bonus * decorAmp() + (hasSyn('dog', 10) ? 1 : 0) + (hasBless('starlonger') ? 3 : 0);
}

function clickPower() {
  let add = 1, mul = 1, cpsPart = 0;
  for (const u of UPGRADES) {
    if (!S.upgrades[u.id]) continue;
    if (u.type === 'clickAdd') add += u.value;
    if (u.type === 'clickMul') mul *= u.value;
    if (u.type === 'clickCps') cpsPart += u.value;
  }
  const sticky = 1 + 0.25 * perkLv('sticky');
  const bless = (hasBless('sparkfinger') ? 1.1 : 1) * (hasBless('warmstart') ? 1.05 : 1);
  return add * mul * globalMul() * sticky * decorClickMul() * clickSynMul() * bless + totalCps() * cpsPart;
}

function cpsMulFactor() {
  let mul = 1;
  for (const u of UPGRADES) {
    if (S.upgrades[u.id] && u.type === 'cpsMul') mul *= u.value;
  }
  return mul * globalMul() * (1 + 0.2 * perkLv('promise')) * decorCpsMul()
    * planetMul()
    * (hasSyn('whale', 50) ? 1.1 : 1)
    * (hasSyn('planet', 25) ? 1.1 : 1)
    * (hasBless('quietrich') ? 1.08 : 1)
    * (hasBless('warmstart') ? 1.05 : 1);
}

function totalCps() {
  let base = 0;
  for (const p of PRODUCERS) base += p.cps * S.producers[p.id];
  return base * cpsMulFactor();
}

function comboMul() {
  const amp = hasSyn('chick', 25) ? 1.1 : 1;
  return 1 + Math.min(combo, 50) * 0.02 * amp;
}
function frenzyMul() { return frenzyTimer > 0 ? (hasSyn('dragon', 25) ? 8 : 7) : 1; }
function partyMul() { return partyTimer > 0 ? 5 : 1; }

let audioCtx = null;
function beep(freq, dur = 0.07, type = 'square', vol = 0.08) {
  if (!S.soundOn) return;
  try {
    if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
    const o = audioCtx.createOscillator();
    const g = audioCtx.createGain();
    o.type = type;
    o.frequency.value = freq;
    g.gain.setValueAtTime(vol, audioCtx.currentTime);
    g.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + dur);
    o.connect(g); g.connect(audioCtx.destination);
    o.start(); o.stop(audioCtx.currentTime + dur);
  } catch (e) { /* 오디오 미지원 환경 무시 */ }
}

const slimeCv = $('slime-canvas');
const slimeCtx = slimeCv.getContext('2d');

function px(ctx, x, y, color, w = 1, h = 1) {
  ctx.fillStyle = color;
  ctx.fillRect(x, y, w, h);
}

function drawTinyStar(ctx, x, y, color = '#ffd75e') {
  px(ctx, x, y - 1, '#fff8d6');
  px(ctx, x - 1, y, color);
  px(ctx, x, y, color);
  px(ctx, x + 1, y, color);
  px(ctx, x, y + 1, color);
}

function drawTraitOverlay(ctx, key, t = 0) {
  if (!key) return;
  if (key === 'muscle') {
    px(ctx, 4, 8, '#8f2334', 8, 1);
    px(ctx, 5, 7, '#ef5b66', 6, 1);
    px(ctx, 12, 8, '#ef5b66', 1, 1);
    px(ctx, 13, 7, '#8f2334', 1, 1);
    px(ctx, 13, 9, '#8f2334', 1, 1);
    px(ctx, 1, 11, '#ef5b66', 1, 2);
    px(ctx, 14, 11, '#ef5b66', 1, 2);
  } else if (key === 'ranch') {
    px(ctx, 3, 4, '#8f6a2f', 10, 1);
    px(ctx, 5, 2, '#d6b35b', 6, 1);
    px(ctx, 4, 3, '#f0cf72', 8, 1);
    px(ctx, 6, 4, '#f0cf72', 4, 1);
    px(ctx, 11, 2, '#6ed26d', 1, 1);
    px(ctx, 12, 1, '#3a9e4d', 1, 1);
  } else if (key === 'star') {
    drawTinyStar(ctx, 3, 4);
    drawTinyStar(ctx, 12, 3, '#e8b73a');
    px(ctx, 6, 9, '#fff8d6');
    px(ctx, 11, 9, '#fff8d6');
    px(ctx, 14, 7, '#ffd75e');
  } else if (key === 'dream') {
    px(ctx, 5, 3, '#5a9ad9', 6, 1);
    px(ctx, 6, 2, '#8ed0ff', 5, 1);
    px(ctx, 10, 1, '#5a9ad9', 2, 1);
    px(ctx, 12, 2, '#ffffff');
    px(ctx, 2, 5, '#dff5ff', 2, 1);
    px(ctx, 1, 6, '#bfe8ff', 4, 1);
    px(ctx, 3, 4, '#ffffff');
  } else if (key === 'samsara') {
    const pulse = Math.floor(t / 450) % 2;
    ctx.save();
    ctx.globalAlpha = pulse ? 0.55 : 0.35;
    for (let y = 4; y < SLIME_MAP.length; y++) {
      for (let x = 0; x < 16; x++) {
        if (SLIME_MAP[y][x] !== '.' && x > 0) px(ctx, x - 1, y, '#b48aff');
      }
    }
    ctx.restore();
    px(ctx, 5, 2, '#d8c2ff', 6, 1);
    px(ctx, 4, 3, '#8d5ce8');
    px(ctx, 11, 3, '#8d5ce8');
    px(ctx, 3, 8, '#d8c2ff');
    px(ctx, 12, 8, '#d8c2ff');
    px(ctx, 5, 14, '#8d5ce8', 6, 1);
  }
}

function drawTraitPreview(ctx, key) {
  const pal = { b: '#5ad95a', l: '#aef2a4', d: '#37a837', o: '#1b4a26' };
  const colors = { o: pal.o, b: pal.b, l: pal.l, d: pal.d, w: '#ffffff', k: '#26203a', p: '#ff9fb2' };
  ctx.clearRect(0, 0, 16, 17);
  for (let y = 0; y < SLIME_MAP.length; y++) {
    for (let x = 0; x < 16; x++) {
      const c = SLIME_MAP[y][x];
      if (c === '.') continue;
      px(ctx, x, y, colors[c] || pal.b);
    }
  }
  drawTraitOverlay(ctx, key, 0);
}

function traitPreviewDataUrl(key) {

}

function drawSlime(t) {
  const stage = STAGES[stageIdx];
  let pal = stage.pal;
  if (stage.rainbow) {
    const hue = (t / 30) % 360;
    pal = {
      b: `hsl(${hue},80%,65%)`, l: `hsl(${hue},85%,82%)`,
      d: `hsl(${hue},70%,45%)`, o: `hsl(${hue},60%,22%)`,
    };
  }
  const colors = {
    o: pal.o, b: pal.b, l: pal.l, d: pal.d,
    w: '#ffffff',
    k: currentTrait ? currentTrait.pupil : (hasSamsaraAura() ? SAMSARA_TRAIT.pupil : '#26203a'),  // 성향에 따라 눈동자 색 변화
    p: '#ff9fb2', y: '#ffd75e',
  };
  slimeCtx.clearRect(0, 0, 16, 17);

  for (let y = 0; y < SLIME_MAP.length; y++) {
    for (let x = 0; x < 16; x++) {
      let c = SLIME_MAP[y][x];
      if (c === '.') continue;
      if (blinking > 0 && (c === 'w' || c === 'k')) {
        if (y === 9) c = 'b';
        else c = 'k';
      }
      slimeCtx.fillStyle = colors[c];
      slimeCtx.fillRect(x, y, 1, 1);
    }
  }
  if (stage.crown) {
    for (let y = 0; y < CROWN_MAP.length; y++) {
      for (let x = 0; x < 16; x++) {
        const c = CROWN_MAP[y][x];
        if (c === '.') continue;
        slimeCtx.fillStyle = (y === 2 || (y === 1 && x % 3 === 0)) ? '#e0a82e' : colors.y;
        slimeCtx.fillRect(x, y + 1, 1, 1);
      }
    }
  }
  if (currentTrait) drawTraitOverlay(slimeCtx, currentTrait.key, t);
  // 윤회 오라는 행동 성향과 함께 겹쳐 보인다
  if (hasSamsaraAura()) drawTraitOverlay(slimeCtx, 'samsara', t);
}

const slimeWrap = $('slime-wrap');

function doClick(x, y) {
  // 퍼펙트 말랑: 3% 확률로 x5 — 손맛용 잭팟 (작은 행운 축복 +2%p)
  const perfect = Math.random() < (0.03 + (hasBless('luckytip') ? 0.02 : 0));
  let gain = clickPower() * comboMul() * frenzyMul();
  if (perfect) gain *= 5;
  earnCoins(gain, 'click');
  S.totalClicks++;
  S.stats.run.clicks++;

  combo++;
  if (hasBless('elastic') && combo < 5) combo = 5;
  comboTimer = comboWindow();
  if (combo > S.stats.run.bestCombo) S.stats.run.bestCombo = combo;
  if (combo > S.stats.lifetime.bestCombo) S.stats.lifetime.bestCombo = combo;

  slimeCv.classList.remove('squish');
  void slimeCv.offsetWidth;
  slimeCv.classList.add('squish');

  if (perfect) {
    spawnFloat(x, y - 10, '퍼펙트 말랑! +' + fmt(gain), false, true);
    spawnSparks(x, y);
    spawnSparks(x, y);
    sndPerfect();
  } else {
    spawnFloat(x, y, '+' + fmt(gain), frenzyTimer > 0);
    spawnSparks(x, y);
    sndClick();
  }
  // 코인 카운터 팝
  const coinEl = $('coin-display');
  coinEl.classList.remove('pop');
  void coinEl.offsetWidth;
  coinEl.classList.add('pop');

  wishEvent('click', 1);
  wishEvent('combo', combo);
  checkEvolution();
  renderHud();
}

slimeWrap.addEventListener('pointerdown', e => doClick(e.clientX, e.clientY));

window.addEventListener('keydown', e => {
  if (e.code !== 'Space' && e.code !== 'Enter') return;
  const tag = (e.target.tagName || '').toLowerCase();

  e.preventDefault();
  const r = slimeCv.getBoundingClientRect();
  doClick(r.left + r.width / 2 + (Math.random() * 60 - 30), r.top + r.height * 0.55);
});

  const emoji = S.cosmetics.equipped.particle;  // 장착한 파티클 스킨

  }
}

/* ════════════════════════ 진화 / 성향 ════════════════════════ */

function currentStageFor(total) {
  let idx = 0;
  for (let i = 0; i < STAGES.length; i++) if (total >= effNeed(i)) idx = i;
  return idx;
}

function confettiBurst() {
  const r = slimeCv.getBoundingClientRect();
  const cx = r.left + r.width / 2;
  const cy = r.top + r.height / 2;
  for (let i = 0; i < 26; i++) {
    setTimeout(() => spawnSparkAt(
      cx + (Math.random() * 120 - 60),
      cy + (Math.random() * 80 - 40),
      SPARK_COLORS[Math.floor(Math.random() * SPARK_COLORS.length)],
    ), i * 28);
  }
}

function checkEvolution() {
  const idx = currentStageFor(S.totalEarned);
  if (idx > stageIdx) {
    const jumped = idx - stageIdx;
    stageIdx = idx;
    renderStageName();
    const flash = $('evo-flash');
    flash.classList.remove('go', 'rebirth');
    void flash.offsetWidth;
    flash.classList.add('go');
    confettiBurst();
    sndEvo();
    queueBlessing(jumped);  // 진화마다 축복 3택 1 (단계 점프 시 누적)
    toast(`🎉 진화! <b>${STAGES[idx].name}</b> 등장!`);
    showQuip(QUIPS.evolve[Math.floor(Math.random() * QUIPS.evolve.length)]);
    save();
  }
}

function detectTrait() {
  for (const t of TRAITS) if (t.cond()) return t;
  return null;
}

function hasSamsaraAura() { return SAMSARA_TRAIT.cond(); }

/* 도감 표시용: 행동 성향 4종 + 윤회 */
const ALL_TRAITS = [...TRAITS, SAMSARA_TRAIT];

function renderStageName() {
  const el = $('stage-name');
  const aura = hasSamsaraAura() ? ' · <span class="trait" style="color:#b48aff">윤회의 고리</span>' : '';
  if (currentTrait) {
    el.innerHTML = `${STAGES[stageIdx].name} · <span class="trait">${currentTrait.name}</span>${aura}`;
  } else if (aura) {
    el.innerHTML = STAGES[stageIdx].name + aura;
  } else {
    el.textContent = STAGES[stageIdx].name;
  }
}

function renderEvoProgress() {
  const bar = $('evo-progress-bar');
  const label = $('evo-progress-label');
  if (stageIdx >= STAGES.length - 1) {
    bar.style.width = '100%';
    label.textContent = '✨ 최종 진화 완료! ✨';
    return;
  }
  const cur = effNeed(stageIdx);
  const next = effNeed(stageIdx + 1);
  const pct = Math.min(100, (S.totalEarned - cur) / (next - cur) * 100);
  bar.style.width = pct + '%';
  label.textContent = `${STAGES[stageIdx + 1].name}까지 ${fmt(Math.max(0, next - S.totalEarned))} 코인 (${pct.toFixed(1)}%)`;
}

/* ════════════════════════ 도감 / 별의 기록 ════════════════════════ */

function recordCodex() {
  let changed = false;
  for (let i = 0; i <= stageIdx; i++) {
    if (!S.codex.stages[i]) { S.codex.stages[i] = true; changed = true; }
  }
  if (currentTrait && !S.codex.traits[currentTrait.key]) {
    S.codex.traits[currentTrait.key] = true;
    changed = true;
  }
  if (hasSamsaraAura() && !S.codex.traits.samsara) {
    S.codex.traits.samsara = true;
    changed = true;
    toast(`🌀 슬라임에게 <b>윤회의 고리</b>가 생겼어요!`);
  }
  for (const p of PRODUCERS) {
    const owned = S.producers[p.id];
    if (owned <= 0) continue;
    let entry = S.codex.friends[p.id];
    if (!entry) {
      entry = S.codex.friends[p.id] = { discovered: true, maxOwned: 0 };
      changed = true;
    }
    if (owned > entry.maxOwned) entry.maxOwned = owned;  // 환생해도 최고 기록은 남는다
  }
  return changed;
}

function checkStory() {
  let newUnlock = false;
  for (const st of STORY) {
    if (S.story[st.id]) continue;
    if (st.cond()) {
      S.story[st.id] = true;

      toast(`📜 별의 기록에 <b>${st.title}</b>이(가) 추가되었어요!`);
      beep(784, 0.12, 'triangle', 0.08);

    save();
    if (currentTab === 'room') buildShop();
  }
}

/* ════════════════════════ 슬라임의 소원 / 별가루 ════════════════════════ */

function drawWish() {
  const activeTypes = S.wishes.active.map(w => w.type);
  const pool = WISH_TYPES.filter(t => {
    if (activeTypes.includes(t.type)) return false;
    if (t.type === 'upgrade' && UPGRADES.every(u => S.upgrades[u.id])) return false;
    return true;
  });
  if (!pool.length) return;
  const tpl = pool[Math.floor(Math.random() * pool.length)];
  const made = tpl.make(S.wishes.completed);
  S.wishes.active.push({
    type: tpl.type,
    icon: tpl.icon,
    target: made.target,
    progress: 0,
    reward: tpl.reward,
  });
}

function initWishes() {
  // 손상된 항목 정리 후 3개 채우기
  S.wishes.active = S.wishes.active.filter(w =>
    w && WISH_TYPES.some(t => t.type === w.type) && w.target > 0);
  while (S.wishes.active.length < 3) drawWish();
}

function wishText(w) {
  const tpl = WISH_TYPES.find(t => t.type === w.type);
  return tpl ? tpl.text(w) : '';
}

function wishEvent(type, amount) {
  let completedAny = false;
  for (let i = S.wishes.active.length - 1; i >= 0; i--) {
    const w = S.wishes.active[i];
    if (w.type !== type) continue;
    if (type === 'combo') w.progress = Math.max(w.progress, amount);
    else w.progress += amount;
    if (w.progress >= w.target) {
      S.wishes.active.splice(i, 1);
      const rw = w.reward + (hasBless('dustsense') ? 1 : 0);
      S.stardust += rw;
      S.wishes.completed++;
      completedAny = true;
      toast(`💫 소원 성취! <b>${wishText(w)}</b><br><small>별가루 +${rw}</small>`);
      sndAch();
    }
  }
  if (completedAny) {
    initWishes();
    save();
    if (currentTab === 'wishes') buildShop();
  }
}

/* ════════════════════════ 진화 축복 ════════════════════════ */

function hasBless(id) { return S.runBlessings.includes(id); }

let pendingBlessings = 0;

function drawBlessingChoices() {
  const pool = BLESSINGS.filter(b => !hasBless(b.id));
  if (pool.length < 3) return pool;
  // 성향 태그 가중치 3배
  const favTag = currentTrait ? TRAIT_BLESSING_TAG[currentTrait.key] : (hasSamsaraAura() ? 'meta' : null);
  const picks = [];
  const candidates = pool.slice();
  while (picks.length < 3 && candidates.length) {
    const weights = candidates.map(b => b.tag === favTag ? 3 : 1);
    const total = weights.reduce((a, w) => a + w, 0);
    let r = Math.random() * total;
    let idx = 0;
    for (; idx < candidates.length; idx++) {
      r -= weights[idx];
      if (r <= 0) break;
    }
    picks.push(candidates.splice(Math.min(idx, candidates.length - 1), 1)[0]);
  }
  return picks;
}

function openBlessingModal() {
  const choices = drawBlessingChoices();
  if (!choices.length) { pendingBlessings = 0; return; }
  const wrap = $('blessing-cards');
  wrap.innerHTML = '';
  for (const b of choices) {
    const card = document.createElement('button');
    card.className = 'blessing-card';
    card.innerHTML = `
      <span class="b-icon">${spriteHtml('blessings', b.id, b.icon, { size: 34 })}</span>
      <span><span class="b-name">${b.name}</span><div class="b-desc">${b.desc}</div></span>`;
    card.addEventListener('click', () => pickBlessing(b));
    wrap.appendChild(card);
  }
  $('blessing-overlay').classList.add('open');
}

function pickBlessing(b) {
  S.runBlessings.push(b.id);
  S.codex.blessings[b.id] = true;
  sndAch();
  toast(`${b.icon} <b>${b.name}</b>의 축복을 받았어요!`);
  closeBlessingModal();
}

function closeBlessingModal() {
  $('blessing-overlay').classList.remove('open');
  pendingBlessings = Math.max(0, pendingBlessings - 1);
  save();
  if (pendingBlessings > 0) setTimeout(openBlessingModal, 400);
  if (currentTab === 'prestige' || currentTab === 'room') buildShop();
}

function queueBlessing(count) {
  pendingBlessings += count;
  if (!$('blessing-overlay').classList.contains('open')) {
    setTimeout(openBlessingModal, 900);  // 진화 연출 먼저
  }
}

function doPrestige() {

  frenzyEarned = 0; festActive = 0; festWait = 60;

  void flash.offsetWidth;

  currentTrait = detectTrait();

function buyPerk(perk) {

/* ════════════════════════ 친구 시각화: 행동 기반 주민 ════════════════════════
   친구는 둥둥 떠다니는 아이콘이 아니라 역할을 가진 방 주민으로 표시된다.
   보유 장식에 따라 좋아하는 자리가 달라진다. */

const friendsLayer = $('friends-layer');

const FRIEND_BEHAVIOR = {
  chick:   { max: 3, anim: 'peck',
    pos: () => S.decor.pond ? { left: '17%', bottom: '16%' } : { left: '38%', bottom: '12%' } },
  cat:     { max: 2, anim: 'snooze',
    pos: () => S.decor.mat ? { left: '22%', bottom: '42%' }
      : (S.decor.cushion ? { left: '57%', bottom: '11%' } : { right: '36%', bottom: '14%' }) },
  dog:     { max: 2, anim: 'run',
    pos: () => S.decor.pond ? { left: '27%', bottom: '23%' } : { left: '46%', bottom: '7%' } },
  rabbit:  { max: 2, anim: 'hop',
    pos: () => S.decor.lamp ? { right: '22%', bottom: '27%' } : { right: '30%', bottom: '12%' } },
  unicorn: { max: 2, anim: 'shine',
    pos: () => S.decor.lamp ? { right: '13%', bottom: '31%' } : { right: '20%', bottom: '36%' } },
  dragon:  { max: 2, anim: 'guard',
    pos: () => S.decor.fountain ? { right: '15%', bottom: '52%' } : { left: '16%', bottom: '50%' } },
  whale:   { max: 1, anim: 'cross',
    pos: () => ({ left: '50%', top: S.decor.window ? '13%' : '20%' }) },
  planet:  { max: 1, anim: 'orbit',
    pos: () => ({ right: '9%', top: '24%' }) },
};

function friendCount(owned) {
  if (owned >= 25) return 3;
  if (owned >= 10) return 2;
  if (owned >= 1) return 1;
  return 0;
}

/* 2프레임 스프라이트 애니메이션 (아틀라스에 친구별 2프레임 존재) */
function friendSpriteAnimHtml(id, size) {
  const frames = PRODUCER_SPRITE_LAYOUT[id];
  if (!frames) {
    const p = PRODUCERS.find(x => x.id === id);
    return `<span class="friend-emoji">${p ? p.icon : '❓'}</span>`;
  }
  const f0 = frames[0];
  const f1 = frames[1] || frames[0];
  const scale = size / f0.w;
  const style = [
    `width:${size}px`,
    `height:${size}px`,
    `background-image:url('${PRODUCER_SPRITE_ATLAS}')`,
    `background-size:${PRODUCER_SPRITE_SHEET.w * scale}px ${PRODUCER_SPRITE_SHEET.h * scale}px`,
    `--fx0:${(-f0.x * scale).toFixed(1)}px`,
    `--fx1:${(-f1.x * scale).toFixed(1)}px`,
    `--fy:${(-f0.y * scale).toFixed(1)}px`,
    `animation-duration:${(0.7 + Math.random() * 0.6).toFixed(2)}s`,
    `animation-delay:${(Math.random() * 0.9).toFixed(2)}s`,
  ].join(';');
  return `<span class="sprite-icon fr-frames" aria-hidden="true" style="${style}"></span>`;
}

function rebuildFriends() {
  friendsLayer.innerHTML = '';
  PRODUCERS.forEach(p => {
    const bhv = FRIEND_BEHAVIOR[p.id];
    const owned = S.producers[p.id];
    if (!bhv || !owned) return;
    const n = Math.min(bhv.max, friendCount(owned));
    const pos = bhv.pos();
    for (let k = 0; k < n; k++) {
      const el = document.createElement('div');
      el.className = 'friend';
      el.dataset.id = p.id;
      for (const key of ['left', 'right', 'top', 'bottom']) {
        if (pos[key] === undefined) continue;
        el.style[key] = (key === 'left' || key === 'right')
          ? `calc(${pos[key]} + ${k * 46}px)`
          : pos[key];
      }
      const mover = document.createElement('span');
      mover.className = 'fr-move bv-' + bhv.anim;
      mover.style.animationDelay = (Math.random() * 2.5).toFixed(2) + 's';
      const size = (p.id === 'whale' || p.id === 'planet') ? 64 : 48;
      mover.innerHTML = friendSpriteAnimHtml(p.id, size);
      el.appendChild(mover);
      friendsLayer.appendChild(el);
    }
  });
}

/* 분위기 파티클: 드래곤 불꽃, 유니콘 반짝이 */
function spawnSparkAt(x, y, color) {
  const el = document.createElement('div');
  el.className = 'spark';
  el.style.background = color;
  el.style.left = x + 'px';
  el.style.top = y + 'px';
  const ang = Math.random() * Math.PI * 2;
  const dist = 16 + Math.random() * 26;
  el.animate([
    { transform: 'translate(0,0) scale(1)', opacity: 1 },
    { transform: `translate(${Math.cos(ang) * dist}px, ${Math.sin(ang) * dist - 22}px) scale(0)`, opacity: 0 },
  ], { duration: 600 + Math.random() * 300, easing: 'ease-out' });
  document.body.appendChild(el);
  setTimeout(() => el.remove(), 950);
}

setInterval(() => {
  if (document.hidden) return;
  const ambient = [['dragon', '#ff9d4d'], ['unicorn', '#ffd9f2']];
  for (const [id, color] of ambient) {
    const el = friendsLayer.querySelector(`.friend[data-id="${id}"]`);
    if (!el) continue;
    const r = el.getBoundingClientRect();
    for (let i = 0; i < 3; i++) {
      spawnSparkAt(r.left + r.width / 2, r.top + r.height / 3, color);
    }
  }
}, 6500);

          <div class="shop-desc shop-syn"></div>

        <div class="shop-count"></div>`;
      el.addEventListener('click', () => buyProducer(p));
      shopList.appendChild(el);

    for (const u of UPGRADES) {
      if (S.upgrades[u.id]) continue;
      const el = document.createElement('div');
      el.className = 'shop-item';
      el.dataset.id = u.id;
      el.innerHTML = `
        <div class="shop-icon">${itemSpriteHtml(u.id, u.icon)}</div>

          <div class="shop-name">${u.name}</div>
          <div class="shop-desc">${u.desc}</div>
          <div class="shop-cost"></div>
        </div>`;
      el.addEventListener('click', () => buyUpgrade(u));
      shopList.appendChild(el);

function refreshShop() {
  $('discount-badge').style.display = S.buffs.discount ? 'inline-block' : 'none';

  if (currentTab === 'producers') {
    for (const el of shopList.querySelectorAll('.shop-item')) {
      const p = PRODUCERS.find(x => x.id === el.dataset.id);
      if (!p) continue;
      const info = bulkInfo(p);
      const costEl = el.querySelector('.shop-cost');
      const prefix = buyMode === '1' ? '' : (buyMode === '10' ? 'x10 = ' : `x${info.count} = `);
      costEl.textContent = prefix + fmt(info.cost) + ' 코인' + (S.buffs.discount ? ' (50%↓)' : '');
      el.querySelector('.shop-count').textContent = S.producers[p.id] || '';

      const oneCost = producerCost(p) * (S.buffs.discount ? 0.5 : 1);
      const oneCps = p.cps * cpsMulFactor();
      el.querySelector('.shop-payback').textContent = `초당 +${fmt(p.cps)} · 회수 ${fmtTime(oneCost / oneCps)}`;

      const affordable = buyMode === 'max' ? info.count > 0 : S.coins >= info.cost;
      el.classList.toggle('locked', !affordable);

      const reveal = S.totalEarned >= p.baseCost * 0.4 || S.producers[p.id] > 0;
      el.querySelector('.shop-name').textContent = reveal ? p.name : '???';
      setProducerShopIcon(el, p, reveal);

      // 다음 시너지 표시 — "25마리까지만 더 사자"를 만드는 줄
      const synEl = el.querySelector('.shop-syn');
      if (reveal) {
        const next = nextSynergy(p.id);
        synEl.textContent = next
          ? `다음 시너지: ${next.at}마리 — ${next.desc}`
          : (SYNERGIES[p.id] ? '시너지 완성! ✨' : '');
      } else {
        synEl.textContent = '';
      }
    }
  } else if (currentTab === 'upgrades') {
    for (const el of shopList.querySelectorAll('.shop-item')) {
      const u = UPGRADES.find(x => x.id === el.dataset.id);
      if (!u) continue;
      const cost = u.cost * (S.buffs.discount ? 0.5 : 1) * (hasBless('cheapup') ? 0.85 : 1);
      el.querySelector('.shop-cost').textContent = fmt(cost) + ' 코인' + (S.buffs.discount ? ' (50%↓)' : '');
      el.classList.toggle('locked', S.coins < cost);
    }
  } else if (currentTab === 'room') {
    for (const el of shopList.querySelectorAll('.decor-item')) {
      const d = DECOR.find(x => x.id === el.dataset.id);
      if (!d || S.decor[d.id]) continue;
      el.classList.toggle('locked', S.coins < d.cost);
    }
  } else if (currentTab === 'wishes') {
    const dust = $('stardust-display');
    if (dust) dust.innerHTML = `💫 별가루 <b>${S.stardust}</b>개 · 이룬 소원 ${S.wishes.completed}개`;
    for (const el of shopList.querySelectorAll('.wish-item')) {
      const w = S.wishes.active[el.dataset.idx];
      if (!w) continue;
      const pct = Math.min(100, w.progress / w.target * 100);
      el.querySelector('.wish-bar').style.width = pct + '%';
      el.querySelector('.wish-progress').textContent =
        `${fmt(Math.min(w.progress, w.target))} / ${fmt(w.target)}`;
    }
    for (const el of shopList.querySelectorAll('.cosmetic-item')) {
      const c = COSMETICS.find(x => x.id === el.dataset.id);
      if (!c || S.cosmetics.owned[c.id]) continue;
      el.classList.toggle('locked', S.stardust < c.cost);
    }
  }
}

function consumeDiscount() {
  if (S.buffs.discount) {
    S.buffs.discount = false;
    toast('⭐ 할인이 적용되었어요!');
  }
}

function buyProducer(p) {
  const info = bulkInfo(p);
  if (info.count === 0 || S.coins < info.cost) return;
  S.coins -= info.cost;
  S.producers[p.id] += info.count;
  consumeDiscount();
  sndBuy();
  wishEvent('hire', info.count);
  rebuildFriends();
  refreshShop();
  // 구매 플래시
  const itemEl = shopList.querySelector(`.shop-item[data-id="${p.id}"]`);
  if (itemEl) {
    itemEl.classList.remove('bought');
    void itemEl.offsetWidth;
    itemEl.classList.add('bought');
  }
  renderHud();
  save();
}

function buyUpgrade(u) {
  const cost = u.cost * (S.buffs.discount ? 0.5 : 1) * (hasBless('cheapup') ? 0.85 : 1);
  if (S.upgrades[u.id] || S.coins < cost) return;
  S.coins -= cost;
  S.upgrades[u.id] = true;
  consumeDiscount();
  sndBuy();
  wishEvent('upgrade', 1);
  toast(`${u.icon} <b>${u.name}</b> 구매 완료!`);
  buildShop();
  renderHud();
  save();
}

document.querySelectorAll('.tab').forEach(tab => {
  tab.addEventListener('click', () => {
    document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
    tab.classList.add('active');
    currentTab = tab.dataset.tab;
    buildShop();
  });
});

document.querySelectorAll('.mode-btn').forEach(btn => {
  btn.addEventListener('click', () => {
    document.querySelectorAll('.mode-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    buyMode = btn.dataset.mode;
    refreshShop();
  });
});

const starEl = $('golden-star');
let starTimer = 20 + Math.random() * 40;
let starVisible = 0;

function starInterval() {
  return (40 + Math.random() * 60) * (1 - 0.08 * perkLv('starlight')) * (hasSyn('dog', 25) ? 0.95 : 1)
    * (hasBless('starhunch') ? 0.88 : 1);
}

function starSpawnRect() {
  const area = $('game-area').getBoundingClientRect();
  const maxX = Math.max(0, area.width - 140);
  const maxY = Math.max(0, area.height - 240);
  return {
    x: area.left + 40 + Math.random() * maxX,
    y: area.top + 70 + Math.random() * maxY,
  };
}

function spawnStar() {
  starVisible = starLinger();
  starEl.style.display = 'block';
  const pos = starSpawnRect();
  starEl.style.left = pos.x + 'px';
  starEl.style.top = pos.y + 'px';
  // 강아지 100: 별 등장을 놓치지 않게 반짝임 + 알림음
  if (hasSyn('dog', 100)) {
    starEl.style.filter = 'drop-shadow(0 0 24px #ffd75e)';
    beep(1568, 0.15, 'triangle', 0.07);
  } else {
    starEl.style.filter = '';
  }
}

function hideStar() {
  starVisible = 0;
  starEl.style.display = 'none';
  starTimer = starInterval();
}

  }},
  { w: () => 10, run: (e) => {
      toast('🌠 <b>미니 별똥별!</b> 작은 별들을 빠르게 클릭하세요!');
      spawnMiniStars();
  }},
];

function pickStarEvent() {
  const weights = STAR_EVENTS.map(ev => ev.w());
  const total = weights.reduce((a, w) => a + w, 0);
  let r = Math.random() * total;
  for (let i = 0; i < STAR_EVENTS.length; i++) {
    r -= weights[i];
    if (r <= 0) return STAR_EVENTS[i];
  }
  return STAR_EVENTS[0];
}

function save() {
  S.lastSave = Date.now();

function migrateSave(data) {
  const base = defaultState();
  const out = Object.assign(base, data);

  // v4 이하: 평면 stats → lifetime/run 분리
  const ds = defaultState().stats;
  if (data.stats && data.stats.run) {
    out.stats = {
      lifetime: Object.assign({}, ds.lifetime, data.stats.lifetime || {}),
      run: Object.assign({}, ds.run, data.stats.run || {}),
    };
  } else {
    const old = data.stats || {};
    out.stats = {
      lifetime: {
        bestCombo: old.bestCombo || 0,
        starsClicked: old.starsClicked || 0,
        earned: data.totalEarned || 0,  // 과거 생애 누적은 복원 불가, 현재 누적으로 근사
      },
      run: {
        clicks: data.totalClicks || 0,
        bestCombo: old.bestCombo || 0,
        starsClicked: old.starsClicked || 0,
        clickEarned: old.clickEarned || 0,
        idleEarned: old.idleEarned || 0,
        offlineEarned: old.offlineEarned || 0,
      },
    };
  }

  out.buffs = Object.assign(defaultState().buffs, data.buffs || {});
  out.prestige = Object.assign(defaultState().prestige, data.prestige || {});
  out.prestige.perks = (data.prestige && data.prestige.perks) || {};
  // v4 이하: 총 획득 영혼 = 보유 + 특성에 쓴 영혼 (비용 = 1+2+...+lv)
  if (!out.prestige.totalSoulsEarned || out.prestige.totalSoulsEarned < out.prestige.souls) {
    let spent = 0;
    for (const k in out.prestige.perks) {
      const lv = out.prestige.perks[k];
      spent += lv * (lv + 1) / 2;
    }
    out.prestige.totalSoulsEarned = out.prestige.souls + spent;
  }
  out.decor = data.decor || {};
  out.story = data.story || {};
  out.codex = Object.assign(defaultState().codex, data.codex || {});
  out.codex.stages = (data.codex && data.codex.stages) || {};
  out.codex.traits = (data.codex && data.codex.traits) || {};
  out.codex.friends = (data.codex && data.codex.friends) || {};
  // v4 이하: boolean → { discovered, maxOwned } 객체
  for (const k in out.codex.friends) {
    if (out.codex.friends[k] === true) {
      out.codex.friends[k] = { discovered: true, maxOwned: (data.producers && data.producers[k]) || 0 };
    }
  }

  // v5 이하: 별가루/소원/코스메틱 기본값
  out.stardust = data.stardust || 0;
  out.wishes = Object.assign({ active: [], completed: 0 }, data.wishes || {});
  if (!Array.isArray(out.wishes.active)) out.wishes.active = [];
  out.cosmetics = {
    owned: (data.cosmetics && data.cosmetics.owned) || {},
    equipped: (data.cosmetics && data.cosmetics.equipped) || {},
  };

  // v6 이하: 진화 축복 기본값
  out.runBlessings = Array.isArray(data.runBlessings) ? data.runBlessings : [];
  out.codex.blessings = (data.codex && data.codex.blessings) || {};

  // v7 이하: 앨범 필드
  out.playTime = data.playTime || 0;
  out.createdAt = data.createdAt || data.lastSave || Date.now();
  out.achievements = data.achievements || {};
  out.producers = Object.assign({}, defaultState().producers, data.producers || {});
  out.upgrades = data.upgrades || {};
  out.version = SAVE_VERSION;
  return out;
}

function load() {
  try {
    const raw = localStorage.getItem(SAVE_KEY);
    if (!raw) return;
    S = migrateSave(JSON.parse(raw));

    // 오프라인 보상: 기본 50% + 말랑한 시간 특성 + 고양이/고래 시너지
    const away = Math.min((Date.now() - (S.lastSave || Date.now())) / 1000, offlineCapHours() * 3600);
    let offline = totalCps() * away * offlineRate() * offlineSynMul();
    if (offline >= 1) {
      let dream = false;
      if (hasSyn('cat', 100) && Math.random() < 0.1) { offline *= 2; dream = true; }
      earnCoins(offline, 'offline');
      setTimeout(() => toast(dream
        ? `🐱💤 고양이의 꿈 보너스! 친구들이 <b>${fmt(offline)}</b> 코인을 모았어요! (x2)`
        : `💤 자리 비운 동안 친구들이 <b>${fmt(offline)}</b> 코인을 모았어요!`), 600);
    }
  } catch (e) {}
}

/* ════════════════════════ 메인 루프 ════════════════════════
   경제(수입·버프·타이머)는 econTick()으로 분리.
   rAF는 백그라운드 탭에서 완전히 멈추므로 setInterval에서도 호출한다.
   lastEcon 기준 실제 경과 시간으로 계산해 이중 적립은 없다. */

let lastEcon = performance.now();
let saveAcc = 0;
let achAcc = 0;

function econTick(silent = false) {
  silentTick = silent;
  try {
    econTickBody();
  } finally {
    silentTick = false;
  }
}

function econTickBody() {
  const now = performance.now();
  let dt = (now - lastEcon) / 1000;
  lastEcon = now;
  if (dt <= 0) return;
  dt = Math.min(dt, 3600); // 안전 상한

  S.playTime += dt;

  const income = totalCps() * frenzyMul() * partyMul() * dt;
  if (income > 0) earnCoins(income, 'idle');

  if (comboTimer > 0) {
    comboTimer -= dt;
    if (comboTimer <= 0) combo = 0;
  }

  if (frenzyTimer > 0) {
    frenzyTimer -= dt;
    if (frenzyTimer <= 0) {
      frenzyTimer = 0;
      // 드래곤 100: 광란 중 번 코인의 10%를 보너스로
      if (hasSyn('dragon', 100) && frenzyEarned > 0) {
        const b = frenzyEarned * 0.1;
        earnCoins(b, 'event');
        toast(`🐲 광란 종료! 드래곤의 선물 <b>+${fmt(b)}</b> 코인!`);
      } else {
        toast('광란의 시간 종료!');
      }
      frenzyEarned = 0;
    }
  }
  if (partyTimer > 0) {
    partyTimer -= dt;
    if (partyTimer <= 0) { partyTimer = 0; toast('친구 파티 종료!'); }
  }
  // 병아리 100: 60초마다 10초간 클릭 x2 축제
  if (hasSyn('chick', 100)) {
    if (festActive > 0) {
      festActive -= dt;
      if (festActive <= 0) { festActive = 0; toast('병아리 축제 종료!'); }
    } else {
      festWait -= dt;
      if (festWait <= 0) {
        festActive = 10;
        festWait = 60;
        toast('🐤 <b>병아리 축제!</b> 10초간 클릭 x2!');
        sndAch();
      }
    }
  }

  if (starVisible > 0) {
    starVisible -= dt;
    if (starVisible <= 0) hideStar();
  } else {
    starTimer -= dt;
    if (starTimer <= 0) spawnStar();
  }

  blinkTimer -= dt;
  if (blinkTimer <= 0) { blinking = 0.15; blinkTimer = 2.5 + Math.random() * 3; }
  if (blinking > 0) blinking -= dt;

  // 슬라임 대사 (40~80초 간격)
  quipTimer -= dt;
  if (quipTimer <= 0) {
    randomQuip();
    quipTimer = 40 + Math.random() * 40;
  }

  // 말랑 뉴스 (26~48초 간격)
  newsTimer -= dt;
  if (newsTimer <= 0) {
    showNews();
    newsTimer = 26 + Math.random() * 22;
  }

  // 먹구름 손님
  if (cloudState === 'hidden') {
    cloudTimer -= dt;
    if (cloudTimer <= 0) spawnCloud();
  } else if (cloudState === 'drift') {
    cloudLife -= dt;
    if (cloudLife <= 0) hideCloud();
  } else if (cloudState === 'challenge') {
    cloudTime -= dt;
    if (cloudTime <= 0) cloudFail();
  }

  checkEvolution();

  achAcc += dt;
  if (achAcc >= 0.5) {
    achAcc = 0;
    checkAchievements();
    const tr = detectTrait();
    if ((tr && tr.key) !== (currentTrait && currentTrait.key)) {
      currentTrait = tr;
      renderStageName();
      if (tr) {
        // 유니콘 25: 새 성향 첫 발견 시 코인 보너스
        if (!S.codex.traits[tr.key] && hasSyn('unicorn', 25)) {
          const b = Math.max(totalCps() * 120, clickPower() * 200, 100);
          earnCoins(b, 'event');
          toast(`✨ 슬라임에게 <b>${tr.name}</b>이 생겼어요!<br><small>🦄 유니콘의 축복 +${fmt(b)} 코인</small>`);
        } else {
          toast(`✨ 슬라임에게 <b>${tr.name}</b>이 생겼어요!`);
        }
      }
    }
    // 오라: 코스메틱 장착 > 유니콘 100 성향 오라
    const cosAura = S.cosmetics.equipped.aura;
    slimeCv.style.filter = cosAura
      ? `drop-shadow(0 0 14px ${cosAura})`
      : (currentTrait && hasSyn('unicorn', 100))
        ? `drop-shadow(0 0 14px ${currentTrait.pupil})`
        : '';
    recordCodex();
    checkStory();
    // 온보딩: 첫 친구를 아직 안 샀고 살 수 있을 때 한 번만 안내
    if (!hintFriendShown && S.totalEarned < 200 && S.coins >= 15
        && PRODUCERS.every(p => !S.producers[p.id])) {
      hintFriendShown = true;
      toast('🐤 상점에서 <b>병아리</b> 친구를 고용해보세요! 자동으로 코인을 모아줘요');
    }
  }

  saveAcc += dt;
  if (saveAcc >= 5) { saveAcc = 0; save(); }
}

let shopAcc = 0;
let lastFrame = performance.now();

function loop(t) {
  const dt = (t - lastFrame) / 1000;
  lastFrame = t;

  econTick();

  const cbox = $('combo-box');
  if (combo >= 3) {
    cbox.classList.add('on');
    $('combo-label').textContent = '콤보 x' + comboMul().toFixed(1) + '  (' + combo + ')';
    $('combo-bar').style.width = Math.max(0, comboTimer / comboWindow() * 100) + '%';
  } else {
    cbox.classList.remove('on');
  }
  renderBuffBanner();

  drawSlime(t);
  renderHud();

  shopAcc += dt;
  if (shopAcc >= 0.25) { shopAcc = 0; refreshShop(); }

  requestAnimationFrame(loop);
}

// 백그라운드 탭 대비: rAF가 멈춰도 경제는 계속 돈다
setInterval(() => {
  econTick();
  renderHud();
}, 1000);

/* ════════════════════════ 초기화 ════════════════════════ */

for (let i = 0; i < 40; i++) {
  const s = document.createElement('div');
  s.className = 'star';
  s.style.left = Math.random() * 100 + 'vw';
  s.style.top = Math.random() * 100 + 'vh';
  s.style.animationDelay = Math.random() * 2.4 + 's';
  if (Math.random() < 0.3) { s.style.width = '6px'; s.style.height = '6px'; }
  document.body.appendChild(s);
}

// 먹구름 비주얼: guests 아틀라스 생성 전엔 캔버스 픽셀 폴백
cloudEl.insertAdjacentHTML('beforeend',
  spriteHtml('guests', 'raincloud', `<img src="${CLOUD_DATA_URL}" alt="">`, { size: 108, className: 'guest-sprite' }));

load();
stageIdx = currentStageFor(S.totalEarned);
currentTrait = detectTrait();
recordCodex();
renderStageName();
$('sound-btn').textContent = S.soundOn ? '🔊' : '🔇';
initWishes();
applyCosmetics();
buildShop();
rebuildFriends();
renderDecor();
renderHud();
checkStory();
// 온보딩: 완전 새 게임이면 첫 클릭 안내
if (S.totalClicks === 0) setTimeout(() => showQuip('나를 말랑말랑 눌러봐!'), 1200);

// PWA: http(s)에서만 서비스워커 등록 (file:// 더블클릭 실행은 그대로 동작)
if ('serviceWorker' in navigator && (location.protocol === 'https:' || location.hostname === 'localhost' || location.hostname === '127.0.0.1')) {
  navigator.serviceWorker.register('sw.js').catch(() => {});
}

requestAnimationFrame(loop);
</script>
</body>
</html>
